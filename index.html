<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 赛博飞车 - 终极典藏街机版</title>
    <style>
        body {
            margin: 0; 
            padding: 0; 
            background-color: #05000a; 
            color: #fff;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            touch-action: none; 
        }
        h1 { 
            color: #00ffff; 
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00aaff; 
            margin: 0 0 5px 0; 
            font-size: 28px; 
            letter-spacing: 2px;
        }
        p { 
            margin: 0 0 10px 0; 
            color: #ff00ff; 
            text-shadow: 0 0 5px #ff00ff; 
            font-size: 14px;
        }
        
        #game-wrapper { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
        }
        
        canvas {
            width: 800px; 
            max-width: 96vw; 
            height: auto; 
            aspect-ratio: 4/3; 
            background-color: #000; 
            image-rendering: pixelated; 
            border: 4px solid #00ffff; 
            border-radius: 8px;
            box-shadow: 0 0 40px #00ffff, 0 0 20px #00aaff inset;
            position: relative;
            z-index: 1;
        }

        /* 顶级街机 CRT 扫描线滤镜 */
        #scanlines {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 800px; 
            max-width: 96vw; 
            aspect-ratio: 4/3;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; 
            z-index: 5; 
            border-radius: 8px;
        }
        
        #uiLayer {
            position: absolute; 
            top: 15px; 
            left: 20px; 
            right: 20px;
            display: flex; 
            justify-content: space-between; 
            pointer-events: none; 
            display: none; 
            z-index: 10;
        }
        
        .hud-text { 
            font-size: 22px; 
            font-weight: bold; 
            color: #00ffff; 
            text-shadow: 0 0 8px #00ffff; 
            letter-spacing: 1px; 
        }
        
        .overlay {
            position: absolute; 
            top: 45%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            text-align: center; 
            background: rgba(5, 5, 15, 0.95); 
            padding: 40px;
            border: 4px dashed #00ffff; 
            box-shadow: 0 0 30px #00ffff;
            display: none; 
            width: 85%; 
            max-width: 420px; 
            z-index: 20;
        }
        
        #start-screen { display: block; }
        
        .blink { 
            animation: blinker 1.2s linear infinite; 
            color: #ff00ff; 
            font-weight: bold; 
            font-size: 18px; 
            text-shadow: 0 0 10px #ff00ff; 
        }
        @keyframes blinker { 50% { opacity: 0; } }

        .diff-container { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin: 20px 0; 
        }
        
        .diff-btn {
            background: #111; 
            color: #aaa; 
            border: 2px solid #555; 
            border-radius: 6px;
            padding: 10px 18px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: inherit; 
            transition: all 0.2s;
        }
        .diff-btn.active { 
            background: #00ffff; 
            color: #000; 
            border-color: #00ffff; 
            box-shadow: 0 0 20px #00ffff; 
            transform: scale(1.1); 
        }

        /* 底部控制按钮 */
        #controls { 
            display: flex; 
            justify-content: space-between; 
            gap: 15px; 
            margin-top: 20px; 
            width: 700px; 
            max-width: 96vw; 
        }
        .ctrl-btn {
            flex: 1; 
            background: rgba(0, 20, 40, 0.8); 
            color: #00ffff; 
            border: 4px solid #00ffff; 
            border-radius: 12px;
            padding: 20px 0; 
            font-size: 24px; 
            font-weight: bold; 
            font-family: inherit;
            box-shadow: 0 0 15px #00ffff inset; 
            user-select: none; 
            cursor: pointer; 
            text-align: center; 
            transition: all 0.1s;
        }
        .ctrl-btn:active { 
            background: #00ffff; 
            color: #000; 
            box-shadow: 0 0 30px #00ffff; 
            transform: scale(0.95); 
        }
        .cam-btn { 
            flex: 0.5; 
            background: rgba(40, 40, 40, 0.8); 
            color: #ccc; 
            border-color: #888; 
            box-shadow: none; 
            font-size: 18px; 
        }
        .cam-btn.active { 
            color: #00ffff; 
            border-color: #00ffff; 
            box-shadow: 0 0 15px #00ffff inset; 
        }

        .eval-title { 
            font-size: 32px; 
            font-weight: bold; 
            margin: 15px 0; 
            text-shadow: 0 0 15px currentColor; 
        }

        /* 专门防误触的“再飙一次”超大按钮 */
        #real-restart-btn {
            background-color: #ff0055;
            color: #fff;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 0 20px #ff0055;
            margin-top: 15px;
            border-radius: 8px;
            animation: pulse 1.5s infinite;
        }
        #real-restart-btn:hover {
            background-color: #fff;
            color: #ff0055;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px #ff0055; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>✦ NEON MULTIVERSE ✦</h1>
    <p>容错率提升 | 加入原生 8-bit 音效 | 宇宙防穿帮</p>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <!-- CRT 扫描线滤镜 -->
        <div id="scanlines"></div>
        
        <!-- 游戏内 HUD -->
        <div id="uiLayer">
            <div>
                <div class="hud-text" id="scoreVal">[ SCORE: 0 ]</div>
                <div class="hud-text" id="bestVal" style="font-size:14px; color:#aaa; text-shadow:none;">BEST: 0</div>
                <div class="hud-text" id="statusVal" style="color:#ff00ff; margin-top:5px;"></div>
            </div>
        </div>
        
        <!-- 开始界面 -->
        <div id="start-screen" class="overlay">
            <h2 style="color: #00ffff; text-shadow: 0 0 10px #00ffff; margin: 0 0 20px 0; font-size: 32px;">SYSTEM READY</h2>
            <div class="diff-container">
                <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
            </div>
            <button class="ctrl-btn" style="width: 100%; font-size: 20px;" onclick="initGame()">🔥 启动引擎 🔥</button>
        </div>

        <!-- 死亡界面 -->
        <div id="game-over-screen" class="overlay">
            <h2 style="color: #ff0055; margin: 0; font-size: 36px;">CRASHED!</h2>
            <div id="evalText" class="eval-title"></div>
            <p style="color: #fff; font-size: 20px; margin: 10px 0;">最终得分: <span id="finalScore" style="color: #00ffff; font-weight:bold;">0</span></p>
            <p style="color: #aaa; font-size: 14px; margin: 0 0 15px 0;">最高记录: <span id="recordScore" style="color: #ffd700;">0</span></p>
            
            <div class="diff-container" style="margin-top: 15px;">
                <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
            </div>
            
            <!-- 绝对防误触的独立重启按钮 -->
            <button id="real-restart-btn" onclick="initGame()">🔥 再飙一次 🔥</button>
        </div>

        <!-- 底部控制器 -->
        <div id="controls">
            <div id="btnLeft" class="ctrl-btn">◀ LEFT</div>
            <div id="btnCam" class="ctrl-btn cam-btn">视角</div>
            <div id="btnRight" class="ctrl-btn">RIGHT ▶</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 游戏基础画布与常量设置
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        const HORIZON = 130;
        const FOCAL = 160;
        const ROAD_WIDTH = 150;
        const SEG_LENGTH = 40;
        const DRAW_DIST = 1600;

        // ==========================================
        // 2. 音效引擎系统 (Web Audio API)
        // 完全不需要外部资源，纯代码合成复古音效！
        // ==========================================
        let audioCtx = null;
        let engineOscillator = null;
        let engineGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放合成音符
        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 播放噪音声（爆炸/撞击）
        function playNoise(duration, vol = 0.5) {
            if (!audioCtx) return;
            let bufferSize = audioCtx.sampleRate * duration;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            let noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            // 使用低通滤波器制造沉闷的爆炸感
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);
            
            let gain = audioCtx.createGain();
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            noise.start();
        }

        // 引擎持续声浪
        function startEngineSound() {
            if (!audioCtx) return;
            if (engineOscillator) return;
            
            engineOscillator = audioCtx.createOscillator();
            engineOscillator.type = 'sawtooth';
            
            engineGain = audioCtx.createGain();
            engineGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            
            // 低通滤波器让引擎声变得低沉轰鸣
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            
            engineOscillator.connect(filter);
            filter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            
            engineOscillator.start();
        }

        function updateEngineSound(speed, isSpace) {
            if (!engineOscillator) return;
            // 速度越快，频率越高
            let baseFreq = isSpace ? 40 : 60;
            let targetFreq = baseFreq + (speed * 5);
            engineOscillator.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
        }

        function stopEngineSound() {
            if (engineOscillator) {
                engineOscillator.stop();
                engineOscillator.disconnect();
                engineOscillator = null;
            }
        }

        // 特效音效封装
        function soundItemPickup() {
            playTone(800, 'square', 0.1, 0.1);
            setTimeout(() => playTone(1200, 'square', 0.2, 0.1), 100);
        }
        function soundBoost() {
            playTone(200, 'sawtooth', 0.5, 0.2);
            playNoise(0.5, 0.3);
        }
        function soundCrash() {
            playNoise(1.0, 0.8);
            playTone(50, 'sawtooth', 1.0, 0.5);
        }
        function soundShieldHit() {
            playTone(400, 'triangle', 0.3, 0.2);
            playNoise(0.3, 0.4);
        }

        // ==========================================
        // 3. 游戏状态与核心变量
        // ==========================================
        let animationId;
        let gameState = 'START';  
        let camZ = 0;
        let gameSpeed = 6;
        let score = 0;
        let bonusScore = 0;
        let frameCount = 0;
        
        let carX = 0;
        let carVX = 0;
        let playerY = 0;
        let playerZOffset = 80;   
        
        let obstacles =[];
        let props = [];
        let bgItems = [];
        let stars = [];
        let shootingStars =[];
        let lastPropZ = 0;

        let giantMeteor = { active: false, x: 0, y: 0, s: 1 };

        let difficulty = 'racing';
        // 降低基础难度，提升容错
        let baseSpawnRate = 100; 
        let speedCap = 13; 
        
        let isFlying = false;
        let flyTimer = 0;
        let isSpace = false;
        let spaceTimer = 0;
        let isShielded = false;
        let shieldTimer = 0;
        let speedTimer = 0; 
        
        let actualSpeedMult = 1.0; 

        let isFirstPerson = false;
        let renderCamX = 0;
        let renderCamY = -60;
        let renderCamZ = 0;

        const keys = { a: false, d: false };

        let bestScore = localStorage.getItem('neon_best_score') || 0;
        document.getElementById('bestVal').innerText = "BEST: " + bestScore;

        // ==========================================
        // 4. 多重宇宙场景配置 (五大世界)
        // ==========================================
        const SCENES = {
            city: { 
                skyTop:['#0033aa', '#1a0033', '#000000'], 
                skyBot:['#87cefa', '#ff0055', '#0a0011'], 
                roadD:['#444444', '#222222', '#0a0011'], 
                roadL:['#555555', '#333333', '#11001a'], 
                line:['#ffffff', '#ffaaaa', '#00ffff'], 
                prop: 'light', 
                build: 'city', 
                bHueMin: 260, 
                bHueMax: 340 
            },
            desert: { 
                skyTop:['#ff7700', '#aa4400', '#050200'], 
                skyBot:['#ffd700', '#ff4500', '#1a0500'], 
                roadD:['#c2b280', '#5c4033', '#0a0500'], 
                roadL:['#d2b48c', '#8b4513', '#110a00'], 
                line:['#ffffff', '#ffaa00', '#ff00ff'], 
                prop: 'cactus', 
                build: 'desert', 
                bHueMin: 20, 
                bHueMax: 40 
            },
            ruins: { 
                skyTop:['#556b2f', '#2f4f4f', '#051005'], 
                skyBot:['#8fbc8f', '#556b2f', '#0a1a0a'], 
                roadD:['#333333', '#1a1a25', '#050a05'], 
                roadL:['#444444', '#2b2b36', '#0a100a'], 
                line:['#aaaaaa', '#555566', '#00ff00'], 
                prop: 'pillar', 
                build: 'ruins', 
                bHueMin: 100, 
                bHueMax: 140 
            },
            factory: { 
                skyTop:['#483d8b', '#4b0082', '#0a0011'], 
                skyBot:['#9370db', '#800080', '#1a0022'], 
                roadD:['#2a2a2a', '#150a15', '#0a0510'], 
                roadL:['#3a3a3a', '#251525', '#110a15'], 
                line:['#ffff00', '#ff00ff', '#00ffff'], 
                prop: 'pipe', 
                build: 'factory', 
                bHueMin: 280, 
                bHueMax: 320 
            },
            coast: { 
                skyTop:['#00bfff', '#000080', '#00001a'], 
                skyBot:['#20b2aa', '#4b0082', '#001a33'], 
                roadD:['#2f4f4f', '#191970', '#000a11'], 
                roadL:['#40e0d0', '#00008b', '#001122'], 
                line:['#ffffff', '#00ffff', '#00ffff'], 
                prop: 'palm', 
                build: 'coast', 
                bHueMin: 180, 
                bHueMax: 220 
            }
        };
        let currentSceneKey = 'city';

        // ==========================================
        // 5. 交互控制与生命周期管理
        // ==========================================
        function setDiff(d) {
            difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-diff') === d);
            });
        }

        function getScoreTitle(s) {
            if (s < 1500) return { t: "马路杀手 💀", c: "#aaaaaa" };
            if (s < 3500) return { t: "见习车手 🚗", c: "#ffffff" };
            if (s < 7000) return { t: "秋名山神 🏎️", c: "#00ff00" };
            if (s < 12000) return { t: "云端征服者 ✈️", c: "#00ffff" };
            if (s < 20000) return { t: "曲率漫步者 🌌", c: "#ff00ff" };
            return { t: "星际传奇 🌟", c: "#ffd700" };
        }

        // 核心修复：只在 START 状态下允许键盘和外部按钮启动游戏。GAMEOVER 必须手动点“再飙一次”
        function startGameTrigger() {
            if (gameState === 'START') {
                initGame();
            }
        }

        function toggleCamera() {
            isFirstPerson = !isFirstPerson;
            document.getElementById('btnCam').classList.toggle('active', isFirstPerson);
        }

        // 键盘监听
        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === 'v' || e.key === 'V') toggleCamera();
            if (e.code === 'Space') {
                // 只有在开始界面才能按空格开始，死亡后不能按空格
                if (gameState === 'START') initGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
        });

        // 屏幕按钮监听
        const btnL = document.getElementById('btnLeft');
        const btnR = document.getElementById('btnRight');
        const btnC = document.getElementById('btnCam');

        const pressL = (e) => { e.preventDefault(); keys.a = true; startGameTrigger(); };
        const releaseL = (e) => { e.preventDefault(); keys.a = false; };
        
        const pressR = (e) => { e.preventDefault(); keys.d = true; startGameTrigger(); };
        const releaseR = (e) => { e.preventDefault(); keys.d = false; };

        btnL.addEventListener('mousedown', pressL); 
        btnL.addEventListener('touchstart', pressL, {passive: false});
        
        btnR.addEventListener('mousedown', pressR); 
        btnR.addEventListener('touchstart', pressR, {passive: false});

        window.addEventListener('mouseup', () => { keys.a = false; keys.d = false; }); 
        window.addEventListener('touchend', () => { keys.a = false; keys.d = false; });
        
        btnC.addEventListener('mousedown', (e) => { e.preventDefault(); toggleCamera(); });
        btnC.addEventListener('touchstart', (e) => { e.preventDefault(); toggleCamera(); }, {passive: false});

        // ==========================================
        // 6. 数学工具与投影算法
        // ==========================================
        function project(x, y, z) {
            let camX = isFirstPerson ? carX * 0.75 : 0;
            let camY = isFirstPerson ? playerY - 25 : playerY - 60;
            let zDiff = z - (isFirstPerson ? camZ + playerZOffset - 5 : camZ);
            
            if (zDiff <= 5) return null; 
            
            let scale = FOCAL / zDiff;
            let sx = W / 2 + (x - camX) * scale;
            let sy = HORIZON + (y - camY) * scale;
            
            return { sx, sy, scale };
        }

        function lerpColor(c1, c2, t) {
            const h2r = (hex) => { 
                if (hex.length === 4) {
                    return [
                        parseInt(hex[1]+hex[1], 16), 
                        parseInt(hex[2]+hex[2], 16), 
                        parseInt(hex[3]+hex[3], 16)
                    ];
                }
                return[
                    parseInt(hex.slice(1,3), 16), 
                    parseInt(hex.slice(3,5), 16), 
                    parseInt(hex.slice(5,7), 16)
                ]; 
            };
            let r1 = h2r(c1);
            let r2 = h2r(c2);
            
            let r = Math.round(r1[0] + (r2[0] - r1[0]) * t);
            let g = Math.round(r1[1] + (r2[1] - r1[1]) * t);
            let b = Math.round(r1[2] + (r2[2] - r1[2]) * t);
            
            return `rgb(${r},${g},${b})`;
        }

        function getEnvColors(timeCycle) {
            let s = SCENES[currentSceneKey];
            let cycle = Math.min(timeCycle, 2.0);
            let phase = Math.floor(cycle);
            let t = cycle - phase;
            
            if (cycle >= 2.0) { 
                phase = 2; 
                t = 0; 
            }
            
            let nextPhase = (phase + 1) % 3;
            let nightFactor = cycle >= 1.5 ? Math.min(1, (cycle - 1.5) * 2) : 0;
            
            return {
                skyTop: lerpColor(s.skyTop[phase], s.skyTop[nextPhase], t),
                skyBot: lerpColor(s.skyBot[phase], s.skyBot[nextPhase], t),
                roadD:  lerpColor(s.roadD[phase], s.roadD[nextPhase], t),
                roadL:  lerpColor(s.roadL[phase], s.roadL[nextPhase], t),
                line:   lerpColor(s.line[phase], s.line[nextPhase], t),
                nightFactor: nightFactor,
                sunY: cycle < 1 ? (HORIZON - 70 + cycle * 40) : (HORIZON - 30 + (cycle - 1) * 80)
            };
        }

        // ==========================================
        // 7. 环境初始化与重置
        // ==========================================
        function initEnvironment() {
            let sceneKeys = Object.keys(SCENES);
            currentSceneKey = sceneKeys[Math.floor(Math.random() * sceneKeys.length)];
            let sConf = SCENES[currentSceneKey];

            stars =[]; 
            for (let i = 0; i < 150; i++) {
                stars.push({ 
                    rawX: Math.random() * W * 2, 
                    y: (Math.random() * HORIZON * 2) - HORIZON, 
                    s: Math.random() * 1.5 + 0.5 
                });
            }

            bgItems =[]; 
            let bx = -W * 2; 
            while (bx < W * 3) {
                let bw = 30 + Math.random() * 60;
                let bh = 40 + Math.random() * 120;
                let bDepth = 15 + Math.random() * 20;
                let hue = sConf.bHueMin + Math.random() * (sConf.bHueMax - sConf.bHueMin);
                
                let windows =[];
                for (let wy = 10; wy < bh - 10; wy += 12) {
                    for (let wx = 5; wx < bw - 5; wx += 8) {
                        if (Math.random() > 0.6) {
                            windows.push({ 
                                x: wx, 
                                y: wy, 
                                color: Math.random() > 0.5 ? '#ffea00' : '#00ffff' 
                            });
                        }
                    }
                }
                bgItems.push({ 
                    x: bx, 
                    w: bw, 
                    h: bh, 
                    d: bDepth, 
                    hue: hue, 
                    type: sConf.build, 
                    seed: Math.random(), 
                    windows: windows 
                });
                bx += bw + 15 + Math.random() * 40;
            }
        }

        function initGame() {
            // 初始化音频（浏览器要求必须在用户交互后初始化）
            initAudio();
            startEngineSound();

            gameState = 'PLAYING';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('uiLayer').style.display = 'flex';
            
            // 降低了整体的挑战门槛
            if (difficulty === 'noob') { gameSpeed = 4.5; speedCap = 10; baseSpawnRate = 130; }
            else if (difficulty === 'racing') { gameSpeed = 6; speedCap = 13; baseSpawnRate = 95; }
            else if (difficulty === 'madhouse') { gameSpeed = 8; speedCap = 17; baseSpawnRate = 60; }

            camZ = 0; 
            score = 0; 
            bonusScore = 0; 
            frameCount = 0; 
            carX = 0; 
            carVX = 0; 
            playerY = 0; 
            
            isFlying = false; 
            isSpace = false; 
            isShielded = false; 
            
            flyTimer = 0; 
            spaceTimer = 0; 
            shieldTimer = 0; 
            speedTimer = 0; 
            lastPropZ = 0;
            
            obstacles = []; 
            props =[]; 
            shootingStars =[];
            giantMeteor.active = false;

            initEnvironment();
            
            if (animationId) cancelAnimationFrame(animationId);
            loop();
        }

        // ==========================================
        // 8. 核心渲染：背景、天空与道路
        // ==========================================
        function drawBackground(env, bAlpha, flyProgress) {
            if (isSpace) {
                ctx.fillStyle = '#000000'; 
                ctx.fillRect(0, 0, W, H);
            } else {
                let skyGrad = ctx.createLinearGradient(0, 0, 0, HORIZON);
                skyGrad.addColorStop(0, env.skyTop); 
                skyGrad.addColorStop(1, env.skyBot);
                ctx.fillStyle = skyGrad; 
                ctx.fillRect(0, 0, W, HORIZON);
            }

            let panX = -renderCamX * 0.4; 
            
            // 星空
            let starAlpha = isSpace ? 1 : env.nightFactor;
            if (starAlpha > 0) {
                stars.forEach(s => {
                    let sx = (s.rawX + panX * 0.1) % (W * 2) - W / 2;
                    let drawY = s.y - renderCamY * 0.5; 
                    if (isSpace || drawY < HORIZON) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${starAlpha * (0.5 + 0.5 * Math.sin(frameCount * 0.05 + s.rawX))})`;
                        ctx.fillRect(sx, drawY, s.s, s.s);
                    }
                });
            }

            // 宇宙流星与巨型星体
            if (isSpace) {
                if (Math.random() < 0.05) {
                    shootingStars.push({
                        x: Math.random() * W * 2 - W / 2, 
                        y: -100, 
                        vx: Math.random() * 15 + 10, 
                        vy: Math.random() * 10 + 5, 
                        len: Math.random() * 50 + 50
                    });
                }
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; 
                ctx.lineWidth = 2;
                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    let st = shootingStars[i];
                    ctx.beginPath(); 
                    ctx.moveTo(st.x, st.y); 
                    ctx.lineTo(st.x - st.vx * (st.len / 10), st.y - st.vy * (st.len / 10)); 
                    ctx.stroke();
                    st.x += st.vx; 
                    st.y += st.vy; 
                    if (st.y > H + 100) shootingStars.splice(i, 1);
                }

                if (!giantMeteor.active && Math.random() < 0.002) {
                    giantMeteor = { active: true, x: -W, y: Math.random() * H / 2, s: Math.random() * 2 + 2 };
                }
                if (giantMeteor.active) {
                    ctx.fillStyle = '#2a0a0a'; 
                    ctx.beginPath(); 
                    ctx.arc(giantMeteor.x, giantMeteor.y, 80 * giantMeteor.s, 0, Math.PI * 2); 
                    ctx.fill();
                    
                    ctx.fillStyle = '#110000'; 
                    ctx.beginPath(); 
                    ctx.arc(giantMeteor.x - 20 * giantMeteor.s, giantMeteor.y - 20 * giantMeteor.s, 20 * giantMeteor.s, 0, Math.PI * 2); 
                    ctx.fill();
                    
                    giantMeteor.x += 1.5; 
                    if (giantMeteor.x > W * 2) giantMeteor.active = false;
                }
            }

            // 地面日落
            if (!isSpace && env.sunY - renderCamY * 0.1 < HORIZON + 30) {
                let sy = env.sunY - renderCamY * 0.1;
                let sunGrad = ctx.createLinearGradient(0, sy - 40, 0, sy + 40);
                sunGrad.addColorStop(0, '#00ffff'); 
                sunGrad.addColorStop(1, '#ff0055'); 
                
                ctx.fillStyle = sunGrad; 
                ctx.beginPath(); 
                ctx.arc(W / 2 + panX * 0.1, sy, 40, 0, Math.PI * 2); 
                ctx.fill();
                
                ctx.fillStyle = env.skyBot; 
                for (let i = 0; i < 6; i++) {
                    ctx.fillRect(W / 2 - 50 + panX * 0.1, sy + 10 - i * 8, 100, 2 + i * 0.5);
                }
            }

            // 云海层
            if (flyProgress > 0 && !isSpace) {
                ctx.globalAlpha = flyProgress;
                let cloudBase = env.nightFactor > 0.5 ? '#1a2b3c' : '#ffffff';
                let cloudShadow = env.nightFactor > 0.5 ? '#0c1520' : '#e0e8f0';

                ctx.fillStyle = cloudBase;
                ctx.fillRect(0, HORIZON, W, H - HORIZON); 
                
                for (let i = 0; i < 15; i++) {
                    ctx.fillStyle = (i % 2 === 0) ? cloudBase : cloudShadow;
                    ctx.beginPath();
                    let cx = (i * 70 + panX * 0.2) % (W + 140) - 70;
                    let cy = HORIZON + (i % 3) * 12;
                    let r = 50 + Math.sin(i * 99) * 30;
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }

            // 地面建筑与生态渲染
            if (bAlpha > 0 && !isSpace) {
                ctx.globalAlpha = bAlpha;
                let bOffset = Math.max(0, -renderCamY - 60); 
                
                bgItems.forEach(b => {
                    let bx = b.x + panX;
                    let cx = bx + b.w / 2;
                    let isLeft = cx < W / 2; 
                    let bY = HORIZON + bOffset; 
                    let type = b.type;

                    if (type === 'city' || type === 'factory') {
                        ctx.fillStyle = env.nightFactor > 0.3 ? `hsl(${b.hue}, 50%, 4%)` : `hsl(${b.hue}, 20%, 20%)`;
                        ctx.beginPath();
                        if (isLeft) { 
                            ctx.moveTo(bx + b.w, bY); 
                            ctx.lineTo(bx + b.w, bY - b.h); 
                            ctx.lineTo(bx + b.w + b.d, bY - b.h + b.d * 0.3); 
                            ctx.lineTo(bx + b.w + b.d, bY); 
                        } else { 
                            ctx.moveTo(bx, bY); 
                            ctx.lineTo(bx, bY - b.h); 
                            ctx.lineTo(bx - b.d, bY - b.h + b.d * 0.3); 
                            ctx.lineTo(bx - b.d, bY); 
                        }
                        ctx.fill();

                        ctx.fillStyle = env.nightFactor > 0.3 ? `hsl(${b.hue}, 40%, 8%)` : `hsl(${b.hue}, 20%, 30%)`;
                        ctx.fillRect(bx, bY - b.h, b.w, b.h);
                        
                        if (type === 'city' && env.nightFactor > 0.5) { 
                            ctx.strokeStyle = `hsl(${b.hue}, 100%, 50%)`; 
                            ctx.lineWidth = 1; 
                            ctx.strokeRect(bx, bY - b.h, b.w, b.h); 
                        }
                        
                        if (type === 'factory' && b.seed > 0.5) { 
                            ctx.fillStyle = '#ff0000'; 
                            ctx.fillRect(bx + b.w / 2 - 2, bY - b.h - 5, 4, 4); 
                        }
                        
                        if (type === 'city' && env.nightFactor > 0.1) {
                            b.windows.forEach(w => {
                                ctx.fillStyle = w.color; 
                                ctx.globalAlpha = bAlpha * env.nightFactor * 0.9; 
                                ctx.fillRect(bx + w.x, bY - b.h + w.y, 4, 3);
                            });
                            ctx.globalAlpha = bAlpha;
                        }
                    } else if (type === 'desert') {
                        ctx.fillStyle = `hsl(${b.hue}, 40%, ${30 - env.nightFactor * 20}%)`; 
                        ctx.beginPath(); 
                        ctx.moveTo(bx - b.w, bY); 
                        ctx.lineTo(bx + b.w / 2, bY - b.h); 
                        ctx.lineTo(bx + b.w * 2, bY); 
                        ctx.fill();
                    } else if (type === 'ruins') {
                        ctx.fillStyle = `hsl(${b.hue}, 10%, ${20 - env.nightFactor * 10}%)`; 
                        ctx.fillRect(bx, bY - b.h, b.w, b.h);
                        ctx.clearRect(bx + b.w * 0.2, bY - b.h - 5, b.w * 0.3, b.h * 0.2); 
                    } else if (type === 'coast') {
                        ctx.fillStyle = `hsl(${b.hue}, 50%, ${20 - env.nightFactor * 10}%)`; 
                        ctx.beginPath(); 
                        ctx.moveTo(bx, bY); 
                        ctx.lineTo(bx + 10, bY - b.h * 0.4); 
                        ctx.lineTo(bx + 30, bY - b.h * 0.4); 
                        ctx.fill(); 
                    }
                });
                
                ctx.fillStyle = '#000000'; 
                ctx.fillRect(0, HORIZON + bOffset - 2, W, 2);
                ctx.globalAlpha = 1.0;
            }
        }

        function drawRoad(env, bAlpha) {
            if (bAlpha <= 0 || isSpace) return; 
            
            ctx.globalAlpha = bAlpha;
            ctx.fillStyle = '#0a0a0a'; 
            ctx.fillRect(0, HORIZON, W, H);
            
            let startZ = Math.floor((renderCamZ + DRAW_DIST) / SEG_LENGTH) * SEG_LENGTH;
            for (let z = startZ; z > renderCamZ + 5; z -= SEG_LENGTH) {
                let p1_l = project(-ROAD_WIDTH, 0, z);
                let p1_r = project(ROAD_WIDTH, 0, z);
                let p2_l = project(-ROAD_WIDTH, 0, z - SEG_LENGTH);
                let p2_r = project(ROAD_WIDTH, 0, z - SEG_LENGTH);
                
                if (!p1_l || !p2_l) continue;
                
                let index = Math.floor(z / 100);
                ctx.fillStyle = (index % 2 === 0) ? env.roadD : env.roadL;
                
                ctx.beginPath(); 
                ctx.moveTo(p1_l.sx, p1_l.sy); 
                ctx.lineTo(p1_r.sx, p1_r.sy);
                ctx.lineTo(p2_r.sx, p2_r.sy); 
                ctx.lineTo(p2_l.sx, p2_l.sy); 
                ctx.fill();

                if (index % 2 === 0) {
                    ctx.strokeStyle = env.line; 
                    ctx.lineWidth = Math.max(1, p1_l.scale * 2);
                    if (env.nightFactor > 0.5) { 
                        ctx.shadowBlur = 8; 
                        ctx.shadowColor = env.line; 
                    }
                    [-75, 0, 75].forEach(lineX => {
                        let pc1 = project(lineX, 0, z);
                        let pc2 = project(lineX, 0, z - SEG_LENGTH);
                        if (pc1 && pc2) { 
                            ctx.beginPath(); 
                            ctx.moveTo(pc1.sx, pc1.sy); 
                            ctx.lineTo(pc2.sx, pc2.sy); 
                            ctx.stroke(); 
                        }
                    });
                    ctx.shadowBlur = 0;
                }
                
                ctx.strokeStyle = env.nightFactor > 0.5 ? '#ff00ff' : '#888888'; 
                ctx.lineWidth = Math.max(1, p1_l.scale * 4);
                
                ctx.beginPath(); 
                ctx.moveTo(p1_l.sx, p1_l.sy); 
                ctx.lineTo(p2_l.sx, p2_l.sy); 
                ctx.stroke();
                
                ctx.beginPath(); 
                ctx.moveTo(p1_r.sx, p1_r.sy); 
                ctx.lineTo(p2_r.sx, p2_r.sy); 
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
        }

        // ==========================================
        // 9. 精细 3D 几何与模型构建系统
        // 完全不依赖外部模型，全靠原生的多边形投影
        // ==========================================
        function drawTrue3DBox(x, y, z, w, h, L, colorBody, colorSide, colorTop, tiltX, env, rotZ = 0) {
            let bp = project(x + tiltX, y, z); 
            let fp = project(x + tiltX, y, z + L); 
            if (!bp || !fp) return null;

            let rotOffset = rotZ * bp.scale * 15;
            let bw = w * bp.scale;
            let bh = h * bp.scale;
            let fw = w * fp.scale;
            let fh = h * fp.scale;
            
            // 顶部面
            ctx.fillStyle = colorTop;
            ctx.beginPath(); 
            ctx.moveTo(bp.sx - bw / 2 + rotOffset, bp.sy - bh); 
            ctx.lineTo(bp.sx + bw / 2 + rotOffset, bp.sy - bh);
            ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy - fh); 
            ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy - fh); 
            ctx.fill();

            // 侧面透视（决定露出左脸还是右脸）
            ctx.fillStyle = colorSide;
            ctx.beginPath();
            if (x - renderCamX < 0) { 
                ctx.moveTo(bp.sx + bw / 2 + rotOffset, bp.sy); 
                ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy);
                ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy - fh); 
                ctx.lineTo(bp.sx + bw / 2 + rotOffset, bp.sy - bh);
            } else { 
                ctx.moveTo(bp.sx - bw / 2 + rotOffset, bp.sy); 
                ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy);
                ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy - fh); 
                ctx.lineTo(bp.sx - bw / 2 + rotOffset, bp.sy - bh);
            }
            ctx.fill();

            // 背面
            ctx.fillStyle = colorBody; 
            ctx.fillRect(bp.sx - bw / 2 + rotOffset, bp.sy - bh, bw, bh);
            
            return { bp, bw, bh, s: bp.scale, rot: rotOffset };
        }

        // 小轿车/跑车
        function draw3DCar(x, y, z, type, hue, sat, tiltX, isPlayer, env, rotZ = 0) {
            let w = 28, h1 = 10, L1 = 30, roofW = 20, roofH = 8, roofL = 15, roofZ = 8; 
            let tilt = tiltX * 3; 
            let bCol = `hsl(${hue},${sat}%,45%)`;
            let sCol = `hsl(${hue},${sat}%,25%)`;
            let tCol = `hsl(${hue},${sat}%,60%)`;
            let glCol = `hsl(190,80%,${30 + env.nightFactor * 60}%)`;
            let glSide = `hsl(190,80%,${15 + env.nightFactor * 40}%)`;

            // 落地阴影
            let pBL = project(x - w / 2, y, z);
            let pBR = project(x + w / 2, y, z);
            let pFL = project(x - w / 2, y, z + L1);
            let pFR = project(x + w / 2, y, z + L1);
            if (pBL && pBR && pFL && pFR && rotZ === 0 && y >= -10 && !isSpace && !isFlying) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; 
                ctx.beginPath(); 
                ctx.moveTo(pBL.sx, pBL.sy); 
                ctx.lineTo(pBR.sx, pBR.sy);
                ctx.lineTo(pFR.sx, pFR.sy); 
                ctx.lineTo(pFL.sx, pFL.sy); 
                ctx.fill();
            }

            let lower = drawTrue3DBox(x, y, z, w, h1, L1, bCol, sCol, tCol, tilt, env, rotZ);
            let cabin = drawTrue3DBox(x, y - h1, z + roofZ, roofW, roofH, roofL, glCol, glSide, tCol, tilt, env, rotZ);

            if (lower) {
                let s = lower.s, bx = lower.bp.sx + lower.rot, by = lower.bp.sy, bw = lower.bw, bh = lower.bh;
                
                // 轮胎
                ctx.fillStyle = '#050505'; 
                ctx.fillRect(bx - bw * 0.5, by - bh * 0.4, bw * 0.15, bh * 0.6); 
                ctx.fillRect(bx + bw * 0.35, by - bh * 0.4, bw * 0.15, bh * 0.6);
                
                // 保险杠
                ctx.fillStyle = '#111111'; 
                ctx.fillRect(bx - bw * 0.35, by - bh * 0.3, bw * 0.7, bh * 0.25);

                // 发光尾灯
                let tailLight = isPlayer ? (50 + env.nightFactor * 40) : 30;
                ctx.fillStyle = `hsl(350, 100%, ${tailLight}%)`;
                if (env.nightFactor > 0.3 || isPlayer) { 
                    ctx.shadowBlur = 12 * s; 
                    ctx.shadowColor = '#ff0055'; 
                }
                ctx.fillRect(bx - bw * 0.45, by - bh * 0.75, bw * 0.25, bh * 0.3); 
                ctx.fillRect(bx + bw * 0.2, by - bh * 0.75, bw * 0.25, bh * 0.3); 
                ctx.shadowBlur = 0;

                // 运动尾翼
                if (type === 'sports' || isPlayer) {
                   ctx.fillStyle = sCol; 
                   ctx.fillRect(bx - bw * 0.35, by - bh - 6 * s, 3 * s, 6 * s); 
                   ctx.fillRect(bx + bw * 0.25, by - bh - 6 * s, 3 * s, 6 * s);
                   ctx.fillStyle = bCol; 
                   ctx.fillRect(bx - bw * 0.48 + tilt * s, by - bh - 8 * s, bw * 0.96, 3 * s);
                }
            }
            
            // 特效：护盾与喷火
            if (isPlayer) {
                if (isShielded) {
                    let pC = project(x, y - 10, z + 15);
                    if (pC) {
                        ctx.beginPath(); 
                        ctx.ellipse(pC.sx, pC.sy, 35 * pC.scale, 25 * pC.scale, 0, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(0, 255, 255, 0.15)'; 
                        ctx.fill();
                        ctx.strokeStyle = '#00ffff'; 
                        ctx.lineWidth = 2 * pC.scale;
                        ctx.setLineDash([15 * pC.scale, 10 * pC.scale]); 
                        ctx.lineDashOffset = -frameCount * 0.5; 
                        ctx.stroke(); 
                        ctx.setLineDash([]);
                    }
                }
                if (isFlying || isSpace || speedTimer > 0) { 
                    let pJet = project(x, y - 5, z);
                    if (pJet) {
                        ctx.fillStyle = '#ff5500'; 
                        ctx.beginPath(); 
                        ctx.arc(pJet.sx, pJet.sy, 25 * pJet.scale * Math.random() + 10, 0, Math.PI * 2); 
                        ctx.fill();
                        
                        ctx.fillStyle = '#ffff00'; 
                        ctx.beginPath(); 
                        ctx.arc(pJet.sx, pJet.sy, 15 * pJet.scale * Math.random() + 5, 0, Math.PI * 2); 
                        ctx.fill();
                    }
                }
            }
        }

        // 大卡车与小猪
        function draw3DTruck(x, y, z, hue, tiltX, env, rotZ = 0) {
            let tilt = tiltX * 3;
            let bCol = `hsl(${hue}, 30%, 40%)`;
            let sCol = `hsl(${hue}, 30%, 20%)`;
            let tCol = `hsl(${hue}, 30%, 50%)`;
            
            // 底盘与车头
            drawTrue3DBox(x, y - 4, z, 38, 8, 70, '#222222', '#111111', '#333333', tilt, env, rotZ); 
            drawTrue3DBox(x, y - 12, z + 45, 38, 22, 25, bCol, sCol, tCol, tilt, env, rotZ); 
            
            // 进气与排气
            drawTrue3DBox(x, y - 20, z + 70, 36, 4, 2, '#111111', '#000000', '#222222', tilt, env, rotZ); 
            drawTrue3DBox(x - 14, y - 34, z + 42, 4, 15, 4, '#555555', '#333333', '#777777', tilt, env, rotZ);
            drawTrue3DBox(x + 14, y - 34, z + 42, 4, 15, 4, '#555555', '#333333', '#777777', tilt, env, rotZ);

            drawTrue3DBox(x, y - 22, z + 71, 34, 14, 1, '#4488cc', '#224466', '#88ccff', tilt, env, rotZ); 
            
            // 货厢
            drawTrue3DBox(x - 17, y - 12, z, 4, 16, 45, bCol, sCol, tCol, tilt, env, rotZ); 
            drawTrue3DBox(x + 17, y - 12, z, 4, 16, 45, bCol, sCol, tCol, tilt, env, rotZ); 
            drawTrue3DBox(x, y - 12, z, 38, 16, 2, bCol, sCol, tCol, tilt, env, rotZ); 

            // 6大轮子
            let wCol = '#050505', wSide = '#000000', wTop = '#111111';
            drawTrue3DBox(x - 18, y, z + 10, 8, 14, 14, wCol, wSide, wTop, tilt, env, rotZ);
            drawTrue3DBox(x + 18, y, z + 10, 8, 14, 14, wCol, wSide, wTop, tilt, env, rotZ);
            drawTrue3DBox(x - 18, y, z + 35, 8, 14, 14, wCol, wSide, wTop, tilt, env, rotZ);
            drawTrue3DBox(x + 18, y, z + 35, 8, 14, 14, wCol, wSide, wTop, tilt, env, rotZ);
            drawTrue3DBox(x - 18, y, z + 55, 8, 14, 14, wCol, wSide, wTop, tilt, env, rotZ);
            drawTrue3DBox(x + 18, y, z + 55, 8, 14, 14, wCol, wSide, wTop, tilt, env, rotZ);

            // 小猪
            let pBack = project(x + tilt + rotZ * 5, y - 14, z + 25);
            if(pBack) {
                let w = 24 * pBack.scale;
                let sx = pBack.sx;
                let sy = pBack.sy;
                
                ctx.fillStyle = '#ff66b2'; 
                ctx.fillRect(sx - w * 0.6, sy - w * 1.1, w * 0.4, w * 0.6); 
                ctx.fillRect(sx + w * 0.2, sy - w * 1.1, w * 0.4, w * 0.6);
                
                ctx.fillStyle = '#ff99cc'; 
                ctx.fillRect(sx - w / 2, sy - w, w, w); 
                
                ctx.fillStyle = '#ff6699'; 
                ctx.fillRect(sx - w * 0.4, sy - w * 0.5, w * 0.8, w * 0.4); 
                
                ctx.fillStyle = '#cc0033'; 
                ctx.fillRect(sx - w * 0.2, sy - w * 0.4, w * 0.15, w * 0.2); 
                ctx.fillRect(sx + w * 0.05, sy - w * 0.4, w * 0.15, w * 0.2); 
                
                ctx.fillStyle = '#000000'; 
                ctx.fillRect(sx - w * 0.3, sy - w * 0.8, w * 0.2, w * 0.2); 
                ctx.fillRect(sx + w * 0.1, sy - w * 0.8, w * 0.2, w * 0.2); 
            }
        }

        function draw3DMotor(x, y, z, hue, tiltX, env, rotZ = 0) {
            let tilt = tiltX * 4; 
            let mCol = `hsl(${hue}, 80%, 40%)`;
            let mSide = `hsl(${hue}, 80%, 20%)`;
            let mTop = `hsl(${hue}, 80%, 50%)`;

            drawTrue3DBox(x, y, z, 4, 14, 14, '#050505', '#000000', '#111111', tilt, env, rotZ); 
            drawTrue3DBox(x, y, z + 30, 4, 14, 14, '#050505', '#000000', '#111111', tilt, env, rotZ); 
            
            drawTrue3DBox(x, y - 6, z + 8, 8, 12, 24, mCol, mSide, mTop, tilt, env, rotZ); 
            drawTrue3DBox(x, y - 14, z + 28, 4, 16, 4, '#222222', '#111111', '#333333', tilt, env, rotZ); 
            drawTrue3DBox(x, y - 10, z + 32, 6, 6, 2, '#ffffff', '#cccccc', '#ffffff', tilt, env, rotZ); 
            drawTrue3DBox(x - 5, y - 6, z, 4, 4, 12, '#333333', '#111111', '#555555', tilt, env, rotZ); 

            drawTrue3DBox(x, y - 18, z + 12, 10, 12, 16, '#111111', '#000000', '#222222', tilt, env, rotZ); 
            drawTrue3DBox(x, y - 24, z + 22, 8, 8, 10, '#222222', '#111111', '#333333', tilt, env, rotZ); 
        }

        // 天空障碍物
        function draw3DAirplane(x, y, z, env, rotZ = 0) {
            drawTrue3DBox(x, y, z, 24, 24, 90, '#eeeeee', '#cccccc', '#ffffff', 0, env, rotZ); 
            drawTrue3DBox(x - 12, y - 4, z + 30, 26, 4, 40, '#111111', '#000000', '#222222', 0, env, rotZ);
            drawTrue3DBox(x, y + 6, z + 35, 140, 4, 25, '#dddddd', '#bbbbbb', '#eeeeee', 0, env, rotZ); 
            drawTrue3DBox(x - 40, y + 10, z + 30, 10, 10, 20, '#555555', '#333333', '#777777', 0, env, rotZ); 
            drawTrue3DBox(x + 40, y + 10, z + 30, 10, 10, 20, '#555555', '#333333', '#777777', 0, env, rotZ); 
            drawTrue3DBox(x, y - 15, z, 6, 25, 20, '#ff0055', '#cc0033', '#ff3366', 0, env, rotZ); 
        }

        function draw3DHeli(x, y, z, env, rotZ = 0) {
            drawTrue3DBox(x, y, z, 28, 30, 45, '#333333', '#111111', '#555555', 0, env, rotZ); 
            drawTrue3DBox(x, y - 5, z + 35, 24, 15, 10, '#4488cc', '#224466', '#88ccff', 0, env, rotZ); 
            
            drawTrue3DBox(x, y + 12, z - 35, 8, 8, 45, '#333333', '#111111', '#555555', 0, env, rotZ); 
            drawTrue3DBox(x + 6, y + 10, z - 40, 2, 15, 2, '#888888', '#555555', '#aaaaaa', 0, env, rotZ); 
            
            drawTrue3DBox(x - 12, y + 20, z + 5, 4, 4, 50, '#555555', '#333333', '#777777', 0, env, rotZ); 
            drawTrue3DBox(x + 12, y + 20, z + 5, 4, 4, 50, '#555555', '#333333', '#777777', 0, env, rotZ); 

            let propW = (frameCount % 6 < 3) ? 120 : 10;
            let propL = (frameCount % 6 < 3) ? 10 : 120;
            drawTrue3DBox(x, y - 28, z + 10, propW, 2, propL, '#888888', '#555555', '#aaaaaa', 0, env, rotZ);
        }

        function draw3DMissile(x, y, z, env, rotZ = 0) {
            drawTrue3DBox(x, y, z, 10, 10, 40, '#dd0000', '#aa0000', '#ff3333', 0, env, rotZ);
            drawTrue3DBox(x, y, z + 40, 4, 4, 15, '#333333', '#111111', '#555555', 0, env, rotZ);
            drawTrue3DBox(x, y - 8, z + 5, 2, 16, 10, '#ffffff', '#cccccc', '#ffffff', 0, env, rotZ); 
            drawTrue3DBox(x - 8, y, z + 5, 16, 2, 10, '#ffffff', '#cccccc', '#ffffff', 0, env, rotZ); 

            let pJet = project(x, y, z);
            if (pJet) {
                ctx.fillStyle = '#ffaa00'; 
                ctx.beginPath(); 
                ctx.arc(pJet.sx, pJet.sy, 20 * pJet.scale * Math.random() + 10, 0, Math.PI * 2); 
                ctx.fill();
            }
        }

        // 太空障碍物
        function draw3DSatellite(x, y, z, env, rotZ = 0) {
            drawTrue3DBox(x, y, z, 25, 25, 25, '#aaaaaa', '#888888', '#cccccc', 0, env, 0);
            drawTrue3DBox(x, y - 15, z + 12, 10, 10, 2, '#ffffff', '#cccccc', '#ffffff', 0, env, 0); 
            drawTrue3DBox(x - 40, y, z + 5, 50, 2, 15, '#0055aa', '#003388', '#0077cc', 0, env, rotZ);
            drawTrue3DBox(x + 40, y, z + 5, 50, 2, 15, '#0055aa', '#003388', '#0077cc', 0, env, rotZ);
        }

        function draw3DMeteorite(x, y, z, env, rotZ = 0) {
            drawTrue3DBox(x, y, z, 35, 30, 35, '#443322', '#221100', '#554433', 0, env, rotZ);
            drawTrue3DBox(x - 15, y - 10, z - 10, 25, 25, 25, '#332211', '#110000', '#443322', 0, env, rotZ);
            drawTrue3DBox(x + 15, y + 10, z + 10, 30, 20, 30, '#554433', '#332211', '#665544', 0, env, rotZ);
            drawTrue3DBox(x, y - 20, z + 15, 20, 35, 20, '#665544', '#443322', '#776655', 0, env, rotZ);
        }

        // 道具渲染
        function drawItem(p, type) {
            let s = p.scale * 30; 
            ctx.font = `${s}px Arial`; 
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            let icon = '';
            if (type === 'item_shield') icon = '💠';
            else if (type === 'item_fly') icon = '🚀';
            else if (type === 'item_speed') icon = '⚡'; 
            else if (type === 'item_wings') icon = '🦋';
            ctx.fillText(icon, p.sx, p.sy);
        }

        // 路边装饰
        function drawRoadside(p, side, env, type, bAlpha) {
            if (bAlpha <= 0 || isSpace) return; 
            ctx.globalAlpha = bAlpha;
            let s = p.scale;
            
            if (type === 'light') {
                ctx.fillStyle = env.nightFactor > 0.3 ? '#111111' : '#333333'; 
                ctx.fillRect(p.sx - 2 * s, p.sy - 140 * s, 4 * s, 140 * s); 
                ctx.fillRect(p.sx - 2 * s + (side === 1 ? -45 * s : 0), p.sy - 140 * s, 49 * s, 4 * s);
                
                let lightX = p.sx + (side === 1 ? -45 * s : 45 * s);
                ctx.fillStyle = env.nightFactor > 0.5 ? '#00ffff' : '#aaaaaa';
                if (env.nightFactor > 0.5) { 
                    ctx.shadowBlur = 20 * s; 
                    ctx.shadowColor = '#00ffff'; 
                }
                ctx.fillRect(lightX - 6 * s, p.sy - 136 * s, 12 * s, 6 * s); 
                ctx.shadowBlur = 0;
            } else if (type === 'cactus') {
                ctx.fillStyle = '#228822'; 
                ctx.fillRect(p.sx - 5 * s, p.sy - 60 * s, 10 * s, 60 * s); 
                ctx.fillRect(p.sx - 15 * s, p.sy - 40 * s, 10 * s, 30 * s); 
                ctx.fillRect(p.sx + 5 * s, p.sy - 50 * s, 10 * s, 40 * s);
            } else if (type === 'pillar') {
                ctx.fillStyle = '#444444'; 
                ctx.fillRect(p.sx - 8 * s, p.sy - 80 * s, 16 * s, 80 * s); 
                ctx.fillStyle = '#222222'; 
                ctx.fillRect(p.sx - 10 * s, p.sy - 10 * s, 20 * s, 10 * s);
            } else if (type === 'pipe') {
                ctx.fillStyle = '#555555'; 
                ctx.fillRect(p.sx - 6 * s, p.sy - 100 * s, 12 * s, 100 * s); 
                ctx.fillStyle = '#ff0000'; 
                ctx.fillRect(p.sx - 6 * s, p.sy - 100 * s, 12 * s, 5 * s);
            } else if (type === 'palm') {
                ctx.fillStyle = '#553311'; 
                ctx.fillRect(p.sx - 3 * s, p.sy - 80 * s, 6 * s, 80 * s); 
                ctx.fillStyle = '#22aa22'; 
                ctx.beginPath(); 
                ctx.arc(p.sx, p.sy - 80 * s, 30 * s, 0, Math.PI); 
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        // ==========================================
        // 10. 深度排序混合渲染 (画家算法)
        // ==========================================
        function drawObjects(env, bAlpha) {
            let renderList =[];
            
            // 加入玩家
            if (!isFirstPerson) {
                renderList.push({ type: 'player', x: carX, y: playerY, z: camZ + playerZOffset, tilt: carVX });
            }
            
            // 加入障碍物和路边建筑
            obstacles.forEach(ob => renderList.push(ob));
            props.forEach(pr => renderList.push(pr));

            // 按 Z 轴排序 (从远到近绘制)
            renderList.sort((a, b) => b.z - a.z);

            renderList.forEach(obj => {
                let isPlayer = (obj.type === 'player');
                let isGround = obj.y >= -20 && !isPlayer && !obj.type.startsWith('item'); 
                
                // 核心逻辑隔离：天空中绝不渲染地上的车和树木
                if (isGround && (bAlpha <= 0 || isSpace)) return; 

                let p = project(obj.x, obj.y, obj.z);
                if (p) {
                    ctx.globalAlpha = isGround ? bAlpha : 1.0;

                    if (['light','cactus','pillar','pipe','palm'].includes(obj.type)) {
                        drawRoadside(p, obj.side, env, obj.type, bAlpha);
                    }
                    else if (obj.type.startsWith('item')) {
                        drawItem(p, obj.type);
                    }
                    else if (obj.type === 'truck') {
                        draw3DTruck(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'motor') {
                        draw3DMotor(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'airplane') {
                        draw3DAirplane(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'heli') {
                        draw3DHeli(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'missile') {
                        draw3DMissile(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'sat') {
                        draw3DSatellite(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'met') {
                        draw3DMeteorite(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else {
                        draw3DCar(obj.x, obj.y, obj.z, obj.type, obj.hue || 340, obj.sat || 100, isPlayer ? obj.tilt : 0, isPlayer, env, obj.rot || 0);
                    }
                    
                    ctx.globalAlpha = 1.0;
                }
            });
        }

        // ==========================================
        // 11. 第一人称顶级奢华驾驶舱
        // ==========================================
        function drawCockpit(env) {
            // 框架
            ctx.fillStyle = '#080808'; 
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(45, 0); ctx.lineTo(15, 180); ctx.lineTo(0, 180); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(W - 45, 0); ctx.lineTo(W - 15, 180); ctx.lineTo(W, 180); ctx.fill(); 
            ctx.fillRect(0, 0, W, 20); 

            // 引擎盖
            let hoodBase = 210; 
            ctx.fillStyle = `hsl(340, 80%, ${15 + env.nightFactor * 5}%)`;
            ctx.beginPath(); ctx.moveTo(0, hoodBase); ctx.lineTo(W, hoodBase); ctx.lineTo(W * 0.8, 175); ctx.lineTo(W * 0.2, 175); ctx.fill();
            
            ctx.fillStyle = `hsl(340, 80%, ${10 + env.nightFactor * 5}%)`;
            ctx.beginPath(); ctx.moveTo(W * 0.3, hoodBase); ctx.lineTo(W * 0.38, 175); ctx.lineTo(W * 0.33, 175); ctx.lineTo(W * 0.25, hoodBase); ctx.fill();
            ctx.beginPath(); ctx.moveTo(W * 0.7, hoodBase); ctx.lineTo(W * 0.62, 175); ctx.lineTo(W * 0.67, 175); ctx.lineTo(W * 0.75, hoodBase); ctx.fill();
            
            if (env.nightFactor > 0.5) {
                ctx.strokeStyle = '#ff0055'; 
                ctx.lineWidth = 1.5; 
                ctx.shadowBlur = 10; 
                ctx.shadowColor = '#ff0055';
                ctx.beginPath(); ctx.moveTo(W * 0.38, 175); ctx.lineTo(W * 0.62, 175); ctx.stroke(); 
                ctx.shadowBlur = 0;
            }

            // 中控台与纹理
            let grad = ctx.createLinearGradient(0, 180, 0, H); 
            grad.addColorStop(0, '#111111'); 
            grad.addColorStop(1, '#050505');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.moveTo(0, hoodBase - 5); ctx.quadraticCurveTo(W / 2, 185, W, hoodBase - 5); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; ctx.lineWidth = 1;
            for (let i = 190; i < H; i += 4) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }
            
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2;
            if (env.nightFactor > 0.5) { ctx.shadowBlur = 8; ctx.shadowColor = '#00ffff'; }
            ctx.beginPath(); ctx.moveTo(0, hoodBase - 3); ctx.quadraticCurveTo(W / 2, 187, W, hoodBase - 3); ctx.stroke(); ctx.shadowBlur = 0;

            let cx = W / 2;
            
            // 出风口
            ctx.fillStyle = '#050505'; ctx.fillRect(cx - 130, 195, 50, 25);
            ctx.strokeStyle = '#222222'; ctx.lineWidth = 2;
            for (let i = 198; i <= 215; i += 5) { ctx.beginPath(); ctx.moveTo(cx - 125, i); ctx.lineTo(cx - 85, i); ctx.stroke(); }
            ctx.fillStyle = '#050505'; ctx.fillRect(cx + 80, 195, 50, 25);
            for (let i = 198; i <= 215; i += 5) { ctx.beginPath(); ctx.moveTo(cx + 85, i); ctx.lineTo(cx + 125, i); ctx.stroke(); }

            // 中央信息显示 (HUD)
            ctx.fillStyle = '#050505'; ctx.fillRect(cx - 50, 195, 100, 28);
            ctx.strokeStyle = '#222222'; ctx.strokeRect(cx - 50, 195, 100, 28);
            ctx.fillStyle = '#00ffff'; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center';
            let displaySpeed = gameSpeed + (speedTimer > 0 ? 12 : 0);
            ctx.fillText(Math.floor(displaySpeed * (isSpace ? 0.6 : 1) * 15), cx, 210);
            ctx.font = '10px Courier New'; ctx.fillText("KM/H", cx, 220);

            // 雷达显示
            let rx = cx + 140, ry = 200, rw = 70, rh = 50;
            ctx.fillStyle = '#001111'; ctx.fillRect(rx, ry, rw, rh);
            
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)'; ctx.lineWidth = 1;
            for (let i = 10; i < rw; i += 10) { ctx.beginPath(); ctx.moveTo(rx + i, ry); ctx.lineTo(rx + i, ry + rh); ctx.stroke(); }
            for (let i = 10; i < rh; i += 10) { ctx.beginPath(); ctx.moveTo(rx, ry + i); ctx.lineTo(rx + rw, ry + i); ctx.stroke(); }
            
            ctx.strokeStyle = '#005533'; ctx.strokeRect(rx, ry, rw, rh);
            ctx.strokeStyle = '#003322'; ctx.beginPath(); ctx.moveTo(rx + rw / 2, ry); ctx.lineTo(rx + rw / 2, ry + rh); ctx.stroke(); 
            ctx.fillStyle = '#00ff00'; ctx.fillRect(rx + rw / 2 - 2, ry + rh - 10, 4, 4); 
            
            ctx.fillStyle = 'rgba(0, 255, 0, 0.4)'; ctx.font = 'bold 20px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic';
            ctx.fillText('翔', rx + rw - 5, ry + 22);

            obstacles.forEach(ob => { 
                if (ob.z > camZ && ob.z < camZ + 800) {
                    let mapX = rx + rw / 2 + (ob.x - carX) * 0.15;
                    let mapY = ry + rh - 10 - (ob.z - (camZ + playerZOffset)) * 0.05;
                    if (mapX > rx && mapX < rx + rw && mapY > ry && mapY < ry + rh) {
                        ctx.fillStyle = (ob.type.startsWith('item')) ? '#00ffff' : '#ff0000';
                        ctx.fillRect(mapX, mapY, 3, 3);
                    }
                }
            });

            // 皮革方向盘
            ctx.save(); 
            ctx.translate(cx, H + 20); 
            ctx.rotate(carVX * 0.14); 
            
            ctx.strokeStyle = '#050505'; ctx.lineWidth = 26; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#181818'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke();
            
            ctx.strokeStyle = '#333333'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, 78, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
            ctx.strokeStyle = '#880000'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]);
            ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
            
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, -Math.PI / 2 - 0.12, -Math.PI / 2 + 0.12); ctx.stroke();

            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); ctx.moveTo(-32, -5); ctx.lineTo(-80, -15); ctx.lineTo(-80, 15); ctx.lineTo(-32, 10); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(32, -5); ctx.lineTo(80, -15); ctx.lineTo(80, 15); ctx.lineTo(32, 10); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(-15, 30); ctx.lineTo(-20, 80); ctx.lineTo(20, 80); ctx.lineTo(15, 30); ctx.fill(); 
            
            ctx.fillStyle = '#2a2a2a'; 
            ctx.beginPath(); ctx.moveTo(-32, -3); ctx.lineTo(-78, -10); ctx.lineTo(-78, 0); ctx.lineTo(-32, 2); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(32, -3); ctx.lineTo(78, -10); ctx.lineTo(78, 0); ctx.lineTo(32, 2); ctx.fill(); 

            ctx.fillStyle = '#111111'; ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#080808'; ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill(); 
            ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // ==========================================
        // 12. 游戏物理循环与碰撞系统
        // ==========================================
        function update() {
            if (speedTimer > 0) speedTimer--; 
            
            // 平滑速度控制
            let targetSpeedMult = isSpace ? 0.6 : (isFlying ? 0.85 : 1.0);
            actualSpeedMult += (targetSpeedMult - actualSpeedMult) * 0.05;
            
            let currentSpeed = (gameSpeed + (speedTimer > 0 ? 12 : 0)) * actualSpeedMult; 
            
            // 引擎音效更新
            updateEngineSound(currentSpeed, isSpace);

            if (isSpace) bonusScore += 4;
            else if (isFlying) bonusScore += 1;

            camZ += currentSpeed;
            score = Math.floor(camZ / 50) + bonusScore; 
            document.getElementById('scoreVal').innerText = "[ SCORE: " + score + " ]";
            
            let status = "";
            if (isSpace) status += "🌌 SPACE WARP ";
            else if (isFlying) status += "🚀 FLIGHT ";
            if (isShielded) status += "💠 SHIELD ";
            if (speedTimer > 0) status += "⚡ BOOST ";
            document.getElementById('statusVal').innerText = status;

            // 降低提速斜率
            if (gameSpeed < speedCap) gameSpeed += 0.001; 

            if (keys.a) carVX -= 0.85;
            if (keys.d) carVX += 0.85;
            carVX *= 0.82; 
            carX += carVX;
            let maxCarX = ROAD_WIDTH - 20;
            if (carX < -maxCarX) { carX = -maxCarX; carVX = 0; }
            if (carX > maxCarX) { carX = maxCarX; carVX = 0; }

            // 跃迁逻辑
            if (spaceTimer > 0) {
                spaceTimer--;
                playerY += (-350 - playerY) * 0.05; 
                if (spaceTimer <= 0) { isSpace = false; bonusScore += 1500; }
            } else if (flyTimer > 0) {
                flyTimer--;
                playerY += (-160 - playerY) * 0.05; 
                if (flyTimer <= 0) { isFlying = false; bonusScore += 800; }
            } else {
                playerY += (0 - playerY) * 0.05; 
            }

            isFlying = playerY < -100; 
            isSpace = playerY < -250;
            
            if (isShielded) { 
                shieldTimer--; 
                if (shieldTimer <= 0) isShielded = false; 
            }

            if (isFirstPerson) {
                renderCamX = carX * 0.75; renderCamY = playerY - 25; renderCamZ = camZ + playerZOffset - 5; 
            } else {
                renderCamX = 0; renderCamY = playerY - 60; renderCamZ = camZ;
            }

            frameCount++;
            let spawnRate = Math.max(30, baseSpawnRate - Math.floor(score / 150));
            
            // ============================
            // 严格的空域分层生成逻辑
            // ============================
            if (!isSpace && !isFlying && frameCount % spawnRate === 0) {
                let xPos = (Math.random() * 260) - 130; 
                let type = 'sedan', rnd = Math.random();
                if (rnd < 0.2) type = 'truck';
                else if (rnd < 0.4) type = 'motor';
                else if (rnd < 0.7) type = 'sports';
                
                let itemRoll = Math.random();
                if (itemRoll < 0.02) type = 'item_speed';
                else if (itemRoll < 0.04) type = 'item_fly';
                else if (itemRoll < 0.06) type = 'item_shield';
                // 地面绝对无翅膀

                obstacles.push({ x: xPos, y: 0, z: camZ + DRAW_DIST, type: type, hue: Math.random() * 360, sat: type === 'truck' ? 30 : 80, speed: type === 'truck' ? 3.5 : 5.5, rot: 0, isTossed: false });
            }
            else if (isFlying && !isSpace && frameCount % 45 === 0) {
                let xPos = (Math.random() * 400) - 200;
                let rnd = Math.random(), type;
                if (rnd < 0.03) type = 'item_speed';
                else if (rnd < 0.06) type = 'item_shield';
                else if (rnd < 0.15) type = 'item_wings'; // 仅云层有蝴蝶
                else if (rnd < 0.5) type = 'missile'; 
                else type = Math.random() > 0.5 ? 'airplane' : 'heli';

                obstacles.push({ x: xPos, y: playerY, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -15 : (type.startsWith('item') ? 0 : -10)), rot: 0, isTossed: false });
            }
            else if (isSpace && frameCount % 55 === 0) {
                let xPos = (Math.random() * 400) - 200;
                let rnd = Math.random(), type;
                if (rnd < 0.05) type = 'item_speed';
                else if (rnd < 0.1) type = 'item_shield';
                else if (rnd < 0.3) type = 'missile'; 
                else type = Math.random() > 0.5 ? 'sat' : 'met';

                obstacles.push({ x: xPos, y: playerY, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -15 : (type.startsWith('item') ? 0 : -10)), rot: 0, isTossed: false });
            }

            if (camZ - lastPropZ > 300) {
                let pType = SCENES[currentSceneKey].prop;
                props.push({ type: pType, x: -ROAD_WIDTH - 30, y: 0, z: camZ + DRAW_DIST, side: -1 });
                props.push({ type: pType, x: ROAD_WIDTH + 30, y: 0, z: camZ + DRAW_DIST, side: 1 });
                lastPropZ = camZ;
            }

            let playerZ = camZ + playerZOffset;

            // ============================
            // 物理判断 (降低难度，增加擦边容错)
            // ============================
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                
                if (ob.isTossed) {
                    ob.x += ob.vx; ob.y += ob.vy; ob.z += ob.vz;
                    ob.vy += 0.8; ob.rot += 0.5; 
                } else {
                    ob.z += ob.speed; 
                    if (ob.type === 'sat' || ob.type === 'met') ob.rot += 0.05; 

                    // 缩小碰撞体积 (增加玩家存活率)
                    let hitX = 25, hitZ = 25; 
                    if (ob.type === 'truck') { hitX = 35; hitZ = 60; }
                    if (ob.type === 'motor') hitX = 12;
                    if (['airplane', 'sat', 'met'].includes(ob.type)) { hitX = 40; hitZ = 40; }

                    let isGroundOb = ob.y >= -20 && !ob.type.startsWith('item');
                    if (isGroundOb && isFlying) continue; 

                    if (Math.abs(ob.z - playerZ) < hitZ && Math.abs(ob.x - carX) < hitX && Math.abs(ob.y - playerY) < 40) {
                        
                        if (ob.type === 'item_fly') { 
                            isFlying = true; flyTimer = 600; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup();
                        }
                        else if (ob.type === 'item_wings') { 
                            isSpace = true; spaceTimer = 1000; bonusScore += 1500; obstacles.splice(i, 1); soundBoost();
                        }
                        else if (ob.type === 'item_shield') { 
                            isShielded = true; shieldTimer = 800; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup();
                        }
                        else if (ob.type === 'item_speed') { 
                            speedTimer = 300; bonusScore += 300; obstacles.splice(i, 1); soundBoost();
                        } 
                        else {
                            if (isShielded) { 
                                ob.isTossed = true;
                                ob.vx = (ob.x - carX) * 0.2; 
                                if (Math.abs(ob.vx) < 2) ob.vx = Math.random() > 0.5 ? 5 : -5;
                                ob.vy = -15; ob.vz = 5; bonusScore += 300;
                                soundShieldHit();
                            } else {
                                // ==== 真正的死亡结算 ====
                                gameState = 'GAMEOVER';
                                stopEngineSound();
                                soundCrash();
                                
                                if (score > bestScore) { 
                                    bestScore = score; 
                                    localStorage.setItem('neon_best_score', bestScore); 
                                }
                                
                                document.getElementById('finalScore').innerText = score;
                                document.getElementById('recordScore').innerText = bestScore;
                                
                                let ev = getScoreTitle(score);
                                let evEl = document.getElementById('evalText'); 
                                evEl.innerText = ev.t; 
                                evEl.style.color = ev.c;
                                
                                document.getElementById('game-over-screen').style.display = 'block'; 
                                document.getElementById('uiLayer').style.display = 'none';
                            }
                        }
                    }
                }
                if (ob.z < renderCamZ - 100 || ob.y > 600) obstacles.splice(i, 1);
            }
            for (let i = props.length - 1; i >= 0; i--) {
                if (props[i].z < renderCamZ) props.splice(i, 1);
            }
        }

        // ==========================================
        // 13. 主渲染生命周期
        // ==========================================
        function loop() {
            if (gameState === 'PLAYING') {
                update();
                ctx.clearRect(0, 0, W, H);
                
                let timeCycle = (frameCount / 1000); 
                let env = getEnvColors(timeCycle);
                
                let flyProgress = Math.min(1, Math.max(0, -playerY / 120)); 
                let bAlpha = 1 - flyProgress; 
                
                drawBackground(env, bAlpha, flyProgress); 
                drawRoad(env, bAlpha); 
                drawObjects(env, bAlpha);
                
                if (isFirstPerson) drawCockpit(env); 
                
                animationId = requestAnimationFrame(loop);
            }
        }

        // 初始画面渲染
        function drawInitialScene() {
            initEnvironment(); 
            let env = getEnvColors(0); 
            ctx.clearRect(0, 0, W, H);
            drawBackground(env, 1, 0); 
            drawRoad(env, 1); 
            draw3DCar(0, 0, 80, 'player', 340, 100, 0, true, env, 0);
            if (isFirstPerson) drawCockpit(env);
        }
        
        drawInitialScene();

    </script>
</body>
