<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阿翔飞车极速版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #05000a; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
            touch-action: none; 
        }
        h1 {
            color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 20px #00aaff;
            margin-top: 10px; margin-bottom: 5px;
        }
        p { margin-top: 0; color: #ff00ff; text-shadow: 0 0 5px #ff00ff; font-size: 14px;}
        
        #game-wrapper { position: relative; margin-top: 5px; display: flex; flex-direction: column; align-items: center; }
        
        canvas {
            width: 800px; height: 600px; max-width: 100vw;
            background-color: #000; image-rendering: pixelated; 
            border: 4px solid #ff0055; border-radius: 8px;
            box-shadow: 0 0 40px #ff0055, 0 0 20px #0ff inset;
        }
        
        #scoreBoard {
            position: absolute; top: 15px; left: 20px;
            font-size: 24px; font-weight: bold; color: #0ff;
            text-shadow: 0 0 8px #0ff; pointer-events: none; display: none;
        }
        
        .overlay {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            background: rgba(10, 0, 20, 0.85); padding: 40px;
            border: 4px dashed #0ff; box-shadow: 0 0 20px #0ff;
            display: none; width: 340px; z-index: 10;
        }
        
        #start-screen { display: block; }
        .blink { animation: blinker 1.5s linear infinite; color: #ff00ff; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #ff00ff; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* 底部触控按钮组 */
        #controls {
            display: flex; justify-content: space-between; gap: 15px;
            margin-top: 15px; width: 600px; max-width: 95vw;
        }
        .ctrl-btn {
            flex: 1; background: rgba(10,0,20,0.8); color: #0ff; 
            border: 3px solid #0ff; border-radius: 8px;
            padding: 12px 0; font-size: 20px; font-weight: bold; 
            font-family: inherit; box-shadow: 0 0 15px #0ff inset, 0 0 15px #0ff;
            user-select: none; cursor: pointer; text-align: center;
            transition: all 0.1s;
        }
        .ctrl-btn:active { background: #0ff; color: #000; box-shadow: 0 0 30px #0ff; transform: scale(0.95); }
        
        .cam-btn {
            flex: 0.5; background: rgba(50,50,50,0.8); color: #ccc; 
            border-color: #888; box-shadow: none; font-size: 16px;
        }
        .cam-btn.active { color: #0ff; border-color: #0ff; box-shadow: 0 0 10px #0ff inset, 0 0 10px #0ff; }
    </style>
</head>
<body>

    <h1>✦ NEON CITY RACER ✦</h1>
    <p>A/D键 或 底部按钮 变道 | V键 切换视角 | 空格键 开始</p>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        <div id="scoreBoard">DISTANCE: <span id="scoreVal">0</span></div>
        
        <div id="start-screen" class="overlay">
            <h2 style="color: #0ff; text-shadow: 0 0 10px #0ff; font-size: 32px; margin: 0 0 20px 0;">SYSTEM READY</h2>
            <p class="blink">[ 按空格或按钮起步 ]</p>
        </div>

        <div id="game-over-screen" class="overlay">
            <h2 style="color: #ff0055; text-shadow: 0 0 10px #ff0055; font-size: 32px; margin: 0;">CRASHED!</h2>
            <p style="color: #fff; font-size: 18px; margin-top: 15px;">行驶里程: <span id="finalScore" style="color: #0ff;">0</span> m</p>
            <p class="blink" style="margin-top: 20px;">[ 按空格或按钮重来 ]</p>
        </div>

        <div id="controls">
            <div id="btnLeft" class="ctrl-btn">◀ LEFT</div>
            <div id="btnCam" class="ctrl-btn cam-btn">切换视角</div>
            <div id="btnRight" class="ctrl-btn">RIGHT ▶</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ==== 3D引擎常量 ====
        const W = canvas.width, H = canvas.height;
        const HORIZON = 130, FOCAL = 160;
        const ROAD_WIDTH = 150, SEG_LENGTH = 40, DRAW_DIST = 1600;
        const LANES =[-110, -35, 35, 110];

        // ==== 游戏状态变量 ====
        let animationId, gameState = 'START';  
        let camZ = 0, gameSpeed = 7, score = 0, frameCount = 0;
        let carX = 0, carVX = 0, playerZOffset = 80;   
        let obstacles = [], props =[], lastPropZ = 0;
        let stars =[], buildings =[];

        // ==== 渲染视口变量 (支持第一人称) ====
        let isFirstPerson = false;
        let renderCamX = 0, renderCamY = -60, renderCamZ = 0;

        const keys = { a: false, d: false };

        function startGameTrigger() { if (gameState === 'START' || gameState === 'GAMEOVER') initGame(); }
        function toggleCamera() {
            isFirstPerson = !isFirstPerson;
            const btn = document.getElementById('btnCam');
            if (isFirstPerson) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === 'v' || e.key === 'V') toggleCamera();
            if (e.code === 'Space') startGameTrigger();
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
        });

        const btnL = document.getElementById('btnLeft'), btnR = document.getElementById('btnRight'), btnC = document.getElementById('btnCam');
        const pressL = (e) => { e.preventDefault(); keys.a = true; startGameTrigger(); };
        const releaseL = (e) => { e.preventDefault(); keys.a = false; };
        const pressR = (e) => { e.preventDefault(); keys.d = true; startGameTrigger(); };
        const releaseR = (e) => { e.preventDefault(); keys.d = false; };

        btnL.addEventListener('mousedown', pressL); btnL.addEventListener('touchstart', pressL);
        window.addEventListener('mouseup', releaseL); btnL.addEventListener('touchend', releaseL);
        btnR.addEventListener('mousedown', pressR); btnR.addEventListener('touchstart', pressR);
        window.addEventListener('mouseup', releaseR); btnR.addEventListener('touchend', releaseR);
        btnC.addEventListener('mousedown', (e) => { e.preventDefault(); toggleCamera(); });

        function project(x, y, z) {
            let zDiff = z - renderCamZ;
            if (zDiff <= 5) return null; 
            let scale = FOCAL / zDiff;
            let sx = W / 2 + (x - renderCamX) * scale;
            let sy = HORIZON + (y - renderCamY) * scale;
            return { sx, sy, scale };
        }

        function hex2rgb(hex) {
            let v = parseInt(hex.substring(1), 16);
            return[v >> 16 & 255, v >> 8 & 255, v & 255];
        }
        function lerpColor(c1, c2, t) {
            let r1 = hex2rgb(c1), r2 = hex2rgb(c2);
            let r = Math.round(r1[0] + (r2[0] - r1[0]) * t), g = Math.round(r1[1] + (r2[1] - r1[1]) * t), b = Math.round(r1[2] + (r2[2] - r1[2]) * t);
            return `rgb(${r},${g},${b})`;
        }

        function initEnvironment() {
            stars =[];
            for (let i = 0; i < 60; i++) {
                stars.push({ rawX: Math.random() * W, y: Math.random() * (HORIZON - 20), s: Math.random() * 1.5 });
            }
            buildings =[];
            let bx = -W * 2; 
            while (bx < W * 3) {
                let bw = 25 + Math.random() * 50, bh = 30 + Math.random() * 80, bDepth = 15 + Math.random() * 20;
                let hue = Math.random() > 0.5 ? 280 : 320;
                let windows =[];
                for (let wy = 10; wy < bh - 10; wy += 12) {
                    for (let wx = 5; wx < bw - 5; wx += 8) {
                        if (Math.random() > 0.6) windows.push({ x: wx, y: wy, color: Math.random() > 0.5 ? '#ffea00' : '#00ffff' });
                    }
                }
                buildings.push({ x: bx, w: bw, h: bh, d: bDepth, hue: hue, windows: windows });
                bx += bw + 5 + Math.random() * 30;
            }
        }

        function initGame() {
            gameState = 'PLAYING';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('scoreBoard').style.display = 'block';
            camZ = 0; gameSpeed = 6; score = 0; frameCount = 0; carX = 0; carVX = 0; lastPropZ = 0;
            obstacles = []; props =[];
            initEnvironment();
            if (animationId) cancelAnimationFrame(animationId);
            loop();
        }

        const skyTopColors  =['#0055ff', '#1a0033', '#020008'];
        const skyBotColors  =['#87cefa', '#ff0055', '#0a0011'];
        const roadDarkColor =['#555555', '#302030', '#0a0011'];
        const roadLiteColor =['#666666', '#402a40', '#11001a'];
        const lineColors    =['#ffffff', '#ffaaaa', '#00ffff'];

        function getEnvColors(timeCycle) {
            let maxCycle = 2.0; 
            let cycle = Math.min(timeCycle, maxCycle);
            let phase = Math.floor(cycle);
            let t = cycle - phase;
            if (cycle >= maxCycle) { phase = 2; t = 0; }
            let nextPhase = (phase + 1) % 3;
            let nightFactor = 0;
            if (cycle >= 1.5) nightFactor = Math.min(1, (cycle - 1.5) * 2);

            return {
                skyTop: lerpColor(skyTopColors[phase], skyTopColors[nextPhase], t),
                skyBot: lerpColor(skyBotColors[phase], skyBotColors[nextPhase], t),
                roadD:  lerpColor(roadDarkColor[phase], roadDarkColor[nextPhase], t),
                roadL:  lerpColor(roadLiteColor[phase], roadLiteColor[nextPhase], t),
                line:   lerpColor(lineColors[phase], lineColors[nextPhase], t),
                nightFactor: nightFactor,
                sunY: cycle < 1 ? (HORIZON - 70 + cycle * 40) : (HORIZON - 30 + (cycle - 1) * 80)
            };
        }

        function drawBackground(env) {
            let skyGrad = ctx.createLinearGradient(0, 0, 0, HORIZON);
            skyGrad.addColorStop(0, env.skyTop); skyGrad.addColorStop(1, env.skyBot);
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, HORIZON);

            let panX = -renderCamX * 0.4; 

            if (env.nightFactor > 0) {
                stars.forEach(s => {
                    let sx = (s.rawX + panX * 0.1) % W;
                    if (sx < 0) sx += W;
                    ctx.fillStyle = `rgba(255, 255, 255, ${env.nightFactor * (0.5 + 0.5 * Math.sin(frameCount * 0.05 + s.rawX))})`;
                    ctx.fillRect(sx, s.y, s.s, s.s);
                });
            }

            if (env.sunY < HORIZON + 30) {
                let sunGrad = ctx.createLinearGradient(0, env.sunY - 40, 0, env.sunY + 40);
                sunGrad.addColorStop(0, '#0ff'); sunGrad.addColorStop(1, '#FF007F'); 
                ctx.fillStyle = sunGrad;
                ctx.beginPath(); ctx.arc(W / 2 + panX * 0.1, env.sunY, 40, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = env.skyBot; 
                for (let i = 0; i < 6; i++) ctx.fillRect(W/2 - 50 + panX * 0.1, env.sunY + 10 - i*8, 100, 2 + i*0.5);
            }

            buildings.forEach(b => {
                let bx = b.x + panX;
                let cx = bx + b.w/2;
                let isLeft = cx < W/2; 
                
                let frontColor = env.nightFactor > 0.3 ? `hsl(${b.hue}, 40%, 8%)` : `hsl(${b.hue}, 20%, 30%)`;
                let sideColor  = env.nightFactor > 0.3 ? `hsl(${b.hue}, 50%, 4%)` : `hsl(${b.hue}, 20%, 20%)`;
                let neonColor  = env.nightFactor > 0.5 ? `hsl(${b.hue}, 100%, 50%)` : 'transparent';

                ctx.fillStyle = sideColor;
                ctx.beginPath();
                if (isLeft) { 
                    ctx.moveTo(bx + b.w, HORIZON); ctx.lineTo(bx + b.w, HORIZON - b.h);
                    ctx.lineTo(bx + b.w + b.d, HORIZON - b.h + b.d*0.3); ctx.lineTo(bx + b.w + b.d, HORIZON);
                } else { 
                    ctx.moveTo(bx, HORIZON); ctx.lineTo(bx, HORIZON - b.h);
                    ctx.lineTo(bx - b.d, HORIZON - b.h + b.d*0.3); ctx.lineTo(bx - b.d, HORIZON);
                }
                ctx.fill();

                ctx.fillStyle = frontColor; ctx.fillRect(bx, HORIZON - b.h, b.w, b.h);
                if (env.nightFactor > 0.5) {
                    ctx.strokeStyle = neonColor; ctx.lineWidth = 1; ctx.strokeRect(bx, HORIZON - b.h, b.w, b.h);
                }
                if (env.nightFactor > 0.1) {
                    b.windows.forEach(w => {
                        ctx.fillStyle = w.color;
                        ctx.globalAlpha = env.nightFactor * 0.9; 
                        ctx.fillRect(bx + w.x, HORIZON - b.h + w.y, 4, 3);
                    });
                    ctx.globalAlpha = 1.0;
                }
            });
            ctx.fillStyle = '#000'; ctx.fillRect(0, HORIZON-2, W, 2);
        }

        function drawRoad(env) {
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, HORIZON, W, H - HORIZON);
            let startZ = Math.floor((renderCamZ + DRAW_DIST) / SEG_LENGTH) * SEG_LENGTH;
            
            for (let z = startZ; z > renderCamZ + 5; z -= SEG_LENGTH) {
                let p1_l = project(-ROAD_WIDTH, 0, z), p1_r = project(ROAD_WIDTH, 0, z);
                let p2_l = project(-ROAD_WIDTH, 0, z - SEG_LENGTH), p2_r = project(ROAD_WIDTH, 0, z - SEG_LENGTH);
                if (!p1_l || !p2_l) continue;

                let index = Math.floor(z / 100);
                ctx.fillStyle = (index % 2 === 0) ? env.roadD : env.roadL;
                
                ctx.beginPath(); ctx.moveTo(p1_l.sx, p1_l.sy); ctx.lineTo(p1_r.sx, p1_r.sy);
                ctx.lineTo(p2_r.sx, p2_r.sy); ctx.lineTo(p2_l.sx, p2_l.sy); ctx.fill();

                if (index % 2 === 0) {
                    ctx.strokeStyle = env.line; ctx.lineWidth = Math.max(1, p1_l.scale * 2);
                    if (env.nightFactor > 0.5) { ctx.shadowBlur = 8; ctx.shadowColor = env.line; }[-75, 0, 75].forEach(lineX => {
                        let pc1 = project(lineX, 0, z), pc2 = project(lineX, 0, z - SEG_LENGTH);
                        if (pc1 && pc2) { ctx.beginPath(); ctx.moveTo(pc1.sx, pc1.sy); ctx.lineTo(pc2.sx, pc2.sy); ctx.stroke(); }
                    });
                    ctx.shadowBlur = 0;
                }
                ctx.strokeStyle = env.nightFactor > 0.5 ? '#ff00ff' : '#888'; ctx.lineWidth = Math.max(1, p1_l.scale * 4);
                ctx.beginPath(); ctx.moveTo(p1_l.sx, p1_l.sy); ctx.lineTo(p2_l.sx, p2_l.sy); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p1_r.sx, p1_r.sy); ctx.lineTo(p2_r.sx, p2_r.sy); ctx.stroke();
            }
        }

        function drawTrue3DBox(x, y, z, w, h, L, colorBody, colorSide, colorTop, tiltOffset, env) {
            let bp = project(x + tiltOffset, y, z); 
            let fp = project(x, y, z + L);          
            if (!bp || !fp) return null;

            let bw = w * bp.scale, bh = h * bp.scale, fw = w * fp.scale, fh = h * fp.scale;
            ctx.fillStyle = colorTop;
            ctx.beginPath(); ctx.moveTo(bp.sx - bw/2, bp.sy - bh); ctx.lineTo(bp.sx + bw/2, bp.sy - bh);
            ctx.lineTo(fp.sx + fw/2, fp.sy - fh); ctx.lineTo(fp.sx - fw/2, fp.sy - fh); ctx.fill();

            ctx.fillStyle = colorSide;
            ctx.beginPath();
            if (x - renderCamX < 0) { 
                ctx.moveTo(bp.sx + bw/2, bp.sy); ctx.lineTo(fp.sx + fw/2, fp.sy);
                ctx.lineTo(fp.sx + fw/2, fp.sy - fh); ctx.lineTo(bp.sx + bw/2, bp.sy - bh);
            } else { 
                ctx.moveTo(bp.sx - bw/2, bp.sy); ctx.lineTo(fp.sx - fw/2, fp.sy);
                ctx.lineTo(fp.sx - fw/2, fp.sy - fh); ctx.lineTo(bp.sx - bw/2, bp.sy - bh);
            }
            ctx.fill();

            ctx.fillStyle = colorBody; ctx.fillRect(bp.sx - bw/2, bp.sy - bh, bw, bh);
            return { bp, bw, bh, s: bp.scale };
        }

        function draw3DPerspectiveCar(x, y, z, type, hue, sat, tiltX, isPlayer, env) {
            let w = 28, h1 = 10, L1 = 30, roofW = 20, roofH = 8, roofL = 15, roofZOffset = 8; 
            let tilt = tiltX * 3; 
            let bodyCol = `hsl(${hue}, ${sat}%, 45%)`, sideCol = `hsl(${hue}, ${sat}%, 25%)`;
            let topCol  = `hsl(${hue}, ${sat}%, 60%)`, glassCol = `hsl(190, 80%, ${30 + env.nightFactor*60}%)`, glassSide = `hsl(190, 80%, ${15 + env.nightFactor*40}%)`;

            let pBL = project(x - w/2, y, z), pBR = project(x + w/2, y, z);
            let pFL = project(x - w/2, y, z + L1), pFR = project(x + w/2, y, z + L1);
            if (pBL && pBR && pFL && pFR) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath(); ctx.moveTo(pBL.sx, pBL.sy); ctx.lineTo(pBR.sx, pBR.sy);
                ctx.lineTo(pFR.sx, pFR.sy); ctx.lineTo(pFL.sx, pFL.sy); ctx.fill();
            }

            let lower = drawTrue3DBox(x, y, z, w, h1, L1, bodyCol, sideCol, topCol, tilt*0.3, env);
            let cabin = drawTrue3DBox(x, y - h1, z + roofZOffset, roofW, roofH, roofL, glassCol, glassSide, topCol, tilt, env);

            if (lower) {
                let s = lower.s, bx = lower.bp.sx, by = lower.bp.sy, bw = lower.bw, bh = lower.bh;
                ctx.fillStyle = '#050505';
                ctx.fillRect(bx - bw*0.5, by - bh*0.4, bw*0.15, bh*0.6); ctx.fillRect(bx + bw*0.35, by - bh*0.4, bw*0.15, bh*0.6);
                ctx.fillStyle = '#111'; ctx.fillRect(bx - bw*0.35, by - bh*0.3, bw*0.7, bh*0.25);

                let tailLight = isPlayer ? (50 + env.nightFactor*40) : 30;
                ctx.fillStyle = `hsl(350, 100%, ${tailLight}%)`;
                if (env.nightFactor > 0.3 || isPlayer) { ctx.shadowBlur = 12 * s; ctx.shadowColor = '#ff0055'; }
                ctx.fillRect(bx - bw*0.45, by - bh*0.75, bw*0.25, bh*0.3); ctx.fillRect(bx + bw*0.2, by - bh*0.75, bw*0.25, bh*0.3);
                ctx.shadowBlur = 0;

                if (type === 'sports' || isPlayer) {
                   ctx.fillStyle = sideCol; ctx.fillRect(bx - bw*0.35, by - bh - 6*s, 3*s, 6*s); ctx.fillRect(bx + bw*0.25, by - bh - 6*s, 3*s, 6*s);
                   ctx.fillStyle = bodyCol; ctx.fillRect(bx - bw*0.48 + tilt*s*0.3, by - bh - 8*s, bw*0.96, 3*s);
                }
            }
        }

        function drawStreetLight(p, side, env) {
            let s = p.scale, poleW = 4 * s, poleH = 140 * s, armW = 45 * s;
            ctx.fillStyle = env.nightFactor > 0.3 ? '#111' : '#333';
            ctx.fillRect(p.sx - poleW/2, p.sy - poleH, poleW, poleH);
            ctx.fillRect(p.sx - poleW/2 + (side===1 ? -armW : 0), p.sy - poleH, armW + poleW, 4 * s);
            
            let lightX = p.sx + (side===1 ? -armW : armW);
            ctx.fillStyle = env.nightFactor > 0.5 ? '#0ff' : '#aaa';
            if (env.nightFactor > 0.5) { ctx.shadowBlur = 20 * s; ctx.shadowColor = '#0ff'; }
            ctx.fillRect(lightX - 6*s, p.sy - poleH + 4*s, 12*s, 6*s); ctx.shadowBlur = 0;
        }

        function drawRoadSign(p, side, env) {
            let s = p.scale;
            let poleW = 5 * s, poleH = 100 * s;
            let boardW = 70 * s, boardH = 45 * s;
            ctx.fillStyle = env.nightFactor > 0.3 ? '#111' : '#444';
            ctx.fillRect(p.sx - poleW/2, p.sy - poleH, poleW, poleH);

            let boardY = p.sy - poleH;
            ctx.fillStyle = env.nightFactor > 0.5 ? '#002244' : '#004488';
            ctx.fillRect(p.sx - poleW/2 - boardW/2, boardY, boardW, boardH);

            ctx.strokeStyle = env.nightFactor > 0.5 ? '#0ff' : '#aaa';
            ctx.lineWidth = 2 * s;
            if (env.nightFactor > 0.5) { ctx.shadowBlur = 10 * s; ctx.shadowColor = '#0ff'; }
            ctx.strokeRect(p.sx - poleW/2 - boardW/2, boardY, boardW, boardH);

            ctx.fillStyle = env.nightFactor > 0.5 ? '#fff' : '#ccc';
            ctx.fillRect(p.sx - poleW/2 - boardW*0.3, boardY + boardH*0.25, boardW*0.6, 5*s);
            ctx.fillRect(p.sx - poleW/2 - boardW*0.3, boardY + boardH*0.55, boardW*0.4, 5*s);
            ctx.shadowBlur = 0;
        }

        function drawObjects(env) {
            let renderList =[];
            let playerZ = camZ + playerZOffset;

            if (!isFirstPerson) {
                renderList.push({ type: 'player', hue: 340, sat: 100, x: carX, y: 0, z: playerZ, tilt: carVX });
            }
            obstacles.forEach(ob => renderList.push(ob));
            props.forEach(pr => renderList.push(pr));

            renderList.sort((a, b) => b.z - a.z);

            for (let i = 0; i < renderList.length; i++) {
                let obj = renderList[i];
                let p = project(obj.x, obj.y, obj.z);
                if (p) {
                    if (obj.type === 'light') drawStreetLight(p, obj.side, env);
                    else if (obj.type === 'sign') drawRoadSign(p, obj.side, env); 
                    else {
                        let isP = (obj.type === 'player');
                        draw3DPerspectiveCar(obj.x, obj.y, obj.z, obj.type, obj.hue, obj.sat, isP ? obj.tilt : 0, isP, env);
                    }
                }
            }
        }

        // ==========================================
        // 【全新：高精度拟真第一人称驾驶舱】
        // ==========================================
        function drawCockpit(env) {
            // 1. A柱与车顶框 (增强包围感)
            ctx.fillStyle = '#080808';
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(45, 0); ctx.lineTo(15, 180); ctx.lineTo(0, 180); ctx.fill(); // 左A柱
            ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W-45, 0); ctx.lineTo(W-15, 180); ctx.lineTo(W, 180); ctx.fill(); // 右A柱
            ctx.fillRect(0, 0, W, 20); // 车顶前沿

            // 2. 左右侧后视镜 (带天空反光)
            ctx.fillStyle = '#050505';
            ctx.beginPath(); ctx.moveTo(0, 150); ctx.lineTo(35, 160); ctx.lineTo(35, 210); ctx.lineTo(0, 220); ctx.fill(); 
            ctx.fillStyle = env.skyBot;
            ctx.beginPath(); ctx.moveTo(0, 155); ctx.lineTo(30, 164); ctx.lineTo(30, 206); ctx.lineTo(0, 215); ctx.fill(); 
            
            ctx.fillStyle = '#050505';
            ctx.beginPath(); ctx.moveTo(W, 150); ctx.lineTo(W-35, 160); ctx.lineTo(W-35, 210); ctx.lineTo(W, 220); ctx.fill(); 
            ctx.fillStyle = env.skyBot;
            ctx.beginPath(); ctx.moveTo(W, 155); ctx.lineTo(W-30, 164); ctx.lineTo(W-30, 206); ctx.lineTo(W, 215); ctx.fill(); 

            // 3. 中央后视镜
            ctx.fillStyle = '#050505'; ctx.fillRect(W/2 - 5, 20, 10, 15); // 支撑杆
            ctx.fillStyle = '#151515'; ctx.fillRect(W/2 - 45, 30, 90, 25); // 镜框
            ctx.fillStyle = env.skyBot; ctx.fillRect(W/2 - 42, 33, 84, 19); // 反光镜片

            // 4. 立体肌肉机盖 (带荧光修饰线)
            let hoodBase = 210;
            ctx.fillStyle = `hsl(340, 80%, ${15 + env.nightFactor*5}%)`;
            ctx.beginPath(); ctx.moveTo(0, hoodBase); ctx.lineTo(W, hoodBase); ctx.lineTo(W*0.8, 175); ctx.lineTo(W*0.2, 175); ctx.fill();
            // 机盖隆起肌肉线
            ctx.fillStyle = `hsl(340, 80%, ${10 + env.nightFactor*5}%)`;
            ctx.beginPath(); ctx.moveTo(W*0.3, hoodBase); ctx.lineTo(W*0.38, 175); ctx.lineTo(W*0.33, 175); ctx.lineTo(W*0.25, hoodBase); ctx.fill();
            ctx.beginPath(); ctx.moveTo(W*0.7, hoodBase); ctx.lineTo(W*0.62, 175); ctx.lineTo(W*0.67, 175); ctx.lineTo(W*0.75, hoodBase); ctx.fill();
            
            if (env.nightFactor > 0.5) {
                ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 1.5;
                ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
                ctx.beginPath(); ctx.moveTo(W*0.38, 175); ctx.lineTo(W*0.62, 175); ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // 5. 弧形仪表台与 HUD 数字测速仪
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.moveTo(0, hoodBase-5); ctx.quadraticCurveTo(W/2, 185, W, hoodBase-5); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();
            
            // 仪表台霓虹边缘
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
            if(env.nightFactor > 0.5) { ctx.shadowBlur = 8; ctx.shadowColor = '#0ff'; }
            ctx.beginPath(); ctx.moveTo(0, hoodBase-3); ctx.quadraticCurveTo(W/2, 187, W, hoodBase-3); ctx.stroke();
            ctx.shadowBlur = 0;

            // 数字 HUD
            ctx.fillStyle = '#050505'; ctx.fillRect(W/2 - 40, 195, 80, 28);
            ctx.strokeStyle = '#222'; ctx.strokeRect(W/2 - 40, 195, 80, 28);
            ctx.fillStyle = '#0ff'; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center';
            // 实时同步速度数值
            ctx.fillText(Math.floor(gameSpeed * 15), W/2, 210);
            ctx.font = '10px Courier New'; ctx.fillText("KM/H", W/2, 220);

            // 6. 物理联动赛车方向盘
            ctx.save();
            ctx.translate(W / 2, H + 25); // 定位在画面正下方
            ctx.rotate(carVX * 0.13); // 根据速度物理转动！

            // 粗壮外圈
            ctx.strokeStyle = '#151515'; ctx.lineWidth = 20;
            ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI*2); ctx.stroke();
            // 内侧真皮反光
            ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI*2); ctx.stroke();
            
            // 喇叭盖与车标
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();

            // 三幅式运动支撑条
            ctx.fillStyle = '#151515';
            ctx.beginPath(); ctx.moveTo(-32, -5); ctx.lineTo(-80, -15); ctx.lineTo(-80, 15); ctx.lineTo(-32, 10); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(32, -5); ctx.lineTo(80, -15); ctx.lineTo(80, 15); ctx.lineTo(32, 10); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(-15, 30); ctx.lineTo(-20, 80); ctx.lineTo(20, 80); ctx.lineTo(15, 30); ctx.fill(); 

            // 方向盘顶部赛车专属回正标 (Racing Stripe)
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 20;
            ctx.beginPath(); ctx.arc(0, 0, 85, -Math.PI/2 - 0.15, -Math.PI/2 + 0.15); ctx.stroke();

            ctx.restore();
        }

        // ==== 主逻辑 ====
        function update() {
            camZ += gameSpeed;
            score = Math.floor(camZ / 50); 
            document.getElementById('scoreVal').innerText = score;
            if (gameSpeed < 15) gameSpeed += 0.001; 

            if (keys.a) carVX -= 0.85;
            if (keys.d) carVX += 0.85;
            carVX *= 0.82; 
            carX += carVX;

            let maxCarX = ROAD_WIDTH - 25;
            if (carX < -maxCarX) { carX = -maxCarX; carVX = 0; }
            if (carX > maxCarX) { carX = maxCarX; carVX = 0; }

            if (isFirstPerson) {
                renderCamX = carX * 0.75; 
                renderCamY = -25;         
                renderCamZ = camZ + playerZOffset - 5; 
            } else {
                renderCamX = 0;
                renderCamY = -60;
                renderCamZ = camZ;
            }

            frameCount++;
            let spawnRate = Math.max(80, 150 - Math.floor(score / 50));
            if (frameCount % spawnRate === 0) {
                let lane = LANES[Math.floor(Math.random() * LANES.length)];
                let type = Math.random() > 0.6 ? 'van' : 'sports';
                obstacles.push({ x: lane, y: 0, z: camZ + DRAW_DIST, type: type, hue: Math.random()*360, sat: type==='van'?20:90, speed: type==='van'?3.5:5.5 });
            }

            if (camZ - lastPropZ > 300) {
                props.push({ type: 'light', x: -ROAD_WIDTH - 20, y: 0, z: camZ + DRAW_DIST, side: -1 });
                props.push({ type: 'light', x: ROAD_WIDTH + 20, y: 0, z: camZ + DRAW_DIST, side: 1 });
                if (Math.floor(camZ / 300) % 3 === 0) {
                    props.push({ type: 'sign', x: ROAD_WIDTH + 50, y: 0, z: camZ + DRAW_DIST, side: 1 });
                }
                lastPropZ = camZ;
            }

            let playerZ = camZ + playerZOffset;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                ob.z += ob.speed; 
                
                let zHitbox = (ob.type === 'van') ? 35 : 25; 
                if (Math.abs(ob.z - playerZ) < zHitbox && Math.abs(ob.x - carX) < 30) {
                    gameState = 'GAMEOVER';
                    document.getElementById('finalScore').innerText = score;
                    document.getElementById('game-over-screen').style.display = 'block';
                    document.getElementById('scoreBoard').style.display = 'none';
                }
                if (ob.z < renderCamZ) obstacles.splice(i, 1);
            }

            for (let i = props.length - 1; i >= 0; i--) if (props[i].z < renderCamZ) props.splice(i, 1);
        }

        function loop() {
            if (gameState === 'PLAYING') {
                update();
                ctx.clearRect(0, 0, W, H);
                
                let timeCycle = (frameCount / 2500); 
                let env = getEnvColors(timeCycle);

                drawBackground(env);
                drawRoad(env);
                drawObjects(env);

                if (isFirstPerson) {
                    drawCockpit(env); // 绘制拟真驾驶舱
                }

                animationId = requestAnimationFrame(loop);
            }
        }

        function drawInitialScene() {
            initEnvironment();
            let env = getEnvColors(0); 
            ctx.clearRect(0, 0, W, H);
            drawBackground(env); drawRoad(env);
            draw3DPerspectiveCar(0, 0, 80, 'player', 340, 100, 0, true, env);
            if(isFirstPerson) drawCockpit(env);
        }
        drawInitialScene();

    </script>
</body>
