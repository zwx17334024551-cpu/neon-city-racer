<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 赛博飞车 - 传奇车库典藏版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #05000a; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; touch-action: none; 
        }

        h1 { 
            color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00aaff; 
            margin: 0 0 5px 0; font-size: 32px; letter-spacing: 3px; 
        }
        p { 
            margin: 0 0 15px 0; color: #ff00ff; text-shadow: 0 0 5px #ff00ff; 
            font-size: 15px; font-weight: bold; 
        }
        
        #canvas-wrapper { 
            position: relative; width: 900px; max-width: 98vw; aspect-ratio: 16/9; 
            border: 4px solid #00ffff; border-radius: 8px;
            box-shadow: 0 0 40px #00ffff, 0 0 20px #00aaff inset;
            overflow: hidden; background-color: #000;
        }
        
        canvas { 
            width: 100%; height: 100%; display: block; image-rendering: pixelated; 
        }

        #scanlines {
            position: absolute; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 5;
        }

        #vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 120%);
            pointer-events: none; z-index: 6;
        }
        
        #uiLayer { 
            position: absolute; top: 20px; left: 25px; right: 25px; 
            display: flex; justify-content: space-between; pointer-events: none; 
            display: none; z-index: 10; 
        }
        .hud-text { 
            font-size: 26px; font-weight: bold; color: #00ffff; 
            text-shadow: 0 0 10px #00ffff; letter-spacing: 2px; 
        }
        
        .overlay {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
            text-align: center; background: rgba(5, 5, 15, 0.95); padding: 30px 50px;
            border: 4px dashed #00ffff; box-shadow: 0 0 30px #00ffff;
            width: 85%; max-width: 450px; z-index: 20; border-radius: 12px;
        }
        
        #start-screen { 
            background: transparent; border: none; box-shadow: none; top: 2%; padding: 0;
            display: flex; flex-direction: column; justify-content: space-between; height: 96%;
        }
        
        .diff-container { display: flex; gap: 15px; justify-content: center; margin: 15px 0; }
        .diff-btn { 
            background: #111; color: #aaa; border: 2px solid #555; border-radius: 6px; 
            padding: 10px 18px; font-size: 18px; cursor: pointer; font-weight: bold; 
            font-family: inherit; transition: all 0.2s; 
        }
        .diff-btn.active { 
            background: #00ffff; color: #000; border-color: #00ffff; 
            box-shadow: 0 0 20px #00ffff; transform: scale(1.1); 
        }

        #real-restart-btn {
            background-color: #ff0055; color: #fff; border: 4px solid #fff; border-radius: 8px;
            padding: 18px 40px; font-size: 26px; font-weight: bold; font-family: inherit; 
            cursor: pointer; box-shadow: 0 0 25px #ff0055; margin-top: 15px; 
            animation: pulse 1.5s infinite; transition: all 0.2s;
        }
        #real-restart-btn:hover { background-color: #fff; color: #ff0055; }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.05); box-shadow: 0 0 35px #ff0055; } 
            100% { transform: scale(1); } 
        }

        #controls { 
            display: flex; justify-content: space-between; gap: 20px; 
            margin-top: 25px; width: 800px; max-width: 96vw; 
        }
        .ctrl-btn { 
            flex: 1; background: rgba(0, 20, 40, 0.8); color: #00ffff; 
            border: 4px solid #00ffff; border-radius: 12px; padding: 25px 0; 
            font-size: 28px; font-weight: bold; font-family: inherit; 
            box-shadow: 0 0 20px #00ffff inset; user-select: none; 
            cursor: pointer; text-align: center; transition: all 0.1s; 
        }
        .ctrl-btn:active { 
            background: #00ffff; color: #000; box-shadow: 0 0 40px #00ffff; 
            transform: scale(0.95); 
        }
        .cam-btn { 
            flex: 0.5; background: rgba(40, 40, 40, 0.8); color: #ccc; 
            border-color: #888; box-shadow: none; font-size: 20px; 
        }
        .cam-btn.active { color: #00ffff; border-color: #00ffff; box-shadow: 0 0 20px #00ffff inset; }
        .eval-title { font-size: 36px; font-weight: bold; margin: 20px 0; text-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body>

    <h1>✦ NEON MULTIVERSE ✦</h1>
    <p>全景传奇车库 | 修复判定引擎 | 星云宇宙与体积云生态</p>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="scanlines"></div>
        <div id="vignette"></div>
        
        <div id="uiLayer">
            <div>
                <div class="hud-text" id="scoreVal">[ SCORE: 0 ]</div>
                <div class="hud-text" id="bestVal" style="font-size:16px; color:#aaa; text-shadow:none; margin-top: 5px;">BEST: 0</div>
                <div class="hud-text" id="statusVal" style="color:#ff00ff; margin-top: 10px;"></div>
            </div>
        </div>
        
        <!-- 全新车库选车界面，保留中间大镂空用于展示 3D 模型 -->
        <div id="start-screen" class="overlay">
            <div style="background: rgba(0,0,0,0.8); border: 2px dashed #0ff; box-shadow: 0 0 20px #0ff; padding: 15px; border-radius: 12px; margin-top: 20px;">
                <h2 style="color: #00ffff; text-shadow: 0 0 15px #00ffff; margin: 0; font-size: 32px; letter-spacing: 2px;">NEON GARAGE</h2>
            </div>
            
            <div style="flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 0 5%;">
                <button class="diff-btn" onclick="changeCar(-1)" style="font-size: 36px; background: rgba(0,0,0,0.7); border-color:#0ff; padding: 10px 20px; box-shadow: 0 0 15px #0ff;">◀</button>
                <div id="car-name-display" style="font-size: 36px; color: #55ff55; font-weight: bold; text-shadow: 0 0 15px currentColor; background: rgba(0,0,0,0.6); padding: 5px 25px; border-radius: 8px;">兰博基尼</div>
                <button class="diff-btn" onclick="changeCar(1)" style="font-size: 36px; background: rgba(0,0,0,0.7); border-color:#0ff; padding: 10px 20px; box-shadow: 0 0 15px #0ff;">▶</button>
            </div>

            <div style="background: rgba(0,0,0,0.85); border: 2px solid #0ff; box-shadow: 0 0 20px #00aaff; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                <div class="diff-container" style="margin-top: 0;">
                    <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                    <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                    <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
                </div>
                <button class="ctrl-btn" style="width: 100%; font-size: 26px; box-shadow: 0 0 20px #00ffff;" onclick="startGameTriggerBtn()">🔥 驾驶此车出库 🔥</button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay" style="display:none; background: rgba(5,5,15,0.95);">
            <h2 style="color: #ff0055; margin: 0; font-size: 40px; text-shadow: 0 0 15px #ff0055;">CRASHED!</h2>
            <div id="evalText" class="eval-title"></div>
            <p style="color: #fff; font-size: 22px; margin: 10px 0;">最终得分: <span id="finalScore" style="color: #00ffff; font-weight:bold;">0</span></p>
            <p style="color: #aaa; font-size: 16px; margin: 0 0 20px 0;">历史最高: <span id="recordScore" style="color: #ffd700;">0</span></p>
            <div class="diff-container" style="margin-top: 15px;">
                <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
            </div>
            <button id="real-restart-btn" onclick="initGame()">🔥 再次出库 🔥</button>
        </div>
    </div>

    <!-- 底部控制器 -->
    <div id="controls">
        <div id="btnLeft" class="ctrl-btn">◀ LEFT</div>
        <div id="btnCam" class="ctrl-btn cam-btn">视角</div>
        <div id="btnRight" class="ctrl-btn">RIGHT ▶</div>
    </div>

    <script>
        // ==========================================
        // 1. 基础画布与核心渲染常量
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        
        const HORIZON = 220;
        const FOCAL = 250;
        const ROAD_WIDTH = 250;
        const SEG_LENGTH = 50;
        const DRAW_DIST = 2500;
        const LANES =[-140, -45, 45, 140];

        // 新增：顶级车库模型库配置
        const CARS =[
            { id: 'lambo', name: '兰博基尼', hue: 120, sat: 100, lit: 45 },    // 超跑绿
            { id: 'bugatti', name: '布加迪', hue: 215, sat: 100, lit: 40 },   // 深空蓝
            { id: 'raptor', name: '福特猛禽', hue: 0, sat: 90, lit: 45 },     // 狂野红
            { id: 'prado', name: '丰田霸道', hue: 0, sat: 0, lit: 90 },       // 珍珠白
            { id: 'alfa', name: '阿尔法罗密欧', hue: 350, sat: 90, lit: 35 }   // 经典暗红
        ];
        let selectedCarIndex = 0;

        // ==========================================
        // 2. 原生 Web Audio API 声音引擎 (保留完整音效)
        // ==========================================
        let audioCtx = null;
        let engineOscillator = null;
        let engineGain = null;
        let bgmOscillator = null;
        let bgmGain = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playNoise(duration, vol = 0.5) {
            if (!audioCtx) return;
            let bufferSize = audioCtx.sampleRate * duration;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            let noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);
            let gain = audioCtx.createGain(); gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
        }

        function startEngineAndBGM() {
            if (!audioCtx) return;
            if (!engineOscillator) {
                engineOscillator = audioCtx.createOscillator(); engineOscillator.type = 'sawtooth';
                engineGain = audioCtx.createGain(); engineGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 400;
                engineOscillator.connect(filter); filter.connect(engineGain); engineGain.connect(audioCtx.destination);
                engineOscillator.start();
            }
            if (!bgmOscillator) {
                bgmOscillator = audioCtx.createOscillator(); bgmOscillator.type = 'square'; bgmOscillator.frequency.value = 55; 
                bgmGain = audioCtx.createGain(); bgmGain.gain.value = 0.02;
                let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 150;
                bgmOscillator.connect(filter); filter.connect(bgmGain); bgmGain.connect(audioCtx.destination);
                bgmOscillator.start();
            }
        }

        function updateEngineSound(speed, isSpace) {
            if (!engineOscillator) return;
            let baseFreq = isSpace ? 35 : 55;
            engineOscillator.frequency.setTargetAtTime(baseFreq + (speed * 6), audioCtx.currentTime, 0.1);
        }

        function stopEngineAndBGM() {
            if (engineOscillator) { engineOscillator.stop(); engineOscillator.disconnect(); engineOscillator = null; }
            if (bgmOscillator) { bgmOscillator.stop(); bgmOscillator.disconnect(); bgmOscillator = null; }
        }

        function soundItemPickup() { playTone(800, 'square', 0.1, 0.1); setTimeout(() => playTone(1200, 'square', 0.2, 0.1), 100); }
        function soundBoost() { playTone(200, 'sawtooth', 0.5, 0.1); playNoise(0.5, 0.2); }
        function soundCrash() { playNoise(1.2, 0.8); playTone(50, 'sawtooth', 1.0, 0.5); }
        function soundShieldHit() { playTone(400, 'triangle', 0.3, 0.2); playNoise(0.3, 0.3); }
        function playUiClick() { playTone(1500, 'square', 0.05, 0.1); }
        function playWarning() { playTone(1000, 'square', 0.1, 0.1); setTimeout(() => playTone(1000, 'square', 0.1, 0.1), 150); setTimeout(() => playTone(1000, 'square', 0.1, 0.1), 300); }

        // ==========================================
        // 3. 游戏核心状态变量
        // ==========================================
        let animationId;
        let gameState = 'START';  
        let camZ = 0;
        let gameSpeed = 6;
        let score = 0;
        let bonusScore = 0;
        let frameCount = 0;
        
        let carX = 0;
        let carVX = 0;
        let playerY = 0;
        let playerZOffset = 100;   
        
        let obstacles = [];
        let props = [];
        let bgItems =[];
        let stars = [];
        let shootingStars =[];
        let lastPropZ = 0;

        let giantMeteor = { active: false, x: 0, y: 0, s: 1 };

        let difficulty = 'racing';
        let baseSpawnRate = 100; 
        let speedCap = 13; 
        
        let isFlying = false, flyTimer = 0;
        let isSpace = false, spaceTimer = 0;
        let isShielded = false, shieldTimer = 0;
        let speedTimer = 0; 
        let actualSpeedMult = 1.0; 

        let isFirstPerson = false;
        let renderCamX = 0;
        let renderCamY = -60;
        let renderCamZ = 0;

        const keys = { a: false, d: false };

        let bestScore = localStorage.getItem('neon_best_score_v4') || 0;
        document.getElementById('bestVal').innerText = "BEST: " + bestScore;

        const SCENES = {
            city: { skyTop:['#0033aa', '#1a0033', '#000000'], skyBot:['#87cefa', '#ff0055', '#0a0011'], roadD:['#444444', '#222222', '#0a0011'], roadL:['#555555', '#333333', '#11001a'], line:['#ffffff', '#ffaaaa', '#00ffff'], prop: 'light', build: 'city', bHueMin: 260, bHueMax: 340 },
            desert: { skyTop:['#ff7700', '#aa4400', '#050200'], skyBot:['#ffd700', '#ff4500', '#1a0500'], roadD:['#c2b280', '#5c4033', '#0a0500'], roadL:['#d2b48c', '#8b4513', '#110a00'], line:['#ffffff', '#ffaa00', '#ff00ff'], prop: 'cactus', build: 'desert', bHueMin: 20, bHueMax: 40 },
            ruins: { skyTop:['#556b2f', '#2f4f4f', '#051005'], skyBot:['#8fbc8f', '#556b2f', '#0a1a0a'], roadD:['#333333', '#1a1a25', '#050a05'], roadL:['#444444', '#2b2b36', '#0a100a'], line:['#aaaaaa', '#555566', '#00ff00'], prop: 'pillar', build: 'ruins', bHueMin: 100, bHueMax: 140 },
            factory: { skyTop:['#483d8b', '#4b0082', '#0a0011'], skyBot:['#9370db', '#800080', '#1a0022'], roadD:['#2a2a2a', '#150a15', '#0a0510'], roadL:['#3a3a3a', '#251525', '#110a15'], line:['#ffff00', '#ff00ff', '#00ffff'], prop: 'pipe', build: 'factory', bHueMin: 280, bHueMax: 320 },
            coast: { skyTop:['#00bfff', '#000080', '#00001a'], skyBot:['#20b2aa', '#4b0082', '#001a33'], roadD:['#2f4f4f', '#191970', '#000a11'], roadL:['#40e0d0', '#00008b', '#001122'], line:['#ffffff', '#00ffff', '#00ffff'], prop: 'palm', build: 'coast', bHueMin: 180, bHueMax: 220 }
        };
        let currentSceneKey = 'city';

        // ==========================================
        // 5. 交互控制与安全输入逻辑
        // ==========================================
        function setDiff(d) {
            playUiClick(); difficulty = d;
            document.querySelectorAll('.diff-btn[data-diff]').forEach(b => { b.classList.toggle('active', b.getAttribute('data-diff') === d); });
        }

        function getScoreTitle(s) {
            if (s < 1500) return { t: "马路杀手 💀", c: "#aaaaaa" }; if (s < 3500) return { t: "见习车手 🚗", c: "#ffffff" };
            if (s < 7000) return { t: "秋名山神 🏎️", c: "#00ff00" }; if (s < 12000) return { t: "云端征服者 ✈️", c: "#00ffff" };
            if (s < 20000) return { t: "曲率漫步者 🌌", c: "#ff00ff" }; return { t: "星际传奇 🌟", c: "#ffd700" };
        }

        function startGameTriggerBtn() { if (gameState === 'START') initGame(); }

        function toggleCamera() { playUiClick(); isFirstPerson = !isFirstPerson; document.getElementById('btnCam').classList.toggle('active', isFirstPerson); }

        function changeCar(dir) {
            if (gameState !== 'START') return;
            playUiClick();
            selectedCarIndex = (selectedCarIndex + dir + CARS.length) % CARS.length;
            let car = CARS[selectedCarIndex];
            let display = document.getElementById('car-name-display');
            display.innerText = car.name;
            display.style.color = `hsl(${car.hue}, 100%, ${car.lit + 25}%)`;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') { if (gameState === 'START') changeCar(-1); else keys.a = true; }
            if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') { if (gameState === 'START') changeCar(1); else keys.d = true; }
            if (e.key === 'v' || e.key === 'V') toggleCamera();
            if (e.code === 'Space' && gameState === 'START') startGameTriggerBtn();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.a = false;
            if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.d = false;
        });

        const btnL = document.getElementById('btnLeft'); const btnR = document.getElementById('btnRight'); const btnC = document.getElementById('btnCam');
        const pressL = (e) => { e.preventDefault(); if (gameState === 'START') { changeCar(-1); return; } keys.a = true; };
        const pressR = (e) => { e.preventDefault(); if (gameState === 'START') { changeCar(1); return; } keys.d = true; };
        btnL.addEventListener('mousedown', pressL); btnL.addEventListener('touchstart', pressL, {passive: false});
        btnR.addEventListener('mousedown', pressR); btnR.addEventListener('touchstart', pressR, {passive: false});
        window.addEventListener('mouseup', () => { keys.a = false; keys.d = false; }); 
        window.addEventListener('touchend', () => { keys.a = false; keys.d = false; });
        btnC.addEventListener('mousedown', (e) => { e.preventDefault(); toggleCamera(); });
        btnC.addEventListener('touchstart', (e) => { e.preventDefault(); toggleCamera(); }, {passive: false});

        // ==========================================
        // 6. 数学投影引擎与背景物生成
        // ==========================================
        function project(x, y, z) {
            let camX = isFirstPerson ? carX * 0.75 : 0; let camY = isFirstPerson ? playerY - 25 : playerY - 60;
            let zDiff = z - (isFirstPerson ? camZ + playerZOffset - 5 : camZ);
            if (zDiff <= 5) return null; 
            let scale = FOCAL / zDiff; let sx = W / 2 + (x - camX) * scale; let sy = HORIZON + (y - camY) * scale;
            return { sx, sy, scale };
        }

        function lerpColor(c1, c2, t) {
            const h2r = (hex) => { return hex.length === 4 ? [parseInt(hex[1]+hex[1],16), parseInt(hex[2]+hex[2],16), parseInt(hex[3]+hex[3],16)] :[parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)]; };
            let r1 = h2r(c1); let r2 = h2r(c2);
            return `rgb(${Math.round(r1[0]+(r2[0]-r1[0])*t)},${Math.round(r1[1]+(r2[1]-r1[1])*t)},${Math.round(r1[2]+(r2[2]-r1[2])*t)})`;
        }

        function getEnvColors(timeCycle) {
            let s = SCENES[currentSceneKey], cycle = Math.min(timeCycle, 2.0), phase = Math.floor(cycle), t = cycle - phase;
            if (cycle >= 2.0) { phase = 2; t = 0; }
            let nextPhase = (phase + 1) % 3;
            return {
                skyTop: lerpColor(s.skyTop[phase], s.skyTop[nextPhase], t), skyBot: lerpColor(s.skyBot[phase], s.skyBot[nextPhase], t),
                roadD:  lerpColor(s.roadD[phase], s.roadD[nextPhase], t), roadL:  lerpColor(s.roadL[phase], s.roadL[nextPhase], t),
                line:   lerpColor(s.line[phase], s.line[nextPhase], t), nightFactor: cycle >= 1.5 ? Math.min(1, (cycle - 1.5) * 2) : 0,
                sunY: cycle < 1 ? (HORIZON - 70 + cycle * 40) : (HORIZON - 30 + (cycle - 1) * 80)
            };
        }

        function initEnvironment() {
            let sceneKeys = Object.keys(SCENES); currentSceneKey = sceneKeys[Math.floor(Math.random() * sceneKeys.length)];
            let sConf = SCENES[currentSceneKey];
            stars =[]; 
            for (let i = 0; i < 200; i++) { stars.push({ rawX: Math.random() * W * 2, y: (Math.random() * HORIZON * 2) - HORIZON, s: Math.random() * 2 + 0.5 }); }
            bgItems =[]; let bx = -W * 2; 
            while (bx < W * 3) {
                let bw = 40 + Math.random() * 80, bh = 50 + Math.random() * 160, bDepth = 15 + Math.random() * 20;
                let windows =[];

        // ==========================================

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 2;
                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    let st = shootingStars[i];
                    ctx.beginPath(); ctx.moveTo(st.x, st.y); ctx.lineTo(st.x - st.vx * (st.len / 10), st.y - st.vy * (st.len / 10)); ctx.stroke();

                    ctx.beginPath(); ctx.arc(giantMeteor.x + 30 * giantMeteor.s, giantMeteor.y + 10 * giantMeteor.s, 12 * giantMeteor.s, 0, Math.PI * 2); ctx.fill();
                    giantMeteor.x += 1.5; if (giantMeteor.x > W * 2) giantMeteor.active = false;

            }

            // 飞行云层与大气层体积光散射

                let skyTint = ctx.createLinearGradient(0, 0, 0, HORIZON);
                skyTint.addColorStop(0, env.nightFactor > 0.5 ? 'rgba(0, 20, 40, 0.5)' : 'rgba(0, 150, 255, 0.3)');
                skyTint.addColorStop(1, 'transparent');
                ctx.fillStyle = skyTint; ctx.fillRect(0, 0, W, HORIZON);

                let cloudBase = env.nightFactor > 0.5 ? '#1a2b3c' : '#ffffff';
                let cloudShadow = env.nightFactor > 0.5 ? '#0c1520' : '#d0e0f0';
                ctx.fillStyle = cloudBase; ctx.fillRect(0, HORIZON, W, H - HORIZON); 
                for (let i = 0; i < 20; i++) {
                    ctx.fillStyle = (i % 2 === 0) ? cloudBase : cloudShadow; ctx.beginPath();
                    let cx = (i * 90 + panX * 0.3) % (W + 180) - 90, cy = HORIZON + (i % 4) * 15 - Math.sin(frameCount * 0.01 + i) * 10, r = 60 + Math.sin(i * 77) * 40;
                    ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

                ctx.globalCompositeOperation = 'screen';

        }

        function drawRoad(env, bAlpha) {
            if (bAlpha <= 0 || isSpace) return; 
            ctx.globalAlpha = bAlpha; ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, HORIZON, W, H);
            let startZ = Math.floor((renderCamZ + DRAW_DIST) / SEG_LENGTH) * SEG_LENGTH;

                let p1_l = project(-ROAD_WIDTH, 0, z), p1_r = project(ROAD_WIDTH, 0, z), p2_l = project(-ROAD_WIDTH, 0, z - SEG_LENGTH), p2_r = project(ROAD_WIDTH, 0, z - SEG_LENGTH);
                if (!p1_l || !p2_l) continue;

                ctx.beginPath(); ctx.moveTo(p1_l.sx, p1_l.sy); ctx.lineTo(p1_r.sx, p1_r.sy); ctx.lineTo(p2_r.sx, p2_r.sy); ctx.lineTo(p2_l.sx, p2_l.sy); ctx.fill();

                ctx.beginPath(); ctx.moveTo(p1_r.sx, p1_r.sy); ctx.lineTo(p2_r.sx, p2_r.sy); ctx.stroke();

        // ==========================================
        // 8. 3D 切片几何体渲染核心

        function drawTrue3DBox(x, y, z, w, h, L, colorBody, colorSide, colorTop, tiltX, env, rotZ = 0) {
            let nearPlane = (isFirstPerson ? camZ + playerZOffset - 5 : camZ) + 1;
            let zFront = z + L, zBack = z;
            if (zFront < nearPlane) return null; 
            let bp = project(x + tiltX, y, Math.max(nearPlane, zBack)), fp = project(x + tiltX, y, zFront); 
            if (!bp || !fp) return null;
            let rotOffset = rotZ * bp.scale * 15;
            let bw = w * bp.scale, bh = h * bp.scale, fw = w * fp.scale, fh = h * fp.scale;
            if (renderCamY < y - h) {
                ctx.fillStyle = colorTop; ctx.beginPath(); 
                ctx.moveTo(bp.sx - bw / 2 + rotOffset, bp.sy - bh); ctx.lineTo(bp.sx + bw / 2 + rotOffset, bp.sy - bh);
                ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy - fh); ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy - fh); ctx.fill();
            }
            let camDx = x + tiltX - renderCamX;
            ctx.fillStyle = colorSide; ctx.beginPath();
            if (camDx < -w/2) { ctx.moveTo(bp.sx + bw / 2 + rotOffset, bp.sy); ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy); ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy - fh); ctx.lineTo(bp.sx + bw / 2 + rotOffset, bp.sy - bh); ctx.fill(); } 
            else if (camDx > w/2) { ctx.moveTo(bp.sx - bw / 2 + rotOffset, bp.sy); ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy); ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy - fh); ctx.lineTo(bp.sx - bw / 2 + rotOffset, bp.sy - bh); ctx.fill(); }
            ctx.fillStyle = colorBody; ctx.fillRect(bp.sx - bw / 2 + rotOffset, bp.sy - bh, bw, bh);
            return { bp, bw, bh, s: bp.scale, rot: rotOffset };
        }

            ctx.beginPath(); ctx.moveTo(W * 0.7, hoodBase); ctx.lineTo(W * 0.62, hoodBase - 35); ctx.lineTo(W * 0.67, hoodBase - 35); ctx.lineTo(W * 0.75, hoodBase); ctx.fill();
            
            ctx.fillStyle = '#00ffff'; 
            ctx.beginPath(); ctx.moveTo(W * 0.48, hoodBase); ctx.lineTo(W * 0.48, hoodBase - 35); ctx.lineTo(W * 0.49, hoodBase - 35); ctx.lineTo(W * 0.49, hoodBase); ctx.fill();
            ctx.beginPath(); ctx.moveTo(W * 0.51, hoodBase); ctx.lineTo(W * 0.51, hoodBase - 35); ctx.lineTo(W * 0.52, hoodBase - 35); ctx.lineTo(W * 0.52, hoodBase); ctx.fill();

            ctx.fillStyle = '#080808'; 
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(35, 0); ctx.lineTo(15, hoodBase); ctx.lineTo(0, hoodBase); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(W - 35, 0); ctx.lineTo(W - 15, hoodBase); ctx.lineTo(W, hoodBase); ctx.fill(); 
            ctx.fillRect(0, 0, W, 10); 

            let grad = ctx.createLinearGradient(0, hoodBase, 0, H); grad.addColorStop(0, '#111111'); grad.addColorStop(1, '#050505');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(0, hoodBase - 5); ctx.quadraticCurveTo(W / 2, hoodBase + 10, W, hoodBase - 5); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();
            
            let ledColor = isShielded ? '#00ffff' : (speedTimer > 0 ? '#ffff00' : '#ff0055');
            ctx.strokeStyle = ledColor; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = ledColor; 
            ctx.beginPath(); ctx.moveTo(0, hoodBase - 3); ctx.quadraticCurveTo(W / 2, hoodBase + 12, W, hoodBase - 3); ctx.stroke(); ctx.shadowBlur = 0;

            let hudY = hoodBase + 25;
            ctx.fillStyle = '#050505'; ctx.fillRect(cx - 130, hudY, 50, 25); ctx.strokeStyle = '#222222'; ctx.lineWidth = 2;
            for (let i = hudY + 3; i <= hudY + 20; i += 5) { ctx.beginPath(); ctx.moveTo(cx - 125, i); ctx.lineTo(cx - 85, i); ctx.stroke(); }
            ctx.fillStyle = '#050505'; ctx.fillRect(cx + 80, hudY, 50, 25);
            for (let i = hudY + 3; i <= hudY + 20; i += 5) { ctx.beginPath(); ctx.moveTo(cx + 85, i); ctx.lineTo(cx + 125, i); ctx.stroke(); }

            ctx.fillStyle = '#050505'; ctx.fillRect(cx - 60, hudY, 120, 28); ctx.strokeStyle = '#222222'; ctx.strokeRect(cx - 60, hudY, 120, 28);
            let displaySpeed = gameSpeed + (speedTimer > 0 ? 12 : 0); let displayKmh = Math.floor(displaySpeed * (isSpace ? 0.6 : 1) * 15);
            ctx.fillStyle = '#00ffff'; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center'; ctx.fillText(displayKmh, cx, hudY + 15);
            ctx.font = '10px Courier New'; ctx.fillText("KM/H", cx, hudY + 25);
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx - 45, hudY + 15, 10, Math.PI, Math.PI * 2); ctx.stroke();
            let rpmAngle = Math.PI + (Math.min(displayKmh, 300) / 300) * Math.PI;
            ctx.strokeStyle = '#ff0055'; ctx.beginPath(); ctx.moveTo(cx - 45, hudY + 15); ctx.lineTo(cx - 45 + Math.cos(rpmAngle) * 8, hudY + 15 + Math.sin(rpmAngle) * 8); ctx.stroke();

            let rx = cx + 150, ry = hudY, rw = 70, rh = 50;
            ctx.fillStyle = '#001111'; ctx.fillRect(rx, ry, rw, rh); ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)'; ctx.lineWidth = 1;
            for (let i = 10; i < rw; i += 10) { ctx.beginPath(); ctx.moveTo(rx + i, ry); ctx.lineTo(rx + i, ry + rh); ctx.stroke(); }
            for (let i = 10; i < rh; i += 10) { ctx.beginPath(); ctx.moveTo(rx, ry + i); ctx.lineTo(rx + rw, ry + i); ctx.stroke(); }
            ctx.fillStyle = 'rgba(0, 255, 0, 0.1)'; ctx.fillRect(rx, ry, rw, (frameCount % 50)); ctx.strokeStyle = '#005533'; ctx.strokeRect(rx, ry, rw, rh);
            ctx.fillStyle = '#00ff00'; ctx.fillRect(rx + rw / 2 - 2, ry + rh - 10, 4, 4); 

            obstacles.forEach(ob => { 
                if (ob.z > camZ && ob.z < camZ + 800) {
                    let mapX = rx + rw / 2 + (ob.x - carX) * 0.15, mapY = ry + rh - 10 - (ob.z - (camZ + playerZOffset)) * 0.05;
                    if (mapX > rx && mapX < rx + rw && mapY > ry && mapY < ry + rh) { ctx.fillStyle = (ob.type.startsWith('item')) ? '#00ffff' : '#ff0000'; ctx.fillRect(mapX, mapY, 3, 3); }
                }
            });

            ctx.save(); ctx.translate(cx, H + 60); ctx.rotate(carVX * 0.14); 
            ctx.strokeStyle = '#050505'; ctx.lineWidth = 26; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#181818'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#333333'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, 78, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
            ctx.strokeStyle = '#880000'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]); ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, -Math.PI / 2 - 0.12, -Math.PI / 2 + 0.12); ctx.stroke();
            ctx.fillStyle = '#111111'; ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#080808'; ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill(); 
            ctx.restore();
        }

        // ==========================================
        // 11. 游戏主逻辑与核心物理生成系统
        // ==========================================
        function update() {
            if (speedTimer > 0) speedTimer--; 
            // 修复：平滑下调太空和空中的速度
            actualSpeedMult += ((isSpace ? 0.45 : (isFlying ? 0.65 : 1.0)) - actualSpeedMult) * 0.05;
            let currentSpeed = (gameSpeed + (speedTimer > 0 ? 15 : 0)) * actualSpeedMult; 
            updateEngineSound(currentSpeed, isSpace);

            if (isSpace) bonusScore += 4; else if (isFlying) bonusScore += 1;
            camZ += currentSpeed; score = Math.floor(camZ / 50) + bonusScore; 
            document.getElementById('scoreVal').innerText = "[ SCORE: " + score + " ]";
            
            let status = "";
            if (isSpace) status += "🌌 SPACE WARP "; else if (isFlying) status += "🚀 FLIGHT ";
            if (isShielded) status += "💠 SHIELD "; if (speedTimer > 0) status += "⚡ BOOST ";
            document.getElementById('statusVal').innerText = status;

            if (gameSpeed < speedCap) gameSpeed += 0.001; 
            if (keys.a) carVX -= 0.85; if (keys.d) carVX += 0.85; carVX *= 0.82; carX += carVX;
            let maxCarX = ROAD_WIDTH - 20;
            if (carX < -maxCarX) { carX = -maxCarX; carVX = 0; } if (carX > maxCarX) { carX = maxCarX; carVX = 0; }

            if (spaceTimer > 0) { spaceTimer--; playerY += (-350 - playerY) * 0.05; if (spaceTimer <= 0) { isSpace = false; bonusScore += 1500; } } 
            else if (flyTimer > 0) { flyTimer--; playerY += (-160 - playerY) * 0.05; if (flyTimer <= 0) { isFlying = false; bonusScore += 800; } } 
            else playerY += (0 - playerY) * 0.05; 

            isFlying = playerY < -100; isSpace = playerY < -250;
            if (isShielded) { shieldTimer--; if (shieldTimer <= 0) isShielded = false; }

            if (isFirstPerson) { renderCamX = carX * 0.75; renderCamY = playerY - 25; renderCamZ = camZ + playerZOffset - 5; } 
            else { renderCamX = 0; renderCamY = playerY - 60; renderCamZ = camZ; }

            let spawnRate = Math.max(30, baseSpawnRate - Math.floor(score / 150));
            
            if (!isSpace && !isFlying && frameCount % spawnRate === 0) {
                let xPos = LANES[Math.floor(Math.random() * LANES.length)];
                let canSpawn = true;
                for (let ob of obstacles) { if (Math.abs(ob.x - xPos) < 20 && Math.abs(ob.z - (camZ + DRAW_DIST)) < 250) { canSpawn = false; break; } }

                if (canSpawn) {
                    let type = 'sedan', rnd = Math.random();
                    if (rnd < 0.15) type = 'truck'; else if (rnd < 0.25) type = 'bus'; else if (rnd < 0.40) type = 'suv';
                    else if (rnd < 0.55) type = 'police'; else if (rnd < 0.70) type = 'motor'; else if (rnd < 0.85) type = 'sports';
                    
                    let itemRoll = Math.random();
                    if (itemRoll < 0.05) type = 'item_speed'; else if (itemRoll < 0.10) type = 'item_shield'; else if (itemRoll < 0.15) type = 'item_fly';

                    obstacles.push({ x: xPos, y: 0, z: camZ + DRAW_DIST, type: type, hue: Math.random() * 360, sat: type === 'truck' ? 30 : 80, speed: type === 'truck' ? 3.5 : 5.5, rot: 0, isTossed: false });
                }
            }
            else if (isFlying && !isSpace && frameCount % 60 === 0) {
                let xPos = (Math.random() * 400) - 200; let rnd = Math.random(), type;
                if (rnd < 0.05) type = 'item_speed'; else if (rnd < 0.1) type = 'item_shield'; else if (rnd < 0.3) type = 'item_wings'; 
                else if (rnd < 0.5) { type = 'missile'; playWarning(); } else type = Math.random() > 0.5 ? 'airplane' : 'heli';
                obstacles.push({ x: xPos, y: playerY, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -6 : (type.startsWith('item') ? 0 : -4)), rot: 0, isTossed: false });
            }
            else if (isSpace && frameCount % 70 === 0) {
                let xPos = (Math.random() * 400) - 200; let rnd = Math.random(), type;
                if (rnd < 0.05) type = 'item_speed'; else if (rnd < 0.1) type = 'item_shield';
                else if (rnd < 0.3) { type = 'missile'; playWarning(); } else type = Math.random() > 0.5 ? 'sat' : 'met';
                obstacles.push({ x: xPos, y: playerY, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -6 : (type.startsWith('item') ? 0 : -4)), rot: 0, isTossed: false });
            }

            if (camZ - lastPropZ > 300) {
                let pType = SCENES[currentSceneKey].prop;
                props.push({ type: pType, x: -ROAD_WIDTH - 30, y: 0, z: camZ + DRAW_DIST, side: -1 });
                props.push({ type: pType, x: ROAD_WIDTH + 30, y: 0, z: camZ + DRAW_DIST, side: 1 });
                lastPropZ = camZ;
            }

            let playerZ = camZ + playerZOffset;
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                if (ob.isTossed) { ob.x += ob.vx; ob.y += ob.vy; ob.z += ob.vz; ob.vy += 0.8; ob.rot += 0.5; } 
                else {
                    ob.z += ob.speed; if (ob.type === 'sat' || ob.type === 'met') ob.rot += 0.05; 
                    
                    // 修复：全面调整高精 Hitbox，缩小空中障碍物判定范围，并加上 Y 轴判定
                    let hitX = 22, hitZ = 22, hitY = 30; 
                    if (ob.type === 'truck') { hitX = 35; hitZ = 55; hitY = 50; }
                    if (ob.type === 'bus') { hitX = 35; hitZ = 75; hitY = 50; }
                    if (ob.type === 'suv') { hitX = 28; hitZ = 35; hitY = 40; }
                    if (ob.type === 'motor') { hitX = 12; hitZ = 20; hitY = 25; }
                    // 飞天实体的物理体积缩小，容错率提高，解决"没碰到就死"的问题
                    if (['airplane', 'sat', 'met'].includes(ob.type)) { hitX = 25; hitZ = 25; hitY = 20; }
                    if (ob.type === 'heli') { hitX = 20; hitZ = 20; hitY = 20; }
                    if (ob.type === 'missile') { hitX = 12; hitZ = 15; hitY = 15; }
                    if (ob.type.startsWith('item')) { hitX = 40; hitZ = 30; hitY = 40; } 

                    let isGroundOb = ob.y >= -20 && !ob.type.startsWith('item');
                    if (isGroundOb && isFlying) continue; 

                    let yDist = Math.abs(ob.y - playerY);
                    if (Math.abs(ob.z - playerZ) < hitZ && Math.abs(ob.x - carX) < hitX && yDist < hitY) {
                        if (ob.type === 'item_fly') { isFlying = true; flyTimer = 1200; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup(); }
                        else if (ob.type === 'item_wings') { isSpace = true; spaceTimer = 2000; bonusScore += 1500; obstacles.splice(i, 1); soundBoost(); }
                        else if (ob.type === 'item_shield') { isShielded = true; shieldTimer = 1000; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup(); }
                        else if (ob.type === 'item_speed') { speedTimer = 400; bonusScore += 300; obstacles.splice(i, 1); soundBoost(); } 
                        else {
                            if (isShielded) { 
                                ob.isTossed = true; ob.vx = (ob.x - carX) * 0.2; 
                                if (Math.abs(ob.vx) < 2) ob.vx = Math.random() > 0.5 ? 5 : -5;
                                ob.vy = -15; ob.vz = 5; bonusScore += 300; soundShieldHit();
                            } else {
                                gameState = 'GAMEOVER'; stopEngineAndBGM(); soundCrash();
                                if (score > bestScore) { bestScore = score; localStorage.setItem('neon_best_score_v4', bestScore); }
                                document.getElementById('finalScore').innerText = score; document.getElementById('recordScore').innerText = bestScore;
                                let ev = getScoreTitle(score); let evEl = document.getElementById('evalText'); evEl.innerText = ev.t; evEl.style.color = ev.c;
                                document.getElementById('game-over-screen').style.display = 'block'; document.getElementById('uiLayer').style.display = 'none';
                            }
                        }
                    }
                }
                if (ob.z < renderCamZ - 100 || ob.y > 600) obstacles.splice(i, 1);
            }
            for (let i = props.length - 1; i >= 0; i--) if (props[i].z < renderCamZ) props.splice(i, 1);
        }

        // ==========================================
        // 12. 主渲染控制循环 (整合动态选车逻辑)
        // ==========================================
        function loop() {
            frameCount++;
            if (gameState === 'PLAYING') { update(); } 
            else if (gameState === 'START') { camZ += 2; } // 选车界面的悠闲前进特效

            ctx.clearRect(0, 0, W, H);
            let timeCycle = (frameCount / 1000); 
            let env = getEnvColors(timeCycle);
            let flyProgress = Math.min(1, Math.max(0, -playerY / 120)); 
            let bAlpha = 1 - flyProgress; 
            
            drawBackground(env, bAlpha, flyProgress); 
            drawRoad(env, bAlpha); 
            
            if (gameState === 'START') {
                // 车库炫酷旋转展示逻辑 (Z轴置于极近处以便完美落入中间空洞区)
                let sway = Math.sin(frameCount * 0.05) * 0.3; 
                drawPlayerCar(0, 0, camZ + 110, selectedCarIndex, 0, true, env, sway);
            } else {
                drawObjects(env, bAlpha);
                if (isFirstPerson) drawCockpit(env); 
            }
            
            animationId = requestAnimationFrame(loop);
        }

        // 初始化环境与选车循环
        initEnvironment();
        animationId = requestAnimationFrame(loop);

    </script>
</body>
