<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 赛博飞车 - 终极多边形引擎典藏版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #05000a; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; touch-action: none; user-select: none;
        }

        h1 { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00aaff; margin: 0 0 5px 0; font-size: 32px; letter-spacing: 3px; }
        p { margin: 0 0 15px 0; color: #ff00ff; text-shadow: 0 0 5px #ff00ff; font-size: 15px; font-weight: bold; }
        
        #canvas-wrapper { 
            position: relative; width: 900px; max-width: 98vw; aspect-ratio: 16/9; 
            border: 4px solid #00ffff; border-radius: 8px;
            box-shadow: 0 0 40px #00ffff, 0 0 20px #00aaff inset;
            overflow: hidden; background-color: #000;
        }
        
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

        #scanlines {
            position: absolute; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 5;
        }

        #vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 120%);
            pointer-events: none; z-index: 6;
        }
        
        #uiLayer { position: absolute; top: 20px; left: 25px; right: 25px; display: flex; justify-content: space-between; pointer-events: none; display: none; z-index: 10; }
        .hud-text { font-size: 26px; font-weight: bold; color: #00ffff; text-shadow: 0 0 10px #00ffff; letter-spacing: 2px; }
        
        .overlay {
            position: absolute; top: 12%; left: 50%; transform: translate(-50%, 0);
            text-align: center; background: rgba(5, 5, 15, 0.95); padding: 25px 40px;
            border: 4px dashed #00ffff; box-shadow: 0 0 40px #00ffff;
            display: none; width: 85%; max-width: 550px; z-index: 20; border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        
        #start-screen { display: block; }
        
        .car-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .car-btn { 
            background: #0a0a1a; color: #888; border: 2px solid #333; border-radius: 6px; 
            padding: 10px 15px; font-size: 15px; cursor: pointer; font-weight: bold; 
            font-family: inherit; transition: all 0.2s; 
        }
        .car-btn:hover { border-color: #ff00ff; color: #fff; }
        .car-btn.active { background: #ff00ff; color: #fff; border-color: #fff; box-shadow: 0 0 20px #ff00ff; transform: scale(1.1); }

        .diff-container { display: flex; gap: 15px; justify-content: center; margin: 15px 0; }
        .diff-btn { background: #111; color: #aaa; border: 2px solid #555; border-radius: 6px; padding: 10px 16px; font-size: 16px; cursor: pointer; font-weight: bold; font-family: inherit; transition: all 0.2s; }
        .diff-btn.active { background: #00ffff; color: #000; border-color: #00ffff; box-shadow: 0 0 15px #00ffff; transform: scale(1.1); }

        #real-restart-btn {
            background-color: #ff0055; color: #fff; border: 4px solid #fff; border-radius: 8px;
            padding: 15px 35px; font-size: 24px; font-weight: bold; font-family: inherit; cursor: pointer; 
            box-shadow: 0 0 25px #ff0055; margin-top: 15px; animation: pulse 1.5s infinite; transition: all 0.2s;
        }
        #real-restart-btn:hover { background-color: #fff; color: #ff0055; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 35px #ff0055; } 100% { transform: scale(1); } }

        #controls { display: flex; justify-content: space-between; gap: 20px; margin-top: 20px; width: 800px; max-width: 96vw; }
        .ctrl-btn { flex: 1; background: rgba(0, 20, 40, 0.8); color: #00ffff; border: 4px solid #00ffff; border-radius: 12px; padding: 25px 0; font-size: 28px; font-weight: bold; font-family: inherit; box-shadow: 0 0 20px #00ffff inset; cursor: pointer; text-align: center; transition: all 0.1s; }
        .ctrl-btn:active { background: #00ffff; color: #000; box-shadow: 0 0 40px #00ffff; transform: scale(0.95); }
        .cam-btn { flex: 0.5; background: rgba(40, 40, 40, 0.8); color: #ccc; border-color: #888; box-shadow: none; font-size: 20px; }
        .cam-btn.active { color: #00ffff; border-color: #00ffff; box-shadow: 0 0 20px #00ffff inset; }
        .eval-title { font-size: 36px; font-weight: bold; margin: 15px 0; text-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body>

    <h1>✦ NEON MULTIVERSE ✦</h1>
    <p>真·3D多边形引擎 | 绝美星际漫游 | 顶级超跑车库</p>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="scanlines"></div>
        <div id="vignette"></div>
        
        <div id="uiLayer">
            <div>
                <div class="hud-text" id="scoreVal">[ SCORE: 0 ]</div>
                <div class="hud-text" id="bestVal" style="font-size:16px; color:#aaa; text-shadow:none; margin-top: 5px;">BEST: 0</div>
                <div class="hud-text" id="statusVal" style="color:#ff00ff; margin-top: 10px;"></div>
            </div>
        </div>
        
        <!-- 强化版车库界面 -->
        <div id="start-screen" class="overlay">
            <h2 style="color: #00ffff; text-shadow: 0 0 15px #00ffff; margin: 0 0 5px 0; font-size: 36px;">SYSTEM READY</h2>
            
            <div class="car-container">
                <button class="car-btn active" data-car="lamborghini" onclick="setCar('lamborghini')">兰博基尼</button>
                <button class="car-btn" data-car="bugatti" onclick="setCar('bugatti')">布加迪</button>
                <button class="car-btn" data-car="raptor" onclick="setCar('raptor')">福特猛禽</button>
                <button class="car-btn" data-car="prado" onclick="setCar('prado')">丰田霸道</button>
                <button class="car-btn" data-car="alfa" onclick="setCar('alfa')">阿尔法罗密欧</button>
            </div>

            <div class="diff-container">
                <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
            </div>
            <button class="ctrl-btn" style="width: 100%; font-size: 26px; box-shadow: 0 0 25px #00ffff; padding: 15px 0;" onclick="initGame()">🔥 启动引擎 🔥</button>
        </div>

        <div id="game-over-screen" class="overlay">
            <h2 style="color: #ff0055; margin: 0; font-size: 45px; text-shadow: 0 0 20px #ff0055;">CRASHED!</h2>
            <div id="evalText" class="eval-title"></div>
            <p style="color: #fff; font-size: 24px; margin: 10px 0;">最终得分: <span id="finalScore" style="color: #00ffff; font-weight:bold;">0</span></p>
            <p style="color: #aaa; font-size: 18px; margin: 0 0 20px 0;">历史最高: <span id="recordScore" style="color: #ffd700;">0</span></p>
            <div class="diff-container" style="margin-top: 15px;">
                <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
            </div>
            <button id="real-restart-btn" onclick="initGame()">🔥 再飙一次 🔥</button>
        </div>
    </div>

    <!-- 底部控制器 -->
    <div id="controls">
        <div id="btnLeft" class="ctrl-btn">◀ LEFT</div>
        <div id="btnCam" class="ctrl-btn cam-btn">视角</div>
        <div id="btnRight" class="ctrl-btn">RIGHT ▶</div>
    </div>

    <script>
        // ==========================================
        // 1. 全局配置与基础画布
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        const HORIZON = 220;
        const FOCAL = 250;
        const ROAD_WIDTH = 250;
        const SEG_LENGTH = 50;
        const DRAW_DIST = 2500;
        const LANES =[-140, -45, 45, 140];

        // ==========================================
        // 2. 原生 Web Audio API 声音引擎
        // ==========================================
        let audioCtx = null;
        let engineOscillator = null;
        let engineGain = null;
        let bgmOscillator = null;
        let bgmGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playNoise(duration, vol = 0.5) {
            if (!audioCtx) return;
            let bufferSize = audioCtx.sampleRate * duration;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            let noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; 
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime); 
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);
            let gain = audioCtx.createGain(); gain.gain.setValueAtTime(vol, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
        }

        function startEngineAndBGM() {
            if (!audioCtx) return;
            if (!engineOscillator) {
                engineOscillator = audioCtx.createOscillator(); engineOscillator.type = 'sawtooth';
                engineGain = audioCtx.createGain(); engineGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 400;
                engineOscillator.connect(filter); filter.connect(engineGain); engineGain.connect(audioCtx.destination);
                engineOscillator.start();
            }
            if (!bgmOscillator) {
                bgmOscillator = audioCtx.createOscillator(); bgmOscillator.type = 'square'; bgmOscillator.frequency.value = 55; 
                bgmGain = audioCtx.createGain(); bgmGain.gain.value = 0.02;
                let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 150;
                bgmOscillator.connect(filter); filter.connect(bgmGain); bgmGain.connect(audioCtx.destination);
                bgmOscillator.start();
            }
        }

        function updateEngineSound(speed, isSpace) {
            if (!engineOscillator) return;
            let baseFreq = isSpace ? 35 : 55;
            engineOscillator.frequency.setTargetAtTime(baseFreq + (speed * 6), audioCtx.currentTime, 0.1);
        }

        function stopEngineAndBGM() {
            if (engineOscillator) { engineOscillator.stop(); engineOscillator.disconnect(); engineOscillator = null; }
            if (bgmOscillator) { bgmOscillator.stop(); bgmOscillator.disconnect(); bgmOscillator = null; }
        }

        function soundItemPickup() { playTone(800, 'square', 0.1, 0.1); setTimeout(() => playTone(1200, 'square', 0.2, 0.1), 100); }
        function soundBoost() { playTone(200, 'sawtooth', 0.5, 0.1); playNoise(0.5, 0.2); }
        function soundCrash() { playNoise(1.2, 0.8); playTone(50, 'sawtooth', 1.0, 0.5); }
        function soundShieldHit() { playTone(400, 'triangle', 0.3, 0.2); playNoise(0.3, 0.3); }
        function playUiClick() { playTone(1500, 'square', 0.05, 0.1); }
        function playWarning() { playTone(1000, 'square', 0.1, 0.1); setTimeout(() => playTone(1000, 'square', 0.1, 0.1), 150); setTimeout(() => playTone(1000, 'square', 0.1, 0.1), 300); }

        // ==========================================
        // 3. 游戏核心状态变量
        // ==========================================
        let animationId;
        let gameState = 'START';  
        let camZ = 0, gameSpeed = 6, score = 0, bonusScore = 0, frameCount = 0;
        let carX = 0, carVX = 0, playerY = 0, playerZOffset = 100;   
        
        let obstacles = [], props = [], bgItems = [], stars = [], shootingStars =[], particles =[];
        let giantMeteor = { active: false, x: 0, y: 0, s: 1 };
        let lastPropZ = 0;

        let difficulty = 'racing';
        let baseSpawnRate = 100; 
        let speedCap = 13; 
        let selectedCarType = 'lamborghini'; 
        
        let isFlying = false, flyTimer = 0;
        let isSpace = false, spaceTimer = 0;
        let isShielded = false, shieldTimer = 0;
        let speedTimer = 0; 
        let actualSpeedMult = 1.0; 

        let isFirstPerson = false;
        let renderCamX = 0, renderCamY = -60, renderCamZ = 0;

        const keys = { a: false, d: false };

        let bestScore = localStorage.getItem('neon_best_score_v5') || 0;
        document.getElementById('bestVal').innerText = "BEST: " + bestScore;

        // 生态场景配色与属性配置
        const SCENES = {
            city: { skyTop:['#0033aa', '#1a0033', '#000000'], skyBot:['#87cefa', '#ff0055', '#0a0011'], roadD:['#444444', '#222222', '#0a0011'], roadL:['#555555', '#333333', '#11001a'], line:['#ffffff', '#ffaaaa', '#00ffff'], prop: 'light', build: 'city', bHueMin: 260, bHueMax: 340 },
            desert: { skyTop:['#ff7700', '#aa4400', '#050200'], skyBot:['#ffd700', '#ff4500', '#1a0500'], roadD:['#c2b280', '#5c4033', '#0a0500'], roadL:['#d2b48c', '#8b4513', '#110a00'], line:['#ffffff', '#ffaa00', '#ff00ff'], prop: 'cactus', build: 'desert', bHueMin: 20, bHueMax: 40 },
            ruins: { skyTop:['#556b2f', '#2f4f4f', '#051005'], skyBot:['#8fbc8f', '#556b2f', '#0a1a0a'], roadD:['#333333', '#1a1a25', '#050a05'], roadL:['#444444', '#2b2b36', '#0a100a'], line:['#aaaaaa', '#555566', '#00ff00'], prop: 'pillar', build: 'ruins', bHueMin: 100, bHueMax: 140 },
            factory: { skyTop:['#483d8b', '#4b0082', '#0a0011'], skyBot:['#9370db', '#800080', '#1a0022'], roadD:['#2a2a2a', '#150a15', '#0a0510'], roadL:['#3a3a3a', '#251525', '#110a15'], line:['#ffff00', '#ff00ff', '#00ffff'], prop: 'pipe', build: 'factory', bHueMin: 280, bHueMax: 320 },
            coast: { skyTop:['#00bfff', '#000080', '#00001a'], skyBot:['#20b2aa', '#4b0082', '#001a33'], roadD:['#2f4f4f', '#191970', '#000a11'], roadL:['#40e0d0', '#00008b', '#001122'], line:['#ffffff', '#00ffff', '#00ffff'], prop: 'palm', build: 'coast', bHueMin: 180, bHueMax: 220 }
        };
        let currentSceneKey = 'city';

        // ==========================================
        // 4. UI与交互事件绑定
        // ==========================================
        function setDiff(d) {
            playUiClick(); difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-diff') === d));
        }

        function setCar(car) {
            playUiClick(); selectedCarType = car;
            document.querySelectorAll('.car-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-car') === car));
            if(gameState === 'START') drawInitialScene(); 
        }

        function getScoreTitle(s) {
            if (s < 1500) return { t: "马路杀手 💀", c: "#aaaaaa" };
            if (s < 3500) return { t: "见习车手 🚗", c: "#ffffff" };
            if (s < 7000) return { t: "秋名山神 🏎️", c: "#00ff00" };
            if (s < 12000) return { t: "云端征服者 ✈️", c: "#00ffff" };
            if (s < 20000) return { t: "曲率漫步者 🌌", c: "#ff00ff" };
            return { t: "星际传奇 🌟", c: "#ffd700" };
        }

        function toggleCamera() {
            playUiClick(); isFirstPerson = !isFirstPerson;
            document.getElementById('btnCam').classList.toggle('active', isFirstPerson);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === 'v' || e.key === 'V') toggleCamera();
            if (e.code === 'Space' && gameState === 'START') initGame();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
        });

        const btnL = document.getElementById('btnLeft'), btnR = document.getElementById('btnRight'), btnC = document.getElementById('btnCam');
        const pressL = (e) => { e.preventDefault(); keys.a = true; if(gameState==='START') initGame(); };
        const releaseL = (e) => { e.preventDefault(); keys.a = false; };
        const pressR = (e) => { e.preventDefault(); keys.d = true; if(gameState==='START') initGame(); };
        const releaseR = (e) => { e.preventDefault(); keys.d = false; };

        btnL.addEventListener('mousedown', pressL); btnL.addEventListener('touchstart', pressL, {passive: false});
        btnR.addEventListener('mousedown', pressR); btnR.addEventListener('touchstart', pressR, {passive: false});
        window.addEventListener('mouseup', () => { keys.a = false; keys.d = false; }); 
        window.addEventListener('touchend', () => { keys.a = false; keys.d = false; });
        btnC.addEventListener('mousedown', (e) => { e.preventDefault(); toggleCamera(); });
        btnC.addEventListener('touchstart', (e) => { e.preventDefault(); toggleCamera(); }, {passive: false});

        // ==========================================
        // 5. 环境配置与颜色插值
        // ==========================================
        function lerpColor(c1, c2, t) {
            const h2r = (hex) => hex.length === 4 ?[parseInt(hex[1]+hex[1],16), parseInt(hex[2]+hex[2],16), parseInt(hex[3]+hex[3],16)] :[parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
            let r1 = h2r(c1), r2 = h2r(c2);
            return `rgb(${Math.round(r1[0]+(r2[0]-r1[0])*t)},${Math.round(r1[1]+(r2[1]-r1[1])*t)},${Math.round(r1[2]+(r2[2]-r1[2])*t)})`;
        }

        function getEnvColors(timeCycle) {
            let s = SCENES[currentSceneKey], cycle = Math.min(timeCycle, 2.0), phase = Math.floor(cycle), t = cycle - phase;
            if (cycle >= 2.0) { phase = 2; t = 0; }
            let nextPhase = (phase + 1) % 3, nightFactor = cycle >= 1.5 ? Math.min(1, (cycle - 1.5) * 2) : 0;
            return {
                skyTop: lerpColor(s.skyTop[phase], s.skyTop[nextPhase], t),
                skyBot: lerpColor(s.skyBot[phase], s.skyBot[nextPhase], t),
                roadD:  lerpColor(s.roadD[phase], s.roadD[nextPhase], t),
                roadL:  lerpColor(s.roadL[phase], s.roadL[nextPhase], t),
                line:   lerpColor(s.line[phase], s.line[nextPhase], t),
                nightFactor: nightFactor,
                sunY: cycle < 1 ? (HORIZON - 70 + cycle * 40) : (HORIZON - 30 + (cycle - 1) * 80)
            };
        }

        function initEnvironment() {
            let sceneKeys = Object.keys(SCENES);
            currentSceneKey = sceneKeys[Math.floor(Math.random() * sceneKeys.length)];
            let sConf = SCENES[currentSceneKey];

            stars =[]; 
            for (let i = 0; i < 250; i++) {
                stars.push({ 
                    rawX: Math.random() * W * 2, y: (Math.random() * HORIZON * 2) - HORIZON, 
                    s: Math.random() * 1.5 + 0.5, 
                    c: Math.random() > 0.8 ? '#aaaaff' : (Math.random() > 0.6 ? '#ffaaaa' : '#ffffff') 
                });
            }

            bgItems =[]; 
            let bx = -W * 2; 
            while (bx < W * 3) {
                let bw = 40 + Math.random() * 80, bh = 50 + Math.random() * 160, bDepth = 15 + Math.random() * 20;
                let hue = sConf.bHueMin + Math.random() * (sConf.bHueMax - sConf.bHueMin);
                
                let windows =[];
                for (let wy = 15; wy < bh - 10; wy += 15) {
                    for (let wx = 8; wx < bw - 8; wx += 12) {
                        if (Math.random() > 0.4) windows.push({ x: wx, y: wy, color: Math.random() > 0.8 ? '#ffea00' : '#00ffff' });
                    }
                }
                bgItems.push({ 
                    x: bx, w: bw, h: bh, d: bDepth, hue: hue, type: sConf.build, seed: Math.random(), 
                    windows: windows, isAntenna: Math.random() > 0.6, hasBillboard: Math.random() > 0.8 
                });
                bx += bw + 10 + Math.random() * 30;
            }
        }

        function initGame() {
            initAudio(); playUiClick(); startEngineAndBGM();
            gameState = 'PLAYING';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('uiLayer').style.display = 'flex';
            
            if (difficulty === 'noob') { gameSpeed = 5; speedCap = 11; baseSpawnRate = 120; }
            else if (difficulty === 'racing') { gameSpeed = 7; speedCap = 14; baseSpawnRate = 80; }
            else if (difficulty === 'madhouse') { gameSpeed = 9; speedCap = 18; baseSpawnRate = 50; }

            camZ = 0; score = 0; bonusScore = 0; frameCount = 0; carX = 0; carVX = 0; playerY = 0; 
            isFlying = false; isSpace = false; isShielded = false; 
            flyTimer = 0; spaceTimer = 0; shieldTimer = 0; speedTimer = 0; lastPropZ = 0;
            actualSpeedMult = 1.0; 
            
            obstacles =[]; props = []; shootingStars = []; particles =[]; giantMeteor.active = false;
            initEnvironment();
            if (animationId) cancelAnimationFrame(animationId);
            loop();
        }

        // ==========================================
        // 6. 纯血 3D 多边形渲染核心引擎 (TRUE 3D QUAD ENGINE)
        // ==========================================
        let renderQueue =[];

        // 3D 顶点投影到 2D 屏幕
        function p3d(x, y, z) {
            let dx = x - renderCamX;
            let dy = y - renderCamY;
            let dz = z - renderCamZ;
            if (dz <= 1) return null; // 剔除摄像机后方的点
            let scale = FOCAL / dz;
            return { x: W / 2 + dx * scale, y: HORIZON + dy * scale, z: dz, s: scale };
        }

        // 提交一个四边形面到渲染队列
        function pushQuad(p1, p2, p3, p4, color, glow = 0) {
            if (!p1 || !p2 || !p3 || !p4) return;
            // 【硬核图形学】背面剔除 (Backface Culling) - 使用叉乘判断面的朝向，不画看不见的背部面
            let cross = (p2.x - p1.x) * (p3.y - p2.y) - (p2.y - p1.y) * (p3.x - p2.x);
            if (cross <= 0) return; // 逆时针或背对摄像机的面直接丢弃，极大提高性能

            // 取平均深度用于画家算法排序
            let zAvg = (p1.z + p2.z + p3.z + p4.z) / 4;
            renderQueue.push({ p: [p1, p2, p3, p4], color: color, z: zAvg, glow: glow });
        }

        // 核心渲染器：清空并按 Z 轴深度画出所有多边形
        function flushQuads() {
            // 画家算法：从远到近渲染，彻底解决一切 Z-Fighting 和穿模问题！
            renderQueue.sort((a, b) => b.z - a.z);
            for (let q of renderQueue) {
                ctx.fillStyle = q.color;
                if (q.glow) { ctx.shadowBlur = q.glow; ctx.shadowColor = q.color; }
                ctx.beginPath();
                ctx.moveTo(q.p[0].x, q.p[0].y);
                ctx.lineTo(q.p[1].x, q.p[1].y);
                ctx.lineTo(q.p[2].x, q.p[2].y);
                ctx.lineTo(q.p[3].x, q.p[3].y);
                ctx.closePath();
                ctx.fill();
                if (q.glow) ctx.shadowBlur = 0;
                
                // 给模型增加极细的黑色描边，增加立体感和漫画风
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
            renderQueue =[];
        }

        // 强大的 3D 盒子生成器 (支持 Y 轴旋转和 X 轴倾斜)
        function drawBox(cx, cy, cz, w, h, d, colors, rotY = 0, tiltX = 0) {
            let cxOff = cx + tiltX;
            // 局部坐标顶点
            let lVerts =[
                {x: -w, y: -h, z: -d}, {x: w, y: -h, z: -d}, {x: w, y: 0, z: -d}, {x: -w, y: 0, z: -d}, // 后侧 0,1,2,3
                {x: -w, y: -h, z:  d}, {x: w, y: -h, z:  d}, {x: w, y: 0, z:  d}, {x: -w, y: 0, z:  d}  // 前侧 4,5,6,7
            ];
            
            // 旋转并投影
            let v =[];
            for (let pt of lVerts) {
                let rx = pt.x * Math.cos(rotY) - pt.z * Math.sin(rotY);
                let rz = pt.x * Math.sin(rotY) + pt.z * Math.cos(rotY);
                v.push(p3d(cxOff + rx, cy + pt.y, cz + rz));
            }

            // 6个面 (顺时针定义以通过背面剔除)
            // {t: top, b: bottom, l: left, r: right, f: front, bk: back}
            pushQuad(v[1], v[0], v[3], v[2], colors.bk); // 后
            pushQuad(v[4], v[5], v[6], v[7], colors.f);  // 前
            pushQuad(v[0], v[1], v[5], v[4], colors.t);  // 顶
            pushQuad(v[3], v[2], v[6], v[7], colors.b);  // 底
            pushQuad(v[0], v[4], v[7], v[3], colors.l);  // 左
            pushQuad(v[5], v[1], v[2], v[6], colors.r);  // 右
        }

        // 通用生成盒子的颜色配置器
        function cBox(bC, sC, tC) {
            return { t: tC, b: sC, l: sC, r: sC, f: bC, bk: bC };
        }

        // ==========================================
        // 7. 名车图鉴：纯手工打磨的 3D 模型库
        // ==========================================
        function drawWheel(x, y, z, t, rY=0) {
            drawBox(x, y-2, z, 3, 6, 6, cBox('#0a0a0a', '#000000', '#111111'), rY, t);
        }

        function drawLambo(x, y, z, h, s, tX, isP) {
            let t = tX * 3, bC = isP ? '#aaff00' : `hsl(${h},${s}%,45%)`, sC = isP ? '#558800' : `hsl(${h},${s}%,25%)`, tC = isP ? '#ccff33' : `hsl(${h},${s}%,60%)`;
            let gC = '#111';
            
            // 极低趴底盘与前铲
            drawBox(x, y, z, 14, 4, 15, cBox(bC, sC, tC), 0, t);
            // 楔形乘员舱
            drawBox(x, y-4, z+2, 11, 4, 8, cBox(gC, '#000', tC), 0, t); 
            // 轮子
            drawWheel(x-14, y, z+10, t); drawWheel(x+14, y, z+10, t);
            drawWheel(x-14, y, z-10, t); drawWheel(x+14, y, z-10, t);
            // 巨型夸张尾翼
            drawBox(x-12, y-4, z-14, 1, 4, 2, cBox(sC, sC, sC), 0, t);
            drawBox(x+12, y-4, z-14, 1, 4, 2, cBox(sC, sC, sC), 0, t);
            drawBox(x, y-8, z-15, 17, 1, 3, cBox('#111', '#000', '#222'), 0, t);
            // 发光 Y 型尾灯 (纯3D面贴图)
            if (isP || h) {
                let tail = p3d(x+t, y-2, z-15);
                if (tail && renderCamZ < z - 15) {
                    ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
                    ctx.fillRect(tail.x - 12*tail.s, tail.y, 8*tail.s, 2*tail.s);
                    ctx.fillRect(tail.x + 4*tail.s, tail.y, 8*tail.s, 2*tail.s);
                    ctx.shadowBlur = 0;
                }
            }
        }

        function drawBugatti(x, y, z, h, s, tX, isP) {
            let t = tX * 3, bC = isP ? '#0055ff' : `hsl(${h},${s}%,45%)`, sC = isP ? '#002288' : `hsl(${h},${s}%,25%)`;
            let cB = cBox(bC, sC, bC), cBk = cBox('#111', '#000', '#111');
            // 圆润流线型车身，通过3段Box拼合
            drawBox(x, y, z+5, 13, 6, 10, cB, 0, t); // 前半部
            drawBox(x, y, z-8, 14, 7, 8, cBk, 0, t); // 后半部深色包围
            drawBox(x, y-6, z-2, 10, 4, 8, cBox('#222','#000','#222'), 0, t); // 乘员舱
            drawWheel(x-14, y, z+10, t); drawWheel(x+14, y, z+10, t);
            drawWheel(x-15, y, z-10, t); drawWheel(x+15, y, z-10, t);
            // 贯穿尾灯
            let tail = p3d(x+t, y-4, z-16);
            if (tail && renderCamZ < z - 16) {
                ctx.fillStyle = '#ff0055'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
                ctx.fillRect(tail.x - 12*tail.s, tail.y, 24*tail.s, 2*tail.s); ctx.shadowBlur = 0;
            }
        }

        function drawRaptor(x, y, z, h, s, tX, isP) {
            let t = tX * 3, bC = isP ? '#333' : `hsl(${h},${s}%,30%)`, sC = isP ? '#111' : `hsl(${h},${s}%,15%)`, tC = isP ? '#444' : `hsl(${h},${s}%,40%)`;
            let cB = cBox(bC, sC, tC);
            // 高悬挂巨型车身
            drawBox(x, y-4, z+10, 16, 6, 8, cB, 0, t); // 引擎盖
            drawBox(x, y-10, z, 16, 8, 8, cBox('#111','#000',tC), 0, t); // 驾驶舱
            drawBox(x, y-4, z-10, 16, 6, 8, cB, 0, t); // 后货箱
            drawBox(x-14, y-4, z-6, 1, 6, 4, cBox('#111','#000','#111'), 0, t); // 防滚架
            drawBox(x+14, y-4, z-6, 1, 6, 4, cBox('#111','#000','#111'), 0, t);
            // 巨型越野轮胎
            drawBox(x-16, y, z+12, 3, 8, 8, cBox('#111','#000','#222'), 0, t);
            drawBox(x+16, y, z+12, 3, 8, 8, cBox('#111','#000','#222'), 0, t);
            drawBox(x-16, y, z-12, 3, 8, 8, cBox('#111','#000','#222'), 0, t);
            drawBox(x+16, y, z-12, 3, 8, 8, cBox('#111','#000','#222'), 0, t);
        }

        function drawPrado(x, y, z, h, s, tX, isP) {
            let t = tX * 3, bC = isP ? '#ffffff' : `hsl(${h},${s}%,80%)`, sC = isP ? '#cccccc' : `hsl(${h},${s}%,50%)`, tC = isP ? '#eeeeee' : `hsl(${h},${s}%,90%)`;
            let cB = cBox(bC, sC, tC);
            drawBox(x, y-2, z+10, 15, 6, 8, cB, 0, t); // 车头
            drawBox(x, y-8, z-4, 15, 8, 12, cBox('#222','#111',tC), 0, t); // 高大车身
            drawBox(x, y-2, z-4, 16, 6, 12, cB, 0, t); // 底盘
            drawWheel(x-15, y, z+12, t); drawWheel(x+15, y, z+12, t);
            drawWheel(x-15, y, z-10, t); drawWheel(x+15, y, z-10, t);
            // 尾部备胎书包
            drawBox(x, y-4, z-17, 6, 6, 2, cBox('#111','#000','#222'), 0, t);
        }

        function drawAlfa(x, y, z, h, s, tX, isP) {
            let t = tX * 3, bC = isP ? '#dd0000' : `hsl(${h},${s}%,45%)`, sC = isP ? '#880000' : `hsl(${h},${s}%,25%)`, tC = isP ? '#ff3333' : `hsl(${h},${s}%,60%)`;
            drawBox(x, y, z, 13, 5, 14, cBox(bC, sC, tC), 0, t); // 修长底盘
            drawBox(x, y-5, z-2, 10, 4, 8, cBox('#111','#000',tC), 0, t); // 圆润座舱
            drawWheel(x-13, y, z+10, t); drawWheel(x+13, y, z+10, t);
            drawWheel(x-13, y, z-10, t); drawWheel(x+13, y, z-10, t);
            // 倒三角前脸贴花
            let front = p3d(x+t, y-2, z+14);
            if (front && renderCamZ > z+14) {
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(front.x, front.y+4*front.s); ctx.lineTo(front.x-3*front.s, front.y-2*front.s); ctx.lineTo(front.x+3*front.s, front.y-2*front.s); ctx.fill();
            }
        }

        // 统一车辆分发与特效挂载
        function drawPlayerVehicle(x, y, z, tiltX, env) {
            if (selectedCarType === 'lamborghini') drawLambo(x, y, z, 0, 100, tiltX, true);
            else if (selectedCarType === 'bugatti') drawBugatti(x, y, z, 0, 100, tiltX, true);
            else if (selectedCarType === 'raptor') drawRaptor(x, y, z, 0, 100, tiltX, true);
            else if (selectedCarType === 'prado') drawPrado(x, y, z, 0, 100, tiltX, true);
            else if (selectedCarType === 'alfa') drawAlfa(x, y, z, 0, 100, tiltX, true);

            // 车辆尾焰粒子特效
            if (isFlying || isSpace || speedTimer > 0) { 
                let pJet = p3d(x, y - 2, z - 16);
                if (pJet) {
                    ctx.fillStyle = '#ff5500'; ctx.beginPath(); ctx.arc(pJet.x, pJet.y, 15 * pJet.s * Math.random() + 5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(pJet.x, pJet.y, 8 * pJet.s * Math.random() + 2, 0, Math.PI * 2); ctx.fill();
                }
            }
            // 护盾特效
            if (isShielded) {
                let pC = p3d(x, y - 5, z);
                if (pC) {
                    ctx.beginPath(); ctx.ellipse(pC.x, pC.y, 50 * pC.s, 35 * pC.s, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.15)'; ctx.fill();
                    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2 * pC.s; ctx.stroke(); 
                }
            }
        }

        function drawTruck(x, y, z, h, tX, rY=0) {

        // ==========================================
        // 9. 主控渲染分配与画幅合成
        // ==========================================
        function drawObjects(env, bAlpha) {
            let renderList =[];
            if (!isFirstPerson) renderList.push({ t: 'player', x: carX, y: playerY, z: camZ + playerZOffset, tilt: carVX });
            obstacles.forEach(ob => renderList.push(ob));
            props.forEach(pr => renderList.push(pr));
            
            // 基于距离摄像机的粗略排序，后续四边形绘制引擎内部会做精准的画家算法
            renderList.sort((a, b) => b.z - a.z);

            renderList.forEach(o => {
                let iP = (o.t === 'player'), iG = o.y >= -20 && !iP && !o.t.startsWith('item'); 
                if (iG && (bAlpha <= 0 || isSpace)) return; 
                
                // 将物体的子组件面片推入绘制队列
                if (['light','cactus','pillar','pipe','palm'].includes(o.t)) drawRoadside(o.x, o.y, o.z, o.side, env, o.t);
                else if (o.t.startsWith('item')) drawItem(o.x, o.y, o.z, o.t, frameCount);
                else if (iP) drawPlayerVehicle(o.x, o.y, o.z, o.tilt, env);
                else if (o.t === 'truck') drawTruck(o.x, o.y, o.z, o.hue, 0, o.rot||0);
                else if (o.t === 'bus') drawBus(o.x, o.y, o.z, o.hue, 0, o.rot||0);
                else if (o.t === 'suv') drawPrado(o.x, o.y, o.z, o.hue, 100, 0, false);
                else if (o.t === 'police') drawPolice(o.x, o.y, o.z, 0, o.rot||0);
                else if (o.t === 'motor') drawMotor(o.x, o.y, o.z, o.hue, 0, o.rot||0);
                else if (o.t === 'airplane') drawAirplane(o.x, o.y, o.z, o.rot||0);
                else if (o.t === 'heli') drawHeli(o.x, o.y, o.z, o.rot||0);
                else if (o.t === 'missile') drawMissile(o.x, o.y, o.z, o.rot||0);
                else if (o.t === 'sat') drawSat(o.x, o.y, o.z, o.rot||0);
                else if (o.t === 'met') drawMeteor(o.x, o.y, o.z, o.rot||0);
                else drawLambo(o.x, o.y, o.z, o.hue||340, o.sat||100, 0, false); // 默认NPC轿车
            });

            // 统一调用纯血 3D 渲染器的光栅化输出
            flushQuads();
        }

        // ===================================
        // 10. 第一人称座舱与动态UI
        // ===================================
        function drawCockpit(env) {
            let hB = 320, cx = W / 2;
            let mG = ctx.createLinearGradient(0, hB-55, 0, hB-5); mG.addColorStop(0, env.skyTop); mG.addColorStop(1, isSpace ? '#000' : env.skyBot);

            ctx.fillStyle = '#050505'; ctx.beginPath(); ctx.moveTo(0, hB-60); ctx.lineTo(40, hB-50); ctx.lineTo(40, hB); ctx.lineTo(0, hB+10); ctx.fill(); 
            ctx.fillStyle = mG; ctx.beginPath(); ctx.moveTo(0, hB-55); ctx.lineTo(35, hB-46); ctx.lineTo(35, hB-4); ctx.lineTo(0, hB+5); ctx.fill(); 
            ctx.fillStyle = '#050505'; ctx.beginPath(); ctx.moveTo(W, hB-60); ctx.lineTo(W-40, hB-50); ctx.lineTo(W-40, hB); ctx.lineTo(W, hB+10); ctx.fill(); 
            ctx.fillStyle = mG; ctx.beginPath(); ctx.moveTo(W, hB-55); ctx.lineTo(W-35, hB-46); ctx.lineTo(W-35, hB-4); ctx.lineTo(W, hB+5); ctx.fill(); 

            let cH = '#222', cL = '#fff';
            if (selectedCarType === 'lamborghini'){ cH = '#580'; cL = '#af0'; }
            else if (selectedCarType === 'bugatti'){ cH = '#028'; cL = '#05f'; }
            else if (selectedCarType === 'raptor'){ cH = '#111'; cL = '#444'; }
            else if (selectedCarType === 'prado'){ cH = '#ccc'; cL = '#fff'; }
            else if (selectedCarType === 'alfa'){ cH = '#800'; cL = '#d00'; }

            ctx.fillStyle = cH; ctx.beginPath(); ctx.moveTo(0, hB); ctx.lineTo(W, hB); ctx.lineTo(W*0.8, hB-35); ctx.lineTo(W*0.2, hB-35); ctx.fill();
            ctx.fillStyle = cL; ctx.beginPath(); ctx.moveTo(W*0.48, hB); ctx.lineTo(W*0.48, hB-35); ctx.lineTo(W*0.49, hB-35); ctx.lineTo(W*0.49, hB); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(W*0.51, hB); ctx.lineTo(W*0.51, hB-35); ctx.lineTo(W*0.52, hB-35); ctx.lineTo(W*0.52, hB); ctx.fill();

            ctx.fillStyle = '#080808'; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(35, 0); ctx.lineTo(15, hB); ctx.lineTo(0, hB); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(W-35, 0); ctx.lineTo(W-15, hB); ctx.lineTo(W, hB); ctx.fill(); ctx.fillRect(0, 0, W, 10); 

            let grad = ctx.createLinearGradient(0, hB, 0, H); grad.addColorStop(0, '#111'); grad.addColorStop(1, '#050505');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(0, hB-5); ctx.quadraticCurveTo(W/2, hB+10, W, hB-5); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();
            
            let ledC = isShielded ? '#0ff' : (speedTimer > 0 ? '#ff0' : '#f05');
            ctx.strokeStyle = ledC; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = ledC; 
            ctx.beginPath(); ctx.moveTo(0, hB-3); ctx.quadraticCurveTo(W/2, hB+12, W, hB-3); ctx.stroke(); ctx.shadowBlur = 0;

            let hY = hB + 25;
            ctx.fillStyle = '#050505'; ctx.fillRect(cx-130, hY, 50, 25); ctx.strokeStyle = '#222'; ctx.lineWidth = 2; for (let i=hY+3; i<=hY+20; i+=5) { ctx.beginPath(); ctx.moveTo(cx-125, i); ctx.lineTo(cx-85, i); ctx.stroke(); }
            ctx.fillStyle = '#050505'; ctx.fillRect(cx+80, hY, 50, 25); for (let i=hY+3; i<=hY+20; i+=5) { ctx.beginPath(); ctx.moveTo(cx+85, i); ctx.lineTo(cx+125, i); ctx.stroke(); }

            ctx.fillStyle = '#050505'; ctx.fillRect(cx-60, hY, 120, 28); ctx.strokeStyle = '#222'; ctx.strokeRect(cx-60, hY, 120, 28);
            let dS = gameSpeed + (speedTimer > 0 ? 12 : 0), dK = Math.floor(dS * (isSpace ? 0.6 : 1) * 15);
            ctx.fillStyle = '#0ff'; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center'; ctx.fillText(dK, cx, hY+15); ctx.font = '10px Courier New'; ctx.fillText("KM/H", cx, hY+25);
            
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx-45, hY+15, 10, Math.PI, Math.PI*2); ctx.stroke();
            let rA = Math.PI + (Math.min(dK, 300) / 300) * Math.PI;
            ctx.strokeStyle = '#f05'; ctx.beginPath(); ctx.moveTo(cx-45, hY+15); ctx.lineTo(cx-45 + Math.cos(rA)*8, hY+15 + Math.sin(rA)*8); ctx.stroke();

            let rx = cx+150, ry = hY, rw = 70, rh = 50;
            ctx.fillStyle = '#001111'; ctx.fillRect(rx, ry, rw, rh); ctx.strokeStyle = 'rgba(0,255,0,0.2)'; ctx.lineWidth = 1;
            for (let i=10; i<rw; i+=10) { ctx.beginPath(); ctx.moveTo(rx+i, ry); ctx.lineTo(rx+i, ry+rh); ctx.stroke(); }
            for (let i=10; i<rh; i+=10) { ctx.beginPath(); ctx.moveTo(rx, ry+i); ctx.lineTo(rx+rw, ry+i); ctx.stroke(); }
            ctx.fillStyle = 'rgba(0,255,0,0.1)'; ctx.fillRect(rx, ry, rw, (frameCount%50)); ctx.strokeStyle = '#005533'; ctx.strokeRect(rx, ry, rw, rh);
            ctx.fillStyle = '#0f0'; ctx.fillRect(rx+rw/2-2, ry+rh-10, 4, 4);
            
            obstacles.forEach(o => { 
                if (o.z > camZ && o.z < camZ + 800) {
                    let mx = rx + rw/2 + (o.x - carX) * 0.15, my = ry + rh - 10 - (o.z - (camZ + playerZOffset)) * 0.05;
                    if (mx > rx && mx < rx+rw && my > ry && my < ry+rh) { ctx.fillStyle = (o.t.startsWith('item')) ? '#0ff' : '#f00'; ctx.fillRect(mx, my, 3, 3); }
                }
            });

            ctx.save(); ctx.translate(cx, H+60); ctx.rotate(carVX * 0.14); 
            ctx.strokeStyle = '#050505'; ctx.lineWidth = 26; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI*2); ctx.stroke();
            ctx.strokeStyle = '#181818'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI*2); ctx.stroke();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, 78, Math.PI*1.1, Math.PI*1.9); ctx.stroke();
            ctx.strokeStyle = '#800'; ctx.lineWidth = 1; ctx.setLineDash([4,6]); ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, -Math.PI/2-0.12, -Math.PI/2+0.12); ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#080808'; ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }

        // ==========================================
        // 11. 主物理引擎与碰撞逻辑
        // ==========================================
        function update() {
            if (speedTimer > 0) speedTimer--; 
            // 极限降速逻辑，让空中与太空有时间操作
            let targetSpeedMult = isSpace ? 0.25 : (isFlying ? 0.5 : 1.0);
            actualSpeedMult += (targetSpeedMult - actualSpeedMult) * 0.05;
            
            let currentSpeed = (gameSpeed + (speedTimer > 0 ? 15 : 0)) * actualSpeedMult; 
            updateEngineSound(currentSpeed, isSpace);

            if (isSpace) bonusScore += 4; else if (isFlying) bonusScore += 1;
            camZ += currentSpeed; score = Math.floor(camZ / 50) + bonusScore; 
            document.getElementById('scoreVal').innerText = "[ SCORE: " + score + " ]";
            
            let st = ""; if(isSpace) st+="🌌 SPACE WARP "; else if(isFlying) st+="🚀 FLIGHT "; if(isShielded) st+="💠 SHIELD "; if(speedTimer>0) st+="⚡ BOOST "; document.getElementById('statusVal').innerText = st;

            if (gameSpeed < speedCap) gameSpeed += 0.001; 
            if (keys.a) carVX -= 0.85; if (keys.d) carVX += 0.85; carVX *= 0.82; carX += carVX;
            let mX = ROAD_WIDTH - 20; if (carX < -mX) { carX = -mX; carVX = 0; } if (carX > mX) { carX = mX; carVX = 0; }

            if (spaceTimer > 0) { spaceTimer--; playerY += (-350 - playerY) * 0.05; if (spaceTimer <= 0) { isSpace = false; bonusScore += 1500; } } 
            else if (flyTimer > 0) { flyTimer--; playerY += (-160 - playerY) * 0.05; if (flyTimer <= 0) { isFlying = false; bonusScore += 800; } } 
            else playerY += (0 - playerY) * 0.05; 

            isFlying = playerY < -100; isSpace = playerY < -250;
            if (isShielded) { shieldTimer--; if (shieldTimer <= 0) isShielded = false; }

            if (isFirstPerson) { renderCamX = carX * 0.75; renderCamY = playerY - 25; renderCamZ = camZ + playerZOffset - 5; } 
            else { renderCamX = 0; renderCamY = playerY - 60; renderCamZ = camZ; }

            frameCount++; let sR = Math.max(30, baseSpawnRate - Math.floor(score / 150));
            
            // 生态系统刷新池 (含 15% 火箭生成)
            if (!isSpace && !isFlying && frameCount % sR === 0) {
                let xP = LANES[Math.floor(Math.random() * LANES.length)], cSp = true;
                for (let o of obstacles) if (Math.abs(o.x - xP) < 20 && Math.abs(o.z - (camZ + DRAW_DIST)) < 250) { cSp = false; break; }
                if (cSp) {
                    let t = 'sedan', r = Math.random();
                    if (r<0.15) t='truck'; else if (r<0.25) t='bus'; else if (r<0.4) t='suv'; else if (r<0.55) t='police'; else if (r<0.7) t='motor';
                    let ir = Math.random(); if (ir<0.05) t='item_speed'; else if (ir<0.1) t='item_shield'; else if (ir<0.15) t='item_fly';
                    obstacles.push({x: xP, y: 0, z: camZ+DRAW_DIST, t: t, hue: Math.random()*360, sat: t==='truck'?30:80, speed: t==='truck'?3.5:5.5, rot: 0, isTossed: false});
                }
            } else if (isFlying && !isSpace && frameCount % 60 === 0) {
                let xP = (Math.random()*400)-200, r = Math.random(), t;
                if(r<0.05) t='item_speed'; else if(r<0.1) t='item_shield'; else if(r<0.3) t='item_wings'; else if(r<0.5){t='missile';playWarning();} else t=Math.random()>0.5?'airplane':'heli';
                obstacles.push({x: xP, y: playerY, z: camZ+DRAW_DIST+500, t: t, speed: (t==='missile'?-15:(t.startsWith('item')?0:-10)), rot: 0, isTossed: false});
            } else if (isSpace && frameCount % 70 === 0) {
                let xP = (Math.random()*400)-200, r = Math.random(), t;
                if(r<0.05) t='item_speed'; else if(r<0.1) t='item_shield'; else if(r<0.3){t='missile';playWarning();} else t=Math.random()>0.5?'sat':'met';
                obstacles.push({x: xP, y: playerY, z: camZ+DRAW_DIST+500, t: t, speed: (t==='missile'?-15:(t.startsWith('item')?0:-10)), rot: 0, isTossed: false});
            }
            if (camZ - lastPropZ > 300) {
                let pT = SCENES[currentSceneKey].prop;
                props.push({t: pT, x: -ROAD_WIDTH-30, y: 0, z: camZ+DRAW_DIST, side: -1});
                props.push({t: pT, x: ROAD_WIDTH+30, y: 0, z: camZ+DRAW_DIST, side: 1});
                lastPropZ = camZ;
            }

            let pZ = camZ + playerZOffset;
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                if (o.isTossed) { o.x += o.vx; o.y += o.vy; o.z += o.vz; o.vy += 0.8; o.rot += 0.5; } 
                else {
                    o.z += o.speed; if (o.t === 'sat' || o.t === 'met' || o.t.startsWith('item')) o.rot += 0.05;
                    
                    // 【极度精准收紧的碰撞盒】，解决空中隔空暴毙！
                    let hX = 22, hZ = 22, hY = 40;
                    if (o.t==='truck'){ hX=35; hZ=55; } else if (o.t==='bus'){ hX=35; hZ=75; } else if (o.t==='suv'){ hX=28; hZ=35; } else if (o.t==='motor'){ hX=12; hZ=20; }
                    else if (['airplane','heli','missile','sat','met'].includes(o.t)){ hX=20; hZ=20; hY=25; } 
                    else if (o.t.startsWith('item')){ hX=40; hZ=30; hY=50; }
                    
                    let iG = o.y >= -20 && !o.t.startsWith('item'); if (iG && isFlying) continue; 
                    
                    if (Math.abs(o.z - pZ) < hZ && Math.abs(o.x - carX) < hX && Math.abs(o.y - playerY) < hY) {
                        if (o.t === 'item_fly') { isFlying = true; flyTimer = 1200; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup(); }
                        else if (o.t === 'item_wings') { isSpace = true; spaceTimer = 2000; bonusScore += 1500; obstacles.splice(i, 1); soundBoost(); }
                        else if (o.t === 'item_shield') { isShielded = true; shieldTimer = 1000; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup(); }
                        else if (o.t === 'item_speed') { speedTimer = 400; bonusScore += 300; obstacles.splice(i, 1); soundBoost(); }
                        else {
                            if (isShielded) { o.isTossed = true; o.vx = (o.x - carX) * 0.2; if(Math.abs(o.vx)<2) o.vx=Math.random()>0.5?5:-5; o.vy = -15; o.vz = 5; bonusScore += 300; soundShieldHit(); }
                            else {
                                gameState = 'GAMEOVER'; stopEngineAndBGM(); soundCrash();
                                if (score > bestScore) { bestScore = score; localStorage.setItem('neon_best_score_v5', bestScore); }
                                document.getElementById('finalScore').innerText = score; document.getElementById('recordScore').innerText = bestScore;
                                let ev = getScoreTitle(score); let eE = document.getElementById('evalText'); eE.innerText = ev.t; eE.style.color = ev.c;
                                document.getElementById('game-over-screen').style.display = 'block'; document.getElementById('uiLayer').style.display = 'none';
                            }
                        }
                    }
                }
                if (o.z < renderCamZ - 100 || o.y > 600) obstacles.splice(i, 1);
            }
            for (let i = props.length - 1; i >= 0; i--) if (props[i].z < renderCamZ) props.splice(i, 1);
        }

        // ==========================================
        // 12. 主循环入口
        // ==========================================
        function loop() {
            if (gameState === 'PLAYING') {
                update(); ctx.clearRect(0, 0, W, H);
                let e = getEnvColors(frameCount / 1000), fP = Math.min(1, Math.max(0, -playerY / 120)), bA = 1 - fP;
                drawBackground(e, bA, fP); drawRoad(e, bA); drawObjects(e, bA); if (isFirstPerson) drawCockpit(e); 
                animationId = requestAnimationFrame(loop);
            }
        }
        
        function drawInitialScene() {
            initEnvironment(); let e = getEnvColors(0); ctx.clearRect(0, 0, W, H);
            renderCamX = 0; renderCamY = -60; renderCamZ = 0; camZ = 0; // 重置视角
            drawBackground(e, 1, 0); drawRoad(e, 1); drawPlayerVehicle(0, 0, 80, 0, e); flushQuads(); 
            if (isFirstPerson) drawCockpit(e);
        }
        drawInitialScene();
    </script>
</body>
</html>
