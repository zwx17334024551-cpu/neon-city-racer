<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 赛博飞车 - 究极切片防穿模典藏版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #05000a; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; touch-action: none; 
        }

        h1 { 
            color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00aaff; 
            margin: 0 0 5px 0; font-size: 32px; letter-spacing: 3px; 
        }
        p { 
            margin: 0 0 15px 0; color: #ff00ff; text-shadow: 0 0 5px #ff00ff; 
            font-size: 15px; font-weight: bold; 
        }
        
        #canvas-wrapper { 
            position: relative; width: 900px; max-width: 98vw; aspect-ratio: 16/9; 
            border: 4px solid #00ffff; border-radius: 8px;
            box-shadow: 0 0 40px #00ffff, 0 0 20px #00aaff inset;
            overflow: hidden; background-color: #000;
        }
        
        canvas { 
            width: 100%; height: 100%; display: block; image-rendering: pixelated; 
        }

        #scanlines {
            position: absolute; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 5;
        }

        #vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.85) 120%);
            pointer-events: none; z-index: 6;
        }
        
        #uiLayer { 
            position: absolute; top: 20px; left: 25px; right: 25px; 
            display: flex; justify-content: space-between; pointer-events: none; 
            display: none; z-index: 10; 
        }
        .hud-text { 
            font-size: 26px; font-weight: bold; color: #00ffff; 
            text-shadow: 0 0 10px #00ffff; letter-spacing: 2px; 
        }
        
        .overlay {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
            text-align: center; background: rgba(5, 5, 15, 0.95); padding: 30px 50px;
            border: 4px dashed #00ffff; box-shadow: 0 0 30px #00ffff;
            display: none; width: 85%; max-width: 450px; z-index: 20; border-radius: 12px;
        }
        
        #start-screen { display: block; }
        
        .diff-container { display: flex; gap: 15px; justify-content: center; margin: 25px 0; }
        .diff-btn { 
            background: #111; color: #aaa; border: 2px solid #555; border-radius: 6px; 
            padding: 12px 20px; font-size: 18px; cursor: pointer; font-weight: bold; 
            font-family: inherit; transition: all 0.2s; 
        }
        .diff-btn.active { 
            background: #00ffff; color: #000; border-color: #00ffff; 
            box-shadow: 0 0 20px #00ffff; transform: scale(1.1); 
        }

        #real-restart-btn {
            background-color: #ff0055; color: #fff; border: 4px solid #fff; border-radius: 8px;
            padding: 18px 40px; font-size: 26px; font-weight: bold; font-family: inherit; 
            cursor: pointer; box-shadow: 0 0 25px #ff0055; margin-top: 15px; 
            animation: pulse 1.5s infinite; transition: all 0.2s;
        }
        #real-restart-btn:hover { background-color: #fff; color: #ff0055; }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.05); box-shadow: 0 0 35px #ff0055; } 
            100% { transform: scale(1); } 
        }

        #controls { 
            display: flex; justify-content: space-between; gap: 20px; 
            margin-top: 25px; width: 800px; max-width: 96vw; 
        }
        .ctrl-btn { 
            flex: 1; background: rgba(0, 20, 40, 0.8); color: #00ffff; 
            border: 4px solid #00ffff; border-radius: 12px; padding: 25px 0; 
            font-size: 28px; font-weight: bold; font-family: inherit; 
            box-shadow: 0 0 20px #00ffff inset; user-select: none; 
            cursor: pointer; text-align: center; transition: all 0.1s; 
        }
        .ctrl-btn:active { 
            background: #00ffff; color: #000; box-shadow: 0 0 40px #00ffff; 
            transform: scale(0.95); 
        }
        .cam-btn { 
            flex: 0.5; background: rgba(40, 40, 40, 0.8); color: #ccc; 
            border-color: #888; box-shadow: none; font-size: 20px; 
        }
        .cam-btn.active { color: #00ffff; border-color: #00ffff; box-shadow: 0 0 20px #00ffff inset; }
        .eval-title { font-size: 36px; font-weight: bold; margin: 20px 0; text-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body>

    <h1>✦ NEON MULTIVERSE ✦</h1>
    <p>究极 Z 轴切片无破面版 | 火箭实体升空 | 奢华发光内饰 | 完整全生态</p>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="scanlines"></div>
        <div id="vignette"></div>
        
        <div id="uiLayer">
            <div>
                <div class="hud-text" id="scoreVal">[ SCORE: 0 ]</div>
                <div class="hud-text" id="bestVal" style="font-size:16px; color:#aaa; text-shadow:none; margin-top: 5px;">BEST: 0</div>
                <div class="hud-text" id="statusVal" style="color:#ff00ff; margin-top: 10px;"></div>
            </div>
        </div>
        
        <div id="start-screen" class="overlay">
            <h2 style="color: #00ffff; text-shadow: 0 0 15px #00ffff; margin: 0 0 20px 0; font-size: 36px;">SYSTEM READY</h2>
            <div class="diff-container">
                <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
            </div>
            <button class="ctrl-btn" style="width: 100%; font-size: 24px; box-shadow: 0 0 20px #00ffff;" onclick="initGame()">🔥 启动引擎 🔥</button>
        </div>

        <div id="game-over-screen" class="overlay">
            <h2 style="color: #ff0055; margin: 0; font-size: 40px; text-shadow: 0 0 15px #ff0055;">CRASHED!</h2>
            <div id="evalText" class="eval-title"></div>
            <p style="color: #fff; font-size: 22px; margin: 10px 0;">最终得分: <span id="finalScore" style="color: #00ffff; font-weight:bold;">0</span></p>
            <p style="color: #aaa; font-size: 16px; margin: 0 0 20px 0;">历史最高: <span id="recordScore" style="color: #ffd700;">0</span></p>
            <div class="diff-container" style="margin-top: 15px;">
                <button class="diff-btn" data-diff="noob" onclick="setDiff('noob')">菜鸟</button>
                <button class="diff-btn active" data-diff="racing" onclick="setDiff('racing')">飙车</button>
                <button class="diff-btn" data-diff="madhouse" onclick="setDiff('madhouse')">疯人院</button>
            </div>
            <button id="real-restart-btn" onclick="initGame()">🔥 再飙一次 🔥</button>
        </div>
    </div>

    <!-- 底部控制器 -->
    <div id="controls">
        <div id="btnLeft" class="ctrl-btn">◀ LEFT</div>
        <div id="btnCam" class="ctrl-btn cam-btn">视角</div>
        <div id="btnRight" class="ctrl-btn">RIGHT ▶</div>
    </div>

    <script>
        // ==========================================
        // 1. 基础画布与核心渲染常量
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;
        
        const HORIZON = 220;
        const FOCAL = 250;
        const ROAD_WIDTH = 250;
        const SEG_LENGTH = 50;
        const DRAW_DIST = 2500;
        const LANES = [-140, -45, 45, 140];

        // ==========================================
        // 2. 原生 Web Audio API 声音引擎
        // ==========================================
        let audioCtx = null;
        let engineOscillator = null;
        let engineGain = null;
        let bgmOscillator = null;
        let bgmGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playNoise(duration, vol = 0.5) {
            if (!audioCtx) return;
            let bufferSize = audioCtx.sampleRate * duration;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            let noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);
            let gain = audioCtx.createGain();
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
        }

        function startEngineAndBGM() {
            if (!audioCtx) return;
            if (!engineOscillator) {
                engineOscillator = audioCtx.createOscillator();
                engineOscillator.type = 'sawtooth';
                engineGain = audioCtx.createGain();
                engineGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                engineOscillator.connect(filter);
                filter.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineOscillator.start();
            }
            if (!bgmOscillator) {
                bgmOscillator = audioCtx.createOscillator();
                bgmOscillator.type = 'square';
                bgmOscillator.frequency.value = 55; 
                bgmGain = audioCtx.createGain();
                bgmGain.gain.value = 0.02;
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 150;
                bgmOscillator.connect(filter);
                filter.connect(bgmGain);
                bgmGain.connect(audioCtx.destination);
                bgmOscillator.start();
            }
        }

        function updateEngineSound(speed, isSpace) {
            if (!engineOscillator) return;
            let baseFreq = isSpace ? 35 : 55;
            engineOscillator.frequency.setTargetAtTime(baseFreq + (speed * 6), audioCtx.currentTime, 0.1);
        }

        function stopEngineAndBGM() {
            if (engineOscillator) { 
                engineOscillator.stop(); 
                engineOscillator.disconnect(); 
                engineOscillator = null; 
            }
            if (bgmOscillator) { 
                bgmOscillator.stop(); 
                bgmOscillator.disconnect(); 
                bgmOscillator = null; 
            }
        }

        function soundItemPickup() {
            playTone(800, 'square', 0.1, 0.1);
            setTimeout(() => playTone(1200, 'square', 0.2, 0.1), 100);
        }

        function soundBoost() {
            playTone(200, 'sawtooth', 0.5, 0.1);
            playNoise(0.5, 0.2);
        }

        function soundCrash() {
            playNoise(1.2, 0.8);
            playTone(50, 'sawtooth', 1.0, 0.5);
        }

        function soundShieldHit() {
            playTone(400, 'triangle', 0.3, 0.2);
            playNoise(0.3, 0.3);
        }

        function playUiClick() {
            playTone(1500, 'square', 0.05, 0.1);
        }

        function playWarning() {
            playTone(1000, 'square', 0.1, 0.1);
            setTimeout(() => playTone(1000, 'square', 0.1, 0.1), 150);
            setTimeout(() => playTone(1000, 'square', 0.1, 0.1), 300);
        }

        // ==========================================
        // 3. 游戏核心状态变量
        // ==========================================
        let animationId;
        let gameState = 'START';  
        let camZ = 0;
        let gameSpeed = 6;
        let score = 0;
        let bonusScore = 0;
        let frameCount = 0;
        
        let carX = 0;
        let carVX = 0;
        let playerY = 0;
        let playerZOffset = 100;   
        
        let obstacles = [];
        let props = [];
        let bgItems =[];
        let stars = [];
        let shootingStars =[];
        let lastPropZ = 0;

        let giantMeteor = { active: false, x: 0, y: 0, s: 1 };

        let difficulty = 'racing';
        let baseSpawnRate = 100; 
        let speedCap = 13; 
        
        let isFlying = false, flyTimer = 0;
        let isSpace = false, spaceTimer = 0;
        let isShielded = false, shieldTimer = 0;
        let speedTimer = 0; 
        let actualSpeedMult = 1.0; 

        let isFirstPerson = false;
        let renderCamX = 0;
        let renderCamY = -60;
        let renderCamZ = 0;

        const keys = { a: false, d: false };

        let bestScore = localStorage.getItem('neon_best_score_v3') || 0;
        document.getElementById('bestVal').innerText = "BEST: " + bestScore;

        // ==========================================
        // 4. 五大生态多重宇宙场景配置 (绝对完整版)
        // ==========================================
        const SCENES = {
            city: { 
                skyTop:['#0033aa', '#1a0033', '#000000'], 
                skyBot:['#87cefa', '#ff0055', '#0a0011'], 
                roadD:['#444444', '#222222', '#0a0011'], 
                roadL:['#555555', '#333333', '#11001a'], 
                line:['#ffffff', '#ffaaaa', '#00ffff'], 
                prop: 'light', 
                build: 'city', 
                bHueMin: 260, 
                bHueMax: 340 
            },
            desert: { 
                skyTop:['#ff7700', '#aa4400', '#050200'], 
                skyBot:['#ffd700', '#ff4500', '#1a0500'], 
                roadD:['#c2b280', '#5c4033', '#0a0500'], 
                roadL:['#d2b48c', '#8b4513', '#110a00'], 
                line:['#ffffff', '#ffaa00', '#ff00ff'], 
                prop: 'cactus', 
                build: 'desert', 
                bHueMin: 20, 
                bHueMax: 40 
            },
            ruins: { 
                skyTop:['#556b2f', '#2f4f4f', '#051005'], 
                skyBot:['#8fbc8f', '#556b2f', '#0a1a0a'], 
                roadD:['#333333', '#1a1a25', '#050a05'], 
                roadL:['#444444', '#2b2b36', '#0a100a'], 
                line:['#aaaaaa', '#555566', '#00ff00'], 
                prop: 'pillar', 
                build: 'ruins', 
                bHueMin: 100, 
                bHueMax: 140 
            },
            factory: { 
                skyTop:['#483d8b', '#4b0082', '#0a0011'], 
                skyBot:['#9370db', '#800080', '#1a0022'], 
                roadD:['#2a2a2a', '#150a15', '#0a0510'], 
                roadL:['#3a3a3a', '#251525', '#110a15'], 
                line:['#ffff00', '#ff00ff', '#00ffff'], 
                prop: 'pipe', 
                build: 'factory', 
                bHueMin: 280, 
                bHueMax: 320 
            },
            coast: { 
                skyTop:['#00bfff', '#000080', '#00001a'], 
                skyBot:['#20b2aa', '#4b0082', '#001a33'], 
                roadD:['#2f4f4f', '#191970', '#000a11'], 
                roadL:['#40e0d0', '#00008b', '#001122'], 
                line:['#ffffff', '#00ffff', '#00ffff'], 
                prop: 'palm', 
                build: 'coast', 
                bHueMin: 180, 
                bHueMax: 220 
            }
        };
        let currentSceneKey = 'city';

        // ==========================================
        // 5. 交互控制与安全输入逻辑
        // ==========================================
        function setDiff(d) {
            playUiClick(); 
            difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-diff') === d);
            });
        }

        function getScoreTitle(s) {
            if (s < 1500) return { t: "马路杀手 💀", c: "#aaaaaa" };
            if (s < 3500) return { t: "见习车手 🚗", c: "#ffffff" };
            if (s < 7000) return { t: "秋名山神 🏎️", c: "#00ff00" };
            if (s < 12000) return { t: "云端征服者 ✈️", c: "#00ffff" };
            if (s < 20000) return { t: "曲率漫步者 🌌", c: "#ff00ff" };
            return { t: "星际传奇 🌟", c: "#ffd700" };
        }

        function startGameTrigger() {
            if (gameState === 'START') initGame();
        }

        function toggleCamera() {
            playUiClick(); 
            isFirstPerson = !isFirstPerson;
            document.getElementById('btnCam').classList.toggle('active', isFirstPerson);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = true;
            if (e.key === 'd' || e.key === 'D') keys.d = true;
            if (e.key === 'v' || e.key === 'V') toggleCamera();
            if (e.code === 'Space' && gameState === 'START') initGame();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'a' || e.key === 'A') keys.a = false;
            if (e.key === 'd' || e.key === 'D') keys.d = false;
        });

        const btnL = document.getElementById('btnLeft');
        const btnR = document.getElementById('btnRight');
        const btnC = document.getElementById('btnCam');

        const pressL = (e) => { e.preventDefault(); keys.a = true; startGameTrigger(); };
        const releaseL = (e) => { e.preventDefault(); keys.a = false; };
        
        const pressR = (e) => { e.preventDefault(); keys.d = true; startGameTrigger(); };
        const releaseR = (e) => { e.preventDefault(); keys.d = false; };

        btnL.addEventListener('mousedown', pressL); 
        btnL.addEventListener('touchstart', pressL, {passive: false});
        
        btnR.addEventListener('mousedown', pressR); 
        btnR.addEventListener('touchstart', pressR, {passive: false});

        window.addEventListener('mouseup', () => { keys.a = false; keys.d = false; }); 
        window.addEventListener('touchend', () => { keys.a = false; keys.d = false; });
        
        btnC.addEventListener('mousedown', (e) => { e.preventDefault(); toggleCamera(); });
        btnC.addEventListener('touchstart', (e) => { e.preventDefault(); toggleCamera(); }, {passive: false});

        // ==========================================
        // 6. 数学投影引擎与背景物生成
        // ==========================================
        function project(x, y, z) {
            let camX = isFirstPerson ? carX * 0.75 : 0;
            let camY = isFirstPerson ? playerY - 25 : playerY - 60;
            let zDiff = z - (isFirstPerson ? camZ + playerZOffset - 5 : camZ);
            
            if (zDiff <= 5) return null; 
            
            let scale = FOCAL / zDiff;
            let sx = W / 2 + (x - camX) * scale;
            let sy = HORIZON + (y - camY) * scale;
            
            return { sx, sy, scale };
        }

        function lerpColor(c1, c2, t) {
            const h2r = (hex) => { 
                if (hex.length === 4) {
                    return [
                        parseInt(hex[1]+hex[1], 16), 
                        parseInt(hex[2]+hex[2], 16), 
                        parseInt(hex[3]+hex[3], 16)
                    ];
                }
                return[
                    parseInt(hex.slice(1,3), 16), 
                    parseInt(hex.slice(3,5), 16), 
                    parseInt(hex.slice(5,7), 16)
                ]; 
            };
            let r1 = h2r(c1);
            let r2 = h2r(c2);
            
            let r = Math.round(r1[0] + (r2[0] - r1[0]) * t);
            let g = Math.round(r1[1] + (r2[1] - r1[1]) * t);
            let b = Math.round(r1[2] + (r2[2] - r1[2]) * t);
            
            return `rgb(${r},${g},${b})`;
        }

        function getEnvColors(timeCycle) {
            let s = SCENES[currentSceneKey];
            let cycle = Math.min(timeCycle, 2.0);
            let phase = Math.floor(cycle);
            let t = cycle - phase;
            
            if (cycle >= 2.0) { 
                phase = 2; 
                t = 0; 
            }
            
            let nextPhase = (phase + 1) % 3;
            let nightFactor = cycle >= 1.5 ? Math.min(1, (cycle - 1.5) * 2) : 0;
            
            return {
                skyTop: lerpColor(s.skyTop[phase], s.skyTop[nextPhase], t),
                skyBot: lerpColor(s.skyBot[phase], s.skyBot[nextPhase], t),
                roadD:  lerpColor(s.roadD[phase], s.roadD[nextPhase], t),
                roadL:  lerpColor(s.roadL[phase], s.roadL[nextPhase], t),
                line:   lerpColor(s.line[phase], s.line[nextPhase], t),
                nightFactor: nightFactor,
                sunY: cycle < 1 ? (HORIZON - 70 + cycle * 40) : (HORIZON - 30 + (cycle - 1) * 80)
            };
        }

        function initEnvironment() {
            let sceneKeys = Object.keys(SCENES);
            currentSceneKey = sceneKeys[Math.floor(Math.random() * sceneKeys.length)];
            let sConf = SCENES[currentSceneKey];

            stars =[]; 
            for (let i = 0; i < 150; i++) {
                stars.push({ 
                    rawX: Math.random() * W * 2, 
                    y: (Math.random() * HORIZON * 2) - HORIZON, 
                    s: Math.random() * 1.5 + 0.5 
                });
            }

            bgItems =[]; 
            let bx = -W * 2; 
            while (bx < W * 3) {
                let bw = 40 + Math.random() * 80;
                let bh = 50 + Math.random() * 160;
                let bDepth = 15 + Math.random() * 20;
                let hue = sConf.bHueMin + Math.random() * (sConf.bHueMax - sConf.bHueMin);
                let isAntenna = Math.random() > 0.6; 
                let hasBillboard = Math.random() > 0.8; 
                
                let windows =[];
                for (let wy = 15; wy < bh - 10; wy += 15) {
                    for (let wx = 8; wx < bw - 8; wx += 12) {
                        if (Math.random() > 0.4) {
                            windows.push({ 
                                x: wx, 
                                y: wy, 
                                color: Math.random() > 0.8 ? '#ffea00' : '#00ffff' 
                            });
                        }
                    }
                }
                bgItems.push({ 
                    x: bx, 
                    w: bw, 
                    h: bh, 
                    d: bDepth, 
                    hue: hue, 
                    type: sConf.build, 
                    seed: Math.random(), 
                    windows: windows,
                    isAntenna: isAntenna,
                    hasBillboard: hasBillboard
                });
                
                bx += bw + 10 + Math.random() * 30;
            }
        }

        function initGame() {
            initAudio();
            playUiClick();
            startEngineAndBGM();

            gameState = 'PLAYING';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('uiLayer').style.display = 'flex';
            
            if (difficulty === 'noob') { gameSpeed = 5; speedCap = 11; baseSpawnRate = 120; }
            else if (difficulty === 'racing') { gameSpeed = 7; speedCap = 14; baseSpawnRate = 80; }
            else if (difficulty === 'madhouse') { gameSpeed = 9; speedCap = 18; baseSpawnRate = 50; }

            camZ = 0; 
            score = 0; 
            bonusScore = 0; 
            frameCount = 0; 
            carX = 0; 
            carVX = 0; 
            playerY = 0; 
            
            isFlying = false; 
            isSpace = false; 
            isShielded = false; 
            
            flyTimer = 0; 
            spaceTimer = 0; 
            shieldTimer = 0; 
            speedTimer = 0; 
            lastPropZ = 0;
            actualSpeedMult = 1.0; 
            
            obstacles = []; 
            props = []; 
            shootingStars =[];
            giantMeteor.active = false;

            initEnvironment();
            
            if (animationId) cancelAnimationFrame(animationId);
            loop();
        }

        // ==========================================
        // 7. 极致还原的多重宇宙渲染 (含独立建筑与生态)
        // ==========================================
        function drawBackground(env, bAlpha, flyProgress) {
            if (isSpace) {
                ctx.fillStyle = '#000000'; 
                ctx.fillRect(0, 0, W, H);
            } else {
                let skyGrad = ctx.createLinearGradient(0, 0, 0, HORIZON);
                skyGrad.addColorStop(0, env.skyTop); 
                skyGrad.addColorStop(1, env.skyBot);
                ctx.fillStyle = skyGrad; 
                ctx.fillRect(0, 0, W, HORIZON);
            }

            let panX = -renderCamX * 0.4; 
            
            // 星空闪烁
            let starAlpha = isSpace ? 1 : env.nightFactor;
            if (starAlpha > 0) {
                stars.forEach(s => {
                    let sx = (s.rawX + panX * 0.1) % (W * 2) - W / 2;
                    let drawY = s.y - renderCamY * 0.5; 
                    if (isSpace || drawY < HORIZON) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${starAlpha * (0.5 + 0.5 * Math.sin(frameCount * 0.05 + s.rawX))})`;
                        ctx.fillRect(sx, drawY, s.s, s.s);
                    }
                });
            }

            // 宇宙流星雨与巨型陨石
            if (isSpace) {
                if (Math.random() < 0.05) {
                    shootingStars.push({
                        x: Math.random() * W * 2 - W / 2, 
                        y: -100, 
                        vx: Math.random() * 15 + 10, 
                        vy: Math.random() * 10 + 5, 
                        len: Math.random() * 50 + 50
                    });
                }
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; 
                ctx.lineWidth = 2;
                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    let st = shootingStars[i];
                    ctx.beginPath(); 
                    ctx.moveTo(st.x, st.y); 
                    ctx.lineTo(st.x - st.vx * (st.len / 10), st.y - st.vy * (st.len / 10)); 
                    ctx.stroke();
                    st.x += st.vx; st.y += st.vy; 
                    if (st.y > H + 100) shootingStars.splice(i, 1);
                }

                if (!giantMeteor.active && Math.random() < 0.002) {
                    giantMeteor = { active: true, x: -W, y: Math.random() * H / 2, s: Math.random() * 2 + 2 };
                }
                if (giantMeteor.active) {
                    ctx.fillStyle = '#2a0a0a'; 
                    ctx.beginPath(); 
                    ctx.arc(giantMeteor.x, giantMeteor.y, 80 * giantMeteor.s, 0, Math.PI * 2); 
                    ctx.fill();
                    
                    ctx.fillStyle = '#110000'; 
                    ctx.beginPath(); ctx.arc(giantMeteor.x - 20 * giantMeteor.s, giantMeteor.y - 20 * giantMeteor.s, 20 * giantMeteor.s, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(giantMeteor.x + 30 * giantMeteor.s, giantMeteor.y + 10 * giantMeteor.s, 12 * giantMeteor.s, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(giantMeteor.x - 10 * giantMeteor.s, giantMeteor.y + 40 * giantMeteor.s, 10 * giantMeteor.s, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.strokeStyle = 'rgba(255, 50, 0, 0.3)'; 
                    ctx.lineWidth = 2 * giantMeteor.s; 
                    ctx.beginPath(); 
                    ctx.moveTo(giantMeteor.x - 40 * giantMeteor.s, giantMeteor.y); 
                    ctx.lineTo(giantMeteor.x, giantMeteor.y + 20 * giantMeteor.s); 
                    ctx.lineTo(giantMeteor.x + 30 * giantMeteor.s, giantMeteor.y - 10 * giantMeteor.s); 
                    ctx.stroke();
                    
                    giantMeteor.x += 1.5; 
                    if (giantMeteor.x > W * 2) giantMeteor.active = false;
                }
            }

            // 地面日出日落渐变
            if (!isSpace && env.sunY - renderCamY * 0.1 < HORIZON + 30) {
                let sy = env.sunY - renderCamY * 0.1;
                let sunGrad = ctx.createLinearGradient(0, sy - 60, 0, sy + 60);
                sunGrad.addColorStop(0, 'rgba(0, 255, 255, 0)');
                sunGrad.addColorStop(0.5, '#00ffff'); 
                sunGrad.addColorStop(1, '#ff0055'); 
                
                ctx.fillStyle = sunGrad; 
                ctx.beginPath(); 
                ctx.arc(W / 2 + panX * 0.1, sy, 50, 0, Math.PI * 2); 
                ctx.fill();
                
                ctx.fillStyle = env.skyBot; 
                for (let i = 0; i < 8; i++) {
                    ctx.fillRect(W / 2 - 60 + panX * 0.1, sy + 15 - i * 10, 120, 3 + i * 0.6);
                }
            }

            // 飞行云层
            if (flyProgress > 0 && !isSpace) {
                ctx.globalAlpha = flyProgress;
                let cloudBase = env.nightFactor > 0.5 ? '#1a2b3c' : '#ffffff';
                let cloudShadow = env.nightFactor > 0.5 ? '#0c1520' : '#e0e8f0';

                ctx.fillStyle = cloudBase;
                ctx.fillRect(0, HORIZON, W, H - HORIZON); 
                
                for (let i = 0; i < 15; i++) {
                    ctx.fillStyle = (i % 2 === 0) ? cloudBase : cloudShadow;
                    ctx.beginPath();
                    let cx = (i * 70 + panX * 0.2) % (W + 140) - 70;
                    let cy = HORIZON + (i % 3) * 12;
                    let r = 50 + Math.sin(i * 99) * 30;
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }

            // 五大多重宇宙完整地貌绘制
            if (bAlpha > 0 && !isSpace) {
                ctx.globalAlpha = bAlpha;
                let bOffset = Math.max(0, -renderCamY - 60); 
                
                bgItems.forEach(b => {
                    let bx = b.x + panX;
                    let cx = bx + b.w / 2;
                    let isLeft = cx < W / 2; 
                    let bY = HORIZON + bOffset; 
                    let type = b.type;

                    if (type === 'city') {
                        let buildGrad = ctx.createLinearGradient(0, bY - b.h, 0, bY);
                        buildGrad.addColorStop(0, env.nightFactor > 0.3 ? `hsl(${b.hue}, 40%, 15%)` : `hsl(${b.hue}, 20%, 40%)`);
                        buildGrad.addColorStop(1, env.nightFactor > 0.3 ? `hsl(${b.hue}, 50%, 4%)` : `hsl(${b.hue}, 20%, 20%)`);

                        // 建筑侧面
                        ctx.fillStyle = env.nightFactor > 0.3 ? `hsl(${b.hue}, 50%, 4%)` : `hsl(${b.hue}, 20%, 20%)`;
                        ctx.beginPath();
                        if (isLeft) { ctx.moveTo(bx + b.w, bY); ctx.lineTo(bx + b.w, bY - b.h); ctx.lineTo(bx + b.w + b.d, bY - b.h + b.d * 0.3); ctx.lineTo(bx + b.w + b.d, bY); } 
                        else { ctx.moveTo(bx, bY); ctx.lineTo(bx, bY - b.h); ctx.lineTo(bx - b.d, bY - b.h + b.d * 0.3); ctx.lineTo(bx - b.d, bY); }
                        ctx.fill();

                        // 建筑正面
                        ctx.fillStyle = buildGrad;
                        ctx.fillRect(bx, bY - b.h, b.w, b.h);
                        
                        // 城市天线塔
                        if (b.isAntenna) {
                            ctx.fillStyle = env.nightFactor > 0.3 ? '#222' : '#555';
                            ctx.fillRect(bx + b.w/2 - 2, bY - b.h - 30, 4, 30);
                            if (env.nightFactor > 0.5) { 
                                ctx.fillStyle = '#ff0055'; 
                                ctx.fillRect(bx + b.w/2 - 3, bY - b.h - 32, 6, 6); 
                            }
                        }

                        // 夜晚霓虹与全息巨幕广告
                        if (env.nightFactor > 0.5) { 
                            ctx.strokeStyle = `hsl(${b.hue}, 100%, 50%)`; ctx.lineWidth = 1; ctx.strokeRect(bx, bY - b.h, b.w, b.h); 
                            if (b.hasBillboard) {
                                ctx.fillStyle = b.seed > 0.5 ? 'rgba(0, 255, 255, 0.4)' : 'rgba(255, 0, 255, 0.4)';
                                ctx.font = 'bold 22px Courier New'; ctx.textAlign = 'center';
                                ctx.fillText("NEON", bx + b.w/2, bY - b.h + 30);
                            }
                        }
                        
                        // 夜晚发光窗户
                        if (env.nightFactor > 0.1) {
                            ctx.globalAlpha = bAlpha * env.nightFactor; 
                            b.windows.forEach(w => {
                                ctx.fillStyle = w.color; ctx.shadowBlur = 5; ctx.shadowColor = w.color;
                                ctx.fillRect(bx + w.x, bY - b.h + w.y, 5, 4);
                            });
                            ctx.shadowBlur = 0; ctx.globalAlpha = bAlpha;
                        }
                    } 
                    else if (type === 'factory') {
                        // 重工业工厂
                        ctx.fillStyle = `hsl(${b.hue}, 20%, 30%)`;
                        ctx.fillRect(bx, bY - b.h, b.w, b.h);
                        // 红白相间的烟囱
                        ctx.fillStyle = '#cc0000'; ctx.fillRect(bx + b.w/4, bY - b.h - 40, b.w/2, 40);
                        ctx.fillStyle = '#ffffff'; ctx.fillRect(bx + b.w/4, bY - b.h - 30, b.w/2, 10); ctx.fillRect(bx + b.w/4, bY - b.h - 10, b.w/2, 10);
                        if (env.nightFactor > 0.5 && frameCount % 60 < 30) { 
                            ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff0000';
                            ctx.beginPath(); ctx.arc(bx + b.w/2, bY - b.h - 42, 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                        }
                    }
                    else if (type === 'ruins') {
                        // 废墟神庙
                        ctx.fillStyle = `hsl(${b.hue}, 10%, ${20 - env.nightFactor * 10}%)`; 
                        ctx.fillRect(bx, bY - b.h, b.w, b.h);
                        // 挖空形成残柱
                        ctx.clearRect(bx + b.w * 0.2, bY - b.h, b.w * 0.2, b.h * 0.8);
                        ctx.clearRect(bx + b.w * 0.6, bY - b.h, b.w * 0.2, b.h * 0.6);
                    }
                    else if (type === 'desert') {
                        // 立体沙漠金字塔群山 (受光面与背光面)
                        let litCol = `hsl(${b.hue}, 40%, ${30 - env.nightFactor * 15}%)`;
                        let shadowCol = `hsl(${b.hue}, 40%, ${15 - env.nightFactor * 10}%)`;
                        ctx.fillStyle = shadowCol; 
                        ctx.beginPath(); ctx.moveTo(bx, bY - b.h); ctx.lineTo(bx + b.w * 1.5, bY); ctx.lineTo(bx + b.w * 0.2, bY); ctx.fill();
                        ctx.fillStyle = litCol; 
                        ctx.beginPath(); ctx.moveTo(bx - b.w, bY); ctx.lineTo(bx, bY - b.h); ctx.lineTo(bx + b.w * 0.2, bY); ctx.fill();
                    }
                    else if (type === 'coast') {
                        // 海岸线远洋帆船与灯塔
                        ctx.fillStyle = `hsl(${b.hue}, 50%, ${20 - env.nightFactor * 10}%)`; 
                        if (b.seed > 0.5) { // 灯塔
                            ctx.fillRect(bx + b.w/2 - 10, bY - b.h, 20, b.h);
                            ctx.fillStyle = '#ffea00'; ctx.fillRect(bx + b.w/2 - 5, bY - b.h + 5, 10, 10);
                        } else { // 帆船
                            ctx.beginPath(); ctx.moveTo(bx, bY); ctx.lineTo(bx + 15, bY - b.h * 0.6); ctx.lineTo(bx + 40, bY - b.h * 0.6); ctx.fill(); 
                        }
                    }
                });
                
                ctx.fillStyle = '#000000'; 
                ctx.fillRect(0, HORIZON + bOffset - 2, W, 2);
                ctx.globalAlpha = 1.0;
            }
        }

        // ==========================================
        // 8. 赛道网络与发光纹理
        // ==========================================
        function drawRoad(env, bAlpha) {
            if (bAlpha <= 0 || isSpace) return; 
            
            ctx.globalAlpha = bAlpha;
            ctx.fillStyle = '#0a0a0a'; 
            ctx.fillRect(0, HORIZON, W, H);
            
            let startZ = Math.floor((renderCamZ + DRAW_DIST) / SEG_LENGTH) * SEG_LENGTH;
            for (let z = startZ; z > renderCamZ + 5; z -= SEG_LENGTH) {
                let p1_l = project(-ROAD_WIDTH, 0, z);
                let p1_r = project(ROAD_WIDTH, 0, z);
                let p2_l = project(-ROAD_WIDTH, 0, z - SEG_LENGTH);
                let p2_r = project(ROAD_WIDTH, 0, z - SEG_LENGTH);
                
                if (!p1_l || !p2_l) continue;
                
                let index = Math.floor(z / 100);
                ctx.fillStyle = (index % 2 === 0) ? env.roadD : env.roadL;
                ctx.beginPath(); 
                ctx.moveTo(p1_l.sx, p1_l.sy); ctx.lineTo(p1_r.sx, p1_r.sy);
                ctx.lineTo(p2_r.sx, p2_r.sy); ctx.lineTo(p2_l.sx, p2_l.sy); 
                ctx.fill();

                if (index % 4 === 0 && env.nightFactor > 0.4) {
                    let cv1 = project(-30, 0, z), cv2 = project(0, 0, z - SEG_LENGTH * 0.5), cv3 = project(30, 0, z);
                    if (cv1 && cv2 && cv3) {
                        ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)'; ctx.lineWidth = Math.max(1, cv1.scale * 3);
                        ctx.beginPath(); ctx.moveTo(cv1.sx, cv1.sy); ctx.lineTo(cv2.sx, cv2.sy); ctx.lineTo(cv3.sx, cv3.sy); ctx.stroke();
                    }
                }

                if (index % 2 === 0) {
                    ctx.strokeStyle = env.line; ctx.lineWidth = Math.max(1, p1_l.scale * 2);
                    if (env.nightFactor > 0.5) { ctx.shadowBlur = 8; ctx.shadowColor = env.line; }[-100, -33, 33, 100].forEach(lineX => {
                        let pc1 = project(lineX, 0, z), pc2 = project(lineX, 0, z - SEG_LENGTH);
                        if (pc1 && pc2) { ctx.beginPath(); ctx.moveTo(pc1.sx, pc1.sy); ctx.lineTo(pc2.sx, pc2.sy); ctx.stroke(); }
                    });
                    ctx.shadowBlur = 0;
                }
                
                ctx.strokeStyle = env.nightFactor > 0.5 ? '#ff00ff' : '#888888'; 
                ctx.lineWidth = Math.max(1, p1_l.scale * 4);
                ctx.beginPath(); ctx.moveTo(p1_l.sx, p1_l.sy); ctx.lineTo(p2_l.sx, p2_l.sy); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p1_r.sx, p1_r.sy); ctx.lineTo(p2_r.sx, p2_r.sy); ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
        }

        // ==========================================
        // 9. 完美的 3D 切片几何体渲染核心 (彻底修复穿模)
        // ==========================================
        function drawTrue3DBox(x, y, z, w, h, L, colorBody, colorSide, colorTop, tiltX, env, rotZ = 0) {
            let nearPlane = (isFirstPerson ? camZ + playerZOffset - 5 : camZ) + 1;
            let zFront = z + L, zBack = z;
            if (zFront < nearPlane) return null; 
            
            let clippedBack = Math.max(nearPlane, zBack);
            let bp = project(x + tiltX, y, clippedBack); 
            let fp = project(x + tiltX, y, zFront); 
            if (!bp || !fp) return null;

            let rotOffset = rotZ * bp.scale * 15;
            let bw = w * bp.scale, bh = h * bp.scale, fw = w * fp.scale, fh = h * fp.scale;
            
            // 顶面：只有当摄像机高于物体顶部时才绘制，杜绝透明透视穿模
            if (renderCamY < y - h) {
                ctx.fillStyle = colorTop;
                ctx.beginPath(); 
                ctx.moveTo(bp.sx - bw / 2 + rotOffset, bp.sy - bh); 
                ctx.lineTo(bp.sx + bw / 2 + rotOffset, bp.sy - bh);
                ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy - fh); 
                ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy - fh); 
                ctx.fill();
            }

            // 侧面：根据对象相对于摄像机的位置精准选择绘制左侧或右侧
            let camDx = x + tiltX - renderCamX;
            if (camDx < -w/2) {
                // 对象在视野偏左，绘制其右侧面
                ctx.fillStyle = colorSide;
                ctx.beginPath();
                ctx.moveTo(bp.sx + bw / 2 + rotOffset, bp.sy); 
                ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy);
                ctx.lineTo(fp.sx + fw / 2 + rotOffset, fp.sy - fh); 
                ctx.lineTo(bp.sx + bw / 2 + rotOffset, bp.sy - bh);
                ctx.fill();
            } else if (camDx > w/2) {
                // 对象在视野偏右，绘制其左侧面
                ctx.fillStyle = colorSide;
                ctx.beginPath();
                ctx.moveTo(bp.sx - bw / 2 + rotOffset, bp.sy); 
                ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy);
                ctx.lineTo(fp.sx - fw / 2 + rotOffset, fp.sy - fh); 
                ctx.lineTo(bp.sx - bw / 2 + rotOffset, bp.sy - bh);
                ctx.fill();
            }

            // 背面：距离摄像机最近的面，最后绘制以实现正确覆盖
            ctx.fillStyle = colorBody; 
            ctx.fillRect(bp.sx - bw / 2 + rotOffset, bp.sy - bh, bw, bh);
            
            return { bp, bw, bh, s: bp.scale, rot: rotOffset };
        }

        // === 严格按 Z轴切片 (Slicing) 的全立体无破绽载具绘制引擎 ===
        // 切分法则：从Z值大（远）到Z值小（近）的顺序调用 drawTrue3DBox，车轮和车体同步分片

        function draw3DCar(x, y, z, type, hue, sat, tiltX, isPlayer, env, rotZ = 0) {
            let t = tiltX * 3, bC = `hsl(${hue},${sat}%,45%)`, sC = `hsl(${hue},${sat}%,25%)`, tC = `hsl(${hue},${sat}%,60%)`;
            let wC = `hsl(190,80%,${30 + env.nightFactor*60}%)`, wS = `hsl(190,80%,${15 + env.nightFactor*40}%)`;

            // 切片 3：车头引擎盖与前轮 (Z=20~30)
            drawTrue3DBox(x - 13, y, z+20, 4, 8, 8, '#111', '#000', '#222', t, env, rotZ);
            drawTrue3DBox(x + 13, y, z+20, 4, 8, 8, '#111', '#000', '#222', t, env, rotZ);
            drawTrue3DBox(x, y-4, z+20, 26, 8, 10, bC, sC, tC, t, env, rotZ); 

            // 切片 2：乘员舱 (Z=8~20)
            drawTrue3DBox(x, y-12, z+8, 22, 8, 12, wC, wS, tC, t, env, rotZ); 
            drawTrue3DBox(x, y-4, z+8, 28, 8, 12, bC, sC, tC, t, env, rotZ); 

            // 切片 1：车尾后备箱与后轮 (Z=0~8)
            drawTrue3DBox(x - 13, y, z, 4, 8, 8, '#111', '#000', '#222', t, env, rotZ);
            drawTrue3DBox(x + 13, y, z, 4, 8, 8, '#111', '#000', '#222', t, env, rotZ);
            let rear = drawTrue3DBox(x, y-4, z, 28, 8, 8, bC, sC, tC, t, env, rotZ); 

            // 精调尾部发光灯与车牌贴花
            if (rear) {
                let sx = rear.bp.sx + rear.rot, sy = rear.bp.sy, w = rear.bw, h = rear.bh;
                let tailLight = isPlayer ? (50 + env.nightFactor * 40) : 30;
                ctx.fillStyle = `hsl(350, 100%, ${tailLight}%)`;
                if (env.nightFactor > 0.3 || isPlayer) { ctx.shadowBlur = 12 * rear.s; ctx.shadowColor = '#ff0055'; }
                ctx.fillRect(sx - w*0.4, sy - h*0.6, w*0.2, h*0.3); 
                ctx.fillRect(sx + w*0.2, sy - h*0.6, w*0.2, h*0.3); 
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000'; ctx.fillRect(sx - w*0.15, sy - h*0.4, w*0.3, h*0.2);
            }

            // 火箭加速喷射尾焰特效
            if (isPlayer && (isFlying || isSpace || speedTimer > 0)) { 
                let pJet = project(x, y - 5, z);
                if (pJet) {
                    ctx.fillStyle = '#ff5500'; ctx.beginPath(); ctx.arc(pJet.sx, pJet.sy, 12 * pJet.scale * Math.random() + 5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(pJet.sx, pJet.sy, 6 * pJet.scale * Math.random() + 2, 0, Math.PI * 2); ctx.fill();
                }
            }
            if (isPlayer && isShielded) {
                let pC = project(x, y - 10, z + 15);
                if (pC) {
                    ctx.beginPath(); ctx.ellipse(pC.sx, pC.sy, 35 * pC.scale, 25 * pC.scale, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.15)'; ctx.fill();
                    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2 * pC.scale; ctx.stroke(); 
                }
            }
        }

        function draw3DTruck(x, y, z, hue, tiltX, env, rotZ = 0) {
            let t = tiltX * 3, bC = `hsl(${hue}, 30%, 40%)`, sC = `hsl(${hue}, 30%, 20%)`, tC = `hsl(${hue}, 30%, 50%)`;
            let wC = '#050505', wS = '#000000', wT = '#111111';

            // 切片 5: 车头引擎盖 (Z=55..70)
            drawTrue3DBox(x - 15, y, z+55, 8, 14, 15, wC, wS, wT, t, env, rotZ); 
            drawTrue3DBox(x + 15, y, z+55, 8, 14, 15, wC, wS, wT, t, env, rotZ); 
            drawTrue3DBox(x, y-4, z+55, 30, 10, 15, bC, sC, tC, t, env, rotZ); 

            // 切片 4: 驾驶室 (Z=45..55)

        // ==========================================
        // 10. 火箭回归！全息发光道具与精致路边生态
        // ==========================================
        function drawItem(p, type, frameCount) {
            let s = p.scale; 
            // 完美的动态发光呼吸悬浮公式
            let bobY = p.sy - (25 + Math.sin(frameCount * 0.15) * 8) * s; 
            
            ctx.save();
            ctx.translate(p.sx, bobY);
            ctx.shadowBlur = 15 * s;
            
            if (type === 'item_speed') { // 闪电
                ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00';
                ctx.beginPath(); ctx.moveTo(0, -15*s); ctx.lineTo(-10*s, 5*s); ctx.lineTo(2*s, 5*s); ctx.lineTo(-5*s, 20*s); ctx.lineTo(12*s, -2*s); ctx.lineTo(0, -2*s); ctx.fill();
            } else if (type === 'item_shield') { // 六边形护盾
                ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff';
                ctx.beginPath(); ctx.moveTo(0, -15*s); ctx.lineTo(12*s, -5*s); ctx.lineTo(12*s, 8*s); ctx.lineTo(0, 18*s); ctx.lineTo(-12*s, 8*s); ctx.lineTo(-12*s, -5*s); ctx.fill();
            } else if (type === 'item_fly') { // 火箭实体全息模型！
                ctx.fillStyle = '#ff3300'; ctx.shadowColor = '#ff3300';
                ctx.beginPath(); ctx.moveTo(0, -25*s); ctx.lineTo(8*s, -5*s); ctx.lineTo(12*s, 10*s); ctx.lineTo(6*s, 8*s); ctx.lineTo(6*s, 15*s); ctx.lineTo(-6*s, 15*s); ctx.lineTo(-6*s, 8*s); ctx.lineTo(-12*s, 10*s); ctx.lineTo(-8*s, -5*s); ctx.fill();
                ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(0, -10*s, 4*s, 0, Math.PI*2); ctx.fill(); // 火箭发光舷窗
            } else if (type === 'item_wings') { // 翅膀
                ctx.fillStyle = '#ff00ff'; ctx.shadowColor = '#ff00ff';
                ctx.beginPath(); ctx.moveTo(0, -10*s); ctx.lineTo(15*s, -20*s); ctx.lineTo(20*s, 0); ctx.lineTo(0, 10*s); ctx.lineTo(-20*s, 0); ctx.lineTo(-15*s, -20*s); ctx.fill();
            }
            ctx.restore();
        }

        function drawRoadside(p, side, env, type, bAlpha) {
            if (bAlpha <= 0 || isSpace) return; 
            ctx.globalAlpha = bAlpha; let s = p.scale;
            if (type === 'light') { // 城市路灯
                ctx.fillStyle = env.nightFactor > 0.3 ? '#111' : '#333'; ctx.fillRect(p.sx - 2 * s, p.sy - 140 * s, 4 * s, 140 * s); ctx.fillRect(p.sx - 2 * s + (side === 1 ? -45 * s : 0), p.sy - 140 * s, 49 * s, 4 * s);
                let lightX = p.sx + (side === 1 ? -45 * s : 45 * s);
                ctx.fillStyle = env.nightFactor > 0.5 ? '#00ffff' : '#aaa';
                if (env.nightFactor > 0.5) { ctx.shadowBlur = 20 * s; ctx.shadowColor = '#0ff'; }
                ctx.fillRect(lightX - 6 * s, p.sy - 136 * s, 12 * s, 6 * s); ctx.shadowBlur = 0;
            } else if (type === 'cactus') { // 沙漠仙人掌
                ctx.fillStyle = '#282'; ctx.fillRect(p.sx - 5 * s, p.sy - 60 * s, 10 * s, 60 * s); ctx.fillRect(p.sx - 15 * s, p.sy - 40 * s, 10 * s, 30 * s); ctx.fillRect(p.sx + 5 * s, p.sy - 50 * s, 10 * s, 40 * s);
            } else if (type === 'pillar') { // 遗迹石柱
                ctx.fillStyle = '#444'; ctx.fillRect(p.sx - 8 * s, p.sy - 80 * s, 16 * s, 80 * s); ctx.fillStyle = '#222'; ctx.fillRect(p.sx - 10 * s, p.sy - 10 * s, 20 * s, 10 * s);
            } else if (type === 'pipe') { // 厂区管道
                ctx.fillStyle = '#555'; ctx.fillRect(p.sx - 6 * s, p.sy - 100 * s, 12 * s, 100 * s); ctx.fillStyle = '#f00'; ctx.fillRect(p.sx - 6 * s, p.sy - 100 * s, 12 * s, 5 * s);
            } else if (type === 'palm') { // 滨海棕榈
                ctx.fillStyle = '#531'; ctx.fillRect(p.sx - 3 * s, p.sy - 80 * s, 6 * s, 80 * s); ctx.fillStyle = '#2a2'; ctx.beginPath(); ctx.arc(p.sx, p.sy - 80 * s, 30 * s, 0, Math.PI); ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        // 画家算法严格按照世界坐标 Z 轴进行逆序绘制 (最远的先画，解决全局层次覆盖)
        function drawObjects(env, bAlpha) {
            let renderList =[];
            if (!isFirstPerson) {
                renderList.push({ type: 'player', x: carX, y: playerY, z: camZ + playerZOffset, tilt: carVX });
            }
            obstacles.forEach(ob => renderList.push(ob));
            props.forEach(pr => renderList.push(pr));
            
            // 核心级深度排序保证整体不乱
            renderList.sort((a, b) => b.z - a.z); 

            renderList.forEach(obj => {
                let isPlayer = (obj.type === 'player');
                let isGround = obj.y >= -20 && !isPlayer && !obj.type.startsWith('item'); 
                if (isGround && (bAlpha <= 0 || isSpace)) return; 

                let p = project(obj.x, obj.y, obj.z);
                if (p) {
                    ctx.globalAlpha = isGround ? bAlpha : 1.0;
                    if (['light','cactus','pillar','pipe','palm'].includes(obj.type)) {
                        drawRoadside(p, obj.side, env, obj.type, bAlpha);
                    }
                    else if (obj.type.startsWith('item')) {
                        drawItem(p, obj.type, frameCount);
                    }
                    else if (obj.type === 'truck') {
                        draw3DTruck(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'bus') {
                        draw3DBus(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'suv') {
                        draw3DSUV(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'police') {
                        draw3DPolice(obj.x, obj.y, obj.z, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'motor') {
                        draw3DMotor(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'airplane') {
                        draw3DAirplane(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'heli') {
                        draw3DHeli(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'missile') {
                        draw3DMissile(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'sat') {
                        draw3DSatellite(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'met') {
                        draw3DMeteorite(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else {
                        draw3DCar(obj.x, obj.y, obj.z, obj.type, obj.hue || 340, obj.sat || 100, isPlayer ? obj.tilt : 0, isPlayer, env, obj.rot || 0);
                    }
                    ctx.globalAlpha = 1.0;
                }
            });
        }

        // ===================================
        // 11. 第一人称超跑奢华精修内饰系统
        // ===================================
        function drawCockpit(env) {
            let hoodBase = 320; // 仪表盘完美贴合下沉，视线开阔
            let cx = W / 2;

            // 天空动态漫反射的后视镜贴图
            let mirrorGrad = ctx.createLinearGradient(0, hoodBase-55, 0, hoodBase-5);
            mirrorGrad.addColorStop(0, env.skyTop); 
            mirrorGrad.addColorStop(1, isSpace ? '#000' : env.skyBot);

            ctx.fillStyle = '#050505'; 
            ctx.beginPath(); ctx.moveTo(0, hoodBase - 60); ctx.lineTo(40, hoodBase - 50); ctx.lineTo(40, hoodBase); ctx.lineTo(0, hoodBase + 10); ctx.fill(); 
            ctx.fillStyle = mirrorGrad; 
            ctx.beginPath(); ctx.moveTo(0, hoodBase - 55); ctx.lineTo(35, hoodBase - 46); ctx.lineTo(35, hoodBase - 4); ctx.lineTo(0, hoodBase + 5); ctx.fill(); 
            
            ctx.fillStyle = '#050505'; 
            ctx.beginPath(); ctx.moveTo(W, hoodBase - 60); ctx.lineTo(W - 40, hoodBase - 50); ctx.lineTo(W - 40, hoodBase); ctx.lineTo(W, hoodBase + 10); ctx.fill(); 
            ctx.fillStyle = mirrorGrad; 
            ctx.beginPath(); ctx.moveTo(W, hoodBase - 55); ctx.lineTo(W - 35, hoodBase - 46); ctx.lineTo(W - 35, hoodBase - 4); ctx.lineTo(W, hoodBase + 5); ctx.fill(); 

            // 引擎盖与拉花纹理
            ctx.fillStyle = `hsl(340, 80%, ${15 + env.nightFactor * 5}%)`;
            ctx.beginPath(); ctx.moveTo(0, hoodBase); ctx.lineTo(W, hoodBase); ctx.lineTo(W * 0.8, hoodBase - 35); ctx.lineTo(W * 0.2, hoodBase - 35); ctx.fill();
            
            ctx.fillStyle = `hsl(340, 80%, ${10 + env.nightFactor * 5}%)`;
            ctx.beginPath(); ctx.moveTo(W * 0.3, hoodBase); ctx.lineTo(W * 0.38, hoodBase - 35); ctx.lineTo(W * 0.33, hoodBase - 35); ctx.lineTo(W * 0.25, hoodBase); ctx.fill();
            ctx.beginPath(); ctx.moveTo(W * 0.7, hoodBase); ctx.lineTo(W * 0.62, hoodBase - 35); ctx.lineTo(W * 0.67, hoodBase - 35); ctx.lineTo(W * 0.75, hoodBase); ctx.fill();
            
            ctx.fillStyle = '#00ffff'; 
            ctx.beginPath(); ctx.moveTo(W * 0.48, hoodBase); ctx.lineTo(W * 0.48, hoodBase - 35); ctx.lineTo(W * 0.49, hoodBase - 35); ctx.lineTo(W * 0.49, hoodBase); ctx.fill();
            ctx.beginPath(); ctx.moveTo(W * 0.51, hoodBase); ctx.lineTo(W * 0.51, hoodBase - 35); ctx.lineTo(W * 0.52, hoodBase - 35); ctx.lineTo(W * 0.52, hoodBase); ctx.fill();

            // 防穿透黑边A柱
            ctx.fillStyle = '#080808'; 
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(35, 0); ctx.lineTo(15, hoodBase); ctx.lineTo(0, hoodBase); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(W - 35, 0); ctx.lineTo(W - 15, hoodBase); ctx.lineTo(W, hoodBase); ctx.fill(); 
            ctx.fillRect(0, 0, W, 10); 

            // 碳纤维弧形中控台
            let grad = ctx.createLinearGradient(0, hoodBase, 0, H); 
            grad.addColorStop(0, '#111111'); 
            grad.addColorStop(1, '#050505');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.moveTo(0, hoodBase - 5); ctx.quadraticCurveTo(W / 2, hoodBase + 10, W, hoodBase - 5); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();
            
            // 随跑车物理状态变化的 LED 流光氛围缝隙灯
            let ledColor = isShielded ? '#00ffff' : (speedTimer > 0 ? '#ffff00' : '#ff0055');
            ctx.strokeStyle = ledColor; ctx.lineWidth = 2;
            ctx.shadowBlur = 10; ctx.shadowColor = ledColor; 
            ctx.beginPath(); ctx.moveTo(0, hoodBase - 3); ctx.quadraticCurveTo(W / 2, hoodBase + 12, W, hoodBase - 3); ctx.stroke(); ctx.shadowBlur = 0;

            let hudY = hoodBase + 25;
            
            // 出风口纹理
            ctx.fillStyle = '#050505'; ctx.fillRect(cx - 130, hudY, 50, 25);
            ctx.strokeStyle = '#222222'; ctx.lineWidth = 2;
            for (let i = hudY + 3; i <= hudY + 20; i += 5) { ctx.beginPath(); ctx.moveTo(cx - 125, i); ctx.lineTo(cx - 85, i); ctx.stroke(); }
            
            ctx.fillStyle = '#050505'; ctx.fillRect(cx + 80, hudY, 50, 25);
            for (let i = hudY + 3; i <= hudY + 20; i += 5) { ctx.beginPath(); ctx.moveTo(cx + 85, i); ctx.lineTo(cx + 125, i); ctx.stroke(); }

            // 中央发光仪表盘与 RPM 转子波形图
            ctx.fillStyle = '#050505'; ctx.fillRect(cx - 60, hudY, 120, 28);
            ctx.strokeStyle = '#222222'; ctx.strokeRect(cx - 60, hudY, 120, 28);
            
            let displaySpeed = gameSpeed + (speedTimer > 0 ? 12 : 0);
            let displayKmh = Math.floor(displaySpeed * (isSpace ? 0.6 : 1) * 15);
            
            ctx.fillStyle = '#00ffff'; ctx.font = 'bold 16px Courier New'; ctx.textAlign = 'center'; ctx.fillText(displayKmh, cx, hudY + 15);
            ctx.font = '10px Courier New'; ctx.fillText("KM/H", cx, hudY + 25);
            
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx - 45, hudY + 15, 10, Math.PI, Math.PI * 2); ctx.stroke();
            let rpmAngle = Math.PI + (Math.min(displayKmh, 300) / 300) * Math.PI;
            ctx.strokeStyle = '#ff0055'; ctx.beginPath(); ctx.moveTo(cx - 45, hudY + 15); ctx.lineTo(cx - 45 + Math.cos(rpmAngle) * 8, hudY + 15 + Math.sin(rpmAngle) * 8); ctx.stroke();

            // 防碰撞侦测雷达
            let rx = cx + 150, ry = hudY, rw = 70, rh = 50;
            ctx.fillStyle = '#001111'; ctx.fillRect(rx, ry, rw, rh);
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)'; ctx.lineWidth = 1;
            for (let i = 10; i < rw; i += 10) { ctx.beginPath(); ctx.moveTo(rx + i, ry); ctx.lineTo(rx + i, ry + rh); ctx.stroke(); }
            for (let i = 10; i < rh; i += 10) { ctx.beginPath(); ctx.moveTo(rx, ry + i); ctx.lineTo(rx + rw, ry + i); ctx.stroke(); }
            ctx.fillStyle = 'rgba(0, 255, 0, 0.1)'; ctx.fillRect(rx, ry, rw, (frameCount % 50)); 
            ctx.strokeStyle = '#005533'; ctx.strokeRect(rx, ry, rw, rh);
            ctx.fillStyle = '#00ff00'; ctx.fillRect(rx + rw / 2 - 2, ry + rh - 10, 4, 4); 

            obstacles.forEach(ob => { 
                if (ob.z > camZ && ob.z < camZ + 800) {
                    let mapX = rx + rw / 2 + (ob.x - carX) * 0.15, mapY = ry + rh - 10 - (ob.z - (camZ + playerZOffset)) * 0.05;
                    if (mapX > rx && mapX < rx + rw && mapY > ry && mapY < ry + rh) {
                        ctx.fillStyle = (ob.type.startsWith('item')) ? '#00ffff' : '#ff0000'; ctx.fillRect(mapX, mapY, 3, 3);
                    }
                }
            });

            // 更厚重真实的真皮缝线跑车方向盘
            ctx.save(); ctx.translate(cx, H + 60); ctx.rotate(carVX * 0.14); 
            ctx.strokeStyle = '#050505'; ctx.lineWidth = 26; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#181818'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#333333'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, 78, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
            ctx.strokeStyle = '#880000'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]); ctx.beginPath(); ctx.arc(0, 0, 85, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 20; ctx.beginPath(); ctx.arc(0, 0, 85, -Math.PI / 2 - 0.12, -Math.PI / 2 + 0.12); ctx.stroke();
            ctx.fillStyle = '#111111'; ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#080808'; ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2); ctx.fill(); 
            ctx.restore();
        }

        // ==========================================
        // 12. 游戏主逻辑与核心物理生成系统
        // ==========================================
        function update() {
            if (speedTimer > 0) speedTimer--; 
            actualSpeedMult += ((isSpace ? 0.3 : (isFlying ? 0.75 : 1.0)) - actualSpeedMult) * 0.05;
            let currentSpeed = (gameSpeed + (speedTimer > 0 ? 15 : 0)) * actualSpeedMult; 
            updateEngineSound(currentSpeed, isSpace);

            if (isSpace) bonusScore += 4; else if (isFlying) bonusScore += 1;
            camZ += currentSpeed; score = Math.floor(camZ / 50) + bonusScore; 
            document.getElementById('scoreVal').innerText = "[ SCORE: " + score + " ]";
            
            let status = "";
            if (isSpace) status += "🌌 SPACE WARP "; else if (isFlying) status += "🚀 FLIGHT ";
            if (isShielded) status += "💠 SHIELD "; if (speedTimer > 0) status += "⚡ BOOST ";
            document.getElementById('statusVal').innerText = status;

            if (gameSpeed < speedCap) gameSpeed += 0.001; 
            if (keys.a) carVX -= 0.85; if (keys.d) carVX += 0.85; carVX *= 0.82; carX += carVX;
            let maxCarX = ROAD_WIDTH - 20;
            if (carX < -maxCarX) { carX = -maxCarX; carVX = 0; } if (carX > maxCarX) { carX = maxCarX; carVX = 0; }

            if (spaceTimer > 0) { spaceTimer--; playerY += (-350 - playerY) * 0.05; if (spaceTimer <= 0) { isSpace = false; bonusScore += 1500; } } 
            else if (flyTimer > 0) { flyTimer--; playerY += (-160 - playerY) * 0.05; if (flyTimer <= 0) { isFlying = false; bonusScore += 800; } } 
            else playerY += (0 - playerY) * 0.05; 

            isFlying = playerY < -100; isSpace = playerY < -250;
            if (isShielded) { shieldTimer--; if (shieldTimer <= 0) isShielded = false; }

            if (isFirstPerson) { renderCamX = carX * 0.75; renderCamY = playerY - 25; renderCamZ = camZ + playerZOffset - 5; } 
            else { renderCamX = 0; renderCamY = playerY - 60; renderCamZ = camZ; }

            frameCount++;
            let spawnRate = Math.max(30, baseSpawnRate - Math.floor(score / 150));
            
            // 地面生态生成 (重点确保火箭道具出现率高达 15%)
            if (!isSpace && !isFlying && frameCount % spawnRate === 0) {
                let xPos = LANES[Math.floor(Math.random() * LANES.length)];
                let canSpawn = true;
                for (let ob of obstacles) { if (Math.abs(ob.x - xPos) < 20 && Math.abs(ob.z - (camZ + DRAW_DIST)) < 250) { canSpawn = false; break; } }

                if (canSpawn) {
                    let type = 'sedan', rnd = Math.random();
                    if (rnd < 0.15) type = 'truck'; else if (rnd < 0.25) type = 'bus'; else if (rnd < 0.40) type = 'suv';
                    else if (rnd < 0.55) type = 'police'; else if (rnd < 0.70) type = 'motor'; else if (rnd < 0.85) type = 'sports';
                    
                    let itemRoll = Math.random();
                    if (itemRoll < 0.05) type = 'item_speed';
                    else if (itemRoll < 0.10) type = 'item_shield';
                    else if (itemRoll < 0.15) type = 'item_fly'; // 飞天火箭核心逻辑

                    obstacles.push({ x: xPos, y: 0, z: camZ + DRAW_DIST, type: type, hue: Math.random() * 360, sat: type === 'truck' ? 30 : 80, speed: type === 'truck' ? 3.5 : 5.5, rot: 0, isTossed: false });
                }
            }
            // 飞行云海敌机与补给生成
            else if (isFlying && !isSpace && frameCount % 60 === 0) {
                let xPos = (Math.random() * 400) - 200; let rnd = Math.random(), type;
                if (rnd < 0.05) type = 'item_speed'; else if (rnd < 0.1) type = 'item_shield'; else if (rnd < 0.3) type = 'item_wings'; 
                else if (rnd < 0.5) { type = 'missile'; playWarning(); } else type = Math.random() > 0.5 ? 'airplane' : 'heli';
                obstacles.push({ x: xPos, y: playerY, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -15 : (type.startsWith('item') ? 0 : -10)), rot: 0, isTossed: false });
            }
            // 太空陨石雨与卫星生成
            else if (isSpace && frameCount % 70 === 0) {
                let xPos = (Math.random() * 400) - 200; let rnd = Math.random(), type;
                if (rnd < 0.05) type = 'item_speed'; else if (rnd < 0.1) type = 'item_shield';
                else if (rnd < 0.3) { type = 'missile'; playWarning(); } else type = Math.random() > 0.5 ? 'sat' : 'met';
                obstacles.push({ x: xPos, y: playerY, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -15 : (type.startsWith('item') ? 0 : -10)), rot: 0, isTossed: false });
            }

            if (camZ - lastPropZ > 300) {
                let pType = SCENES[currentSceneKey].prop;
                props.push({ type: pType, x: -ROAD_WIDTH - 30, y: 0, z: camZ + DRAW_DIST, side: -1 });
                props.push({ type: pType, x: ROAD_WIDTH + 30, y: 0, z: camZ + DRAW_DIST, side: 1 });
                lastPropZ = camZ;
            }

            let playerZ = camZ + playerZOffset;
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                if (ob.isTossed) {
                    ob.x += ob.vx; ob.y += ob.vy; ob.z += ob.vz; ob.vy += 0.8; ob.rot += 0.5; 
                } else {
                    ob.z += ob.speed; 
                    if (ob.type === 'sat' || ob.type === 'met') ob.rot += 0.05; 

                    let hitX = 22, hitZ = 22; 
                    if (ob.type === 'truck') { hitX = 35; hitZ = 55; }
                    if (ob.type === 'bus') { hitX = 35; hitZ = 75; }
                    if (ob.type === 'suv') { hitX = 28; hitZ = 35; }
                    if (ob.type === 'motor') { hitX = 12; hitZ = 20; }
                    if (['airplane', 'sat', 'met'].includes(ob.type)) { hitX = 40; hitZ = 40; }
                    if (ob.type.startsWith('item')) { hitX = 40; hitZ = 30; } 

                    let isGroundOb = ob.y >= -20 && !ob.type.startsWith('item');
                    if (isGroundOb && isFlying) continue; 

                    if (Math.abs(ob.z - playerZ) < hitZ && Math.abs(ob.x - carX) < hitX && Math.abs(ob.y - playerY) < 40) {
                        if (ob.type === 'item_fly') { isFlying = true; flyTimer = 1200; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup(); }
                        else if (ob.type === 'item_wings') { isSpace = true; spaceTimer = 2000; bonusScore += 1500; obstacles.splice(i, 1); soundBoost(); }
                        else if (ob.type === 'item_shield') { isShielded = true; shieldTimer = 1000; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup(); }
                        else if (ob.type === 'item_speed') { speedTimer = 400; bonusScore += 300; obstacles.splice(i, 1); soundBoost(); } 
                        else {
                            if (isShielded) { 
                                ob.isTossed = true; ob.vx = (ob.x - carX) * 0.2; 
                                if (Math.abs(ob.vx) < 2) ob.vx = Math.random() > 0.5 ? 5 : -5;
                                ob.vy = -15; ob.vz = 5; bonusScore += 300; soundShieldHit();
                            } else {
                                gameState = 'GAMEOVER'; stopEngineAndBGM(); soundCrash();
                                if (score > bestScore) { bestScore = score; localStorage.setItem('neon_best_score_v3', bestScore); }
                                document.getElementById('finalScore').innerText = score; document.getElementById('recordScore').innerText = bestScore;
                                let ev = getScoreTitle(score); let evEl = document.getElementById('evalText'); evEl.innerText = ev.t; evEl.style.color = ev.c;
                                document.getElementById('game-over-screen').style.display = 'block'; document.getElementById('uiLayer').style.display = 'none';
                            }
                        }
                    }
                }
                if (ob.z < renderCamZ - 100 || ob.y > 600) obstacles.splice(i, 1);
            }
            for (let i = props.length - 1; i >= 0; i--) if (props[i].z < renderCamZ) props.splice(i, 1);
        }

        // ==========================================
        // 13. 主渲染控制循环
        // ==========================================
        function loop() {
            if (gameState === 'PLAYING') {
                update();
                ctx.clearRect(0, 0, W, H);
                let timeCycle = (frameCount / 1000); 
                let env = getEnvColors(timeCycle);
                let flyProgress = Math.min(1, Math.max(0, -playerY / 120)); 
                let bAlpha = 1 - flyProgress; 
                
                drawBackground(env, bAlpha, flyProgress); 
                drawRoad(env, bAlpha); 
                drawObjects(env, bAlpha);
                if (isFirstPerson) drawCockpit(env); 
                
                animationId = requestAnimationFrame(loop);
            }
        }

        function drawInitialScene() {
            initEnvironment(); 
            let env = getEnvColors(0); 
            ctx.clearRect(0, 0, W, H);
            drawBackground(env, 1, 0); 
            drawRoad(env, 1); 
            draw3DCar(0, 0, 80, 'player', 340, 100, 0, true, env, 0);
            if (isFirstPerson) drawCockpit(env);
        }
        
        drawInitialScene();

    </script>
</body>
