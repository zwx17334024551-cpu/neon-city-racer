        // ==========================================
        // 12. 道具与路边环境 (增加醒目光晕)
        // ==========================================
        function drawItem(p, type) {
            let s = p.scale * 35; 
            let icon = '';
            let bgCol = '';
            
            if (type === 'item_shield') { icon = '💠'; bgCol = 'rgba(0, 255, 255, 0.4)'; }
            else if (type === 'item_fly') { icon = '🚀'; bgCol = 'rgba(255, 100, 0, 0.4)'; }
            else if (type === 'item_speed') { icon = '⚡'; bgCol = 'rgba(255, 255, 0, 0.4)'; }
            else if (type === 'item_wings') { icon = '🦋'; bgCol = 'rgba(255, 0, 255, 0.4)'; }
            
            ctx.shadowBlur = 20 * p.scale;
            ctx.shadowColor = bgCol;
            ctx.fillStyle = bgCol;
            ctx.fillRect(p.sx - s/1.5, p.sy - s/1.5, s*1.3, s*1.3);
            ctx.shadowBlur = 0;

            ctx.font = `${s}px Arial`; 
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            ctx.fillText(icon, p.sx, p.sy);
        }

        function drawRoadside(p, side, env, type, bAlpha) {
            if (bAlpha <= 0 || isSpace) return; 
            
            ctx.globalAlpha = bAlpha;
            let s = p.scale;
            
            if (type === 'light') {
                ctx.fillStyle = env.nightFactor > 0.3 ? '#111111' : '#333333'; 
                ctx.fillRect(p.sx - 2 * s, p.sy - 140 * s, 4 * s, 140 * s); 
                ctx.fillRect(p.sx - 2 * s + (side === 1 ? -45 * s : 0), p.sy - 140 * s, 49 * s, 4 * s);
                
                let lightX = p.sx + (side === 1 ? -45 * s : 45 * s);
                ctx.fillStyle = env.nightFactor > 0.5 ? '#00ffff' : '#aaaaaa';
                if (env.nightFactor > 0.5) { 
                    ctx.shadowBlur = 20 * s; 
                    ctx.shadowColor = '#00ffff'; 
                }
                ctx.fillRect(lightX - 6 * s, p.sy - 136 * s, 12 * s, 6 * s); 
                ctx.shadowBlur = 0;
            } else if (type === 'cactus') {
                ctx.fillStyle = '#228822'; 
                ctx.fillRect(p.sx - 5 * s, p.sy - 60 * s, 10 * s, 60 * s); 
                ctx.fillRect(p.sx - 15 * s, p.sy - 40 * s, 10 * s, 30 * s); 
                ctx.fillRect(p.sx + 5 * s, p.sy - 50 * s, 10 * s, 40 * s);
            } else if (type === 'pillar') {
                ctx.fillStyle = '#444444'; 
                ctx.fillRect(p.sx - 8 * s, p.sy - 80 * s, 16 * s, 80 * s); 
                ctx.fillStyle = '#222222'; 
                ctx.fillRect(p.sx - 10 * s, p.sy - 10 * s, 20 * s, 10 * s);
            } else if (type === 'pipe') {
                ctx.fillStyle = '#555555'; 
                ctx.fillRect(p.sx - 6 * s, p.sy - 100 * s, 12 * s, 100 * s); 
                ctx.fillStyle = '#ff0000'; 
                ctx.fillRect(p.sx - 6 * s, p.sy - 100 * s, 12 * s, 5 * s);
            } else if (type === 'palm') {
                ctx.fillStyle = '#553311'; 
                ctx.fillRect(p.sx - 3 * s, p.sy - 80 * s, 6 * s, 80 * s); 
                ctx.fillStyle = '#22aa22'; 
                ctx.beginPath(); 
                ctx.arc(p.sx, p.sy - 80 * s, 30 * s, 0, Math.PI); 
                ctx.fill();
            }
            
            ctx.globalAlpha = 1.0;
        }

        // ==========================================
        // 13. 深度排序混合渲染
        // ==========================================
        function drawObjects(env, bAlpha) {
            let renderList =[];
            
            if (!isFirstPerson) {
                renderList.push({ type: 'player', x: carX, y: playerY, z: camZ + playerZOffset, tilt: carVX });
            }
            
            obstacles.forEach(ob => renderList.push(ob));
            props.forEach(pr => renderList.push(pr));

            renderList.sort((a, b) => b.z - a.z);

            renderList.forEach(obj => {
                let isPlayer = (obj.type === 'player');
                
                // 绝对屏蔽物理碰撞跨层
                let isGroundObj = obj.y >= -20 && obj.type !== 'player';
                if (isGroundObj && (bAlpha <= 0 || isSpace)) return; 

                let p = project(obj.x, obj.y, obj.z);
                if (p) {
                    ctx.globalAlpha = isGroundObj ? bAlpha : 1.0;

                    if (['light','cactus','pillar','pipe','palm'].includes(obj.type)) {
                        drawRoadside(p, obj.side, env, obj.type, bAlpha);
                    }
                    else if (obj.type.startsWith('item')) {
                        drawItem(p, obj.type);
                    }
                    else if (obj.type === 'truck') {
                        draw3DTruck(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'bus') {
                        draw3DBus(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'suv') {
                        draw3DSUV(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'police') {
                        draw3DPolice(obj.x, obj.y, obj.z, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'motor') {
                        draw3DMotor(obj.x, obj.y, obj.z, obj.hue, isPlayer ? obj.tilt : 0, env, obj.rot || 0);
                    }
                    else if (obj.type === 'airplane') {
                        draw3DAirplane(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'heli') {
                        draw3DHeli(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'missile') {
                        draw3DMissile(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'sat') {
                        draw3DSatellite(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else if (obj.type === 'met') {
                        draw3DMeteorite(obj.x, obj.y, obj.z, env, obj.rot || 0);
                    }
                    else {
                        draw3DCar(obj.x, obj.y, obj.z, obj.type, obj.hue || 340, obj.sat || 100, isPlayer ? obj.tilt : 0, isPlayer, env, obj.rot || 0);
                    }
                    
                    ctx.globalAlpha = 1.0;
                }
            });
        }

        // ===================================
        // 14. 第一人称全细节奢华内饰 (16:9适配)
        // ===================================
        function drawCockpit(env) {
            let hoodBase = H - 120; // 动态计算引擎盖高度

            // A柱
            ctx.fillStyle = '#080808'; 
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(W*0.1, 0); ctx.lineTo(W*0.05, HORIZON+20); ctx.lineTo(0, HORIZON+20); ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(W - W*0.1, 0); ctx.lineTo(W - W*0.05, HORIZON+20); ctx.lineTo(W, HORIZON+20); ctx.fill(); 
            ctx.fillRect(0, 0, W, 20); 

            // 后视镜
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(0, HORIZON+10, 60, 70);
            ctx.fillStyle = isSpace ? '#000000' : env.skyBot; 
            ctx.fillRect(0, HORIZON+15, 55, 60);
            
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(W-60, HORIZON+10, 60, 70);
            ctx.fillStyle = isSpace ? '#000000' : env.skyBot; 
            ctx.fillRect(W-55, HORIZON+15, 55, 60);

            // 立体引擎盖
            ctx.fillStyle = `hsl(340, 80%, ${15 + env.nightFactor * 5}%)`;
            ctx.beginPath(); ctx.moveTo(0, hoodBase); ctx.lineTo(W, hoodBase); ctx.lineTo(W * 0.8, HORIZON); ctx.lineTo(W * 0.2, HORIZON); ctx.fill();
            
            ctx.fillStyle = `hsl(340, 80%, ${10 + env.nightFactor * 5}%)`;
            ctx.beginPath(); ctx.moveTo(W * 0.3, hoodBase); ctx.lineTo(W * 0.38, HORIZON); ctx.lineTo(W * 0.33, HORIZON); ctx.lineTo(W * 0.25, hoodBase); ctx.fill();
            ctx.beginPath(); ctx.moveTo(W * 0.7, hoodBase); ctx.lineTo(W * 0.62, HORIZON); ctx.lineTo(W * 0.67, HORIZON); ctx.lineTo(W * 0.75, hoodBase); ctx.fill();
            
            // 机盖拉花
            ctx.fillStyle = '#00ffff'; 
            ctx.beginPath(); ctx.moveTo(W * 0.48, hoodBase); ctx.lineTo(W * 0.48, HORIZON); ctx.lineTo(W * 0.49, HORIZON); ctx.lineTo(W * 0.49, hoodBase); ctx.fill();
            ctx.beginPath(); ctx.moveTo(W * 0.51, hoodBase); ctx.lineTo(W * 0.51, HORIZON); ctx.lineTo(W * 0.52, HORIZON); ctx.lineTo(W * 0.52, hoodBase); ctx.fill();

            if (env.nightFactor > 0.5) {
                ctx.strokeStyle = '#ff0055'; 
                ctx.lineWidth = 1.5; 
                ctx.shadowBlur = 10; 
                ctx.shadowColor = '#ff0055';
                ctx.beginPath(); 
                ctx.moveTo(W * 0.38, HORIZON); 
                ctx.lineTo(W * 0.62, HORIZON); 
                ctx.stroke(); 
                ctx.shadowBlur = 0;
            }

            // 碳纤维弧形中控台
            let grad = ctx.createLinearGradient(0, hoodBase, 0, H); 
            grad.addColorStop(0, '#111111'); 
            grad.addColorStop(1, '#050505');
            ctx.fillStyle = grad;
            ctx.beginPath(); 
            ctx.moveTo(0, hoodBase - 5); 
            ctx.quadraticCurveTo(W / 2, hoodBase-30, W, hoodBase - 5); 
            ctx.lineTo(W, H); 
            ctx.lineTo(0, H); 
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; 
            ctx.lineWidth = 1;
            for (let i = hoodBase-10; i < H; i += 4) { 
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); 
            }
            
            ctx.strokeStyle = '#00ffff'; 
            ctx.lineWidth = 2;
            if (env.nightFactor > 0.5) { 
                ctx.shadowBlur = 8; 
                ctx.shadowColor = '#00ffff'; 
            }
            ctx.beginPath(); 
            ctx.moveTo(0, hoodBase - 3); 
            ctx.quadraticCurveTo(W / 2, hoodBase-28, W, hoodBase - 3); 
            ctx.stroke(); 
            ctx.shadowBlur = 0;

            let cx = W / 2;
            
            // 出风口
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(cx - 150, hoodBase+5, 60, 30);
            ctx.strokeStyle = '#222222'; 
            ctx.lineWidth = 2;
            for (let i = hoodBase+10; i <= hoodBase+30; i += 6) { 
                ctx.beginPath(); ctx.moveTo(cx - 145, i); ctx.lineTo(cx - 95, i); ctx.stroke(); 
            }
            
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(cx + 90, hoodBase+5, 60, 30);
            for (let i = hoodBase+10; i <= hoodBase+30; i += 6) { 
                ctx.beginPath(); ctx.moveTo(cx + 95, i); ctx.lineTo(cx + 145, i); ctx.stroke(); 
            }

            // HUD 数字与 RPM 转速表
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(cx - 60, hoodBase-10, 120, 32);
            ctx.strokeStyle = '#222222'; 
            ctx.strokeRect(cx - 60, hoodBase-10, 120, 32);
            
            let displaySpeed = gameSpeed + (speedTimer > 0 ? 12 : 0);
            let displayKmh = Math.floor(displaySpeed * (isSpace ? 0.6 : 1) * 15);
            
            ctx.fillStyle = '#00ffff'; 
            ctx.font = 'bold 18px Courier New'; 
            ctx.textAlign = 'center';
            ctx.fillText(displayKmh, cx, hoodBase+8);
            ctx.font = '10px Courier New'; 
            ctx.fillText("KM/H", cx, hoodBase+18);
            
            // 实体 RPM 转速弧线
            ctx.strokeStyle = '#ff0055'; 
            ctx.lineWidth = 2;
            ctx.beginPath(); 
            ctx.arc(cx - 45, hoodBase+5, 12, Math.PI, Math.PI * 2); 
            ctx.stroke();
            
            let rpmAngle = Math.PI + (Math.min(displayKmh, 300) / 300) * Math.PI;
            ctx.strokeStyle = '#ffffff'; 
            ctx.beginPath(); 
            ctx.moveTo(cx - 45, hoodBase+5); 
            ctx.lineTo(cx - 45 + Math.cos(rpmAngle) * 10, hoodBase+5 + Math.sin(rpmAngle) * 10); 
            ctx.stroke();

            // 动态律动频谱
            ctx.fillStyle = '#00ff00';
            for (let i = 0; i < 5; i++) {
                let barH = Math.random() * 12 + 2;
                ctx.fillRect(cx + 35 + i * 4, hoodBase+18 - barH, 3, barH);
            }

            // 雷达系统
            let rx = cx + 170, ry = hoodBase+10, rw = 80, rh = 60;
            ctx.fillStyle = '#001111'; 
            ctx.fillRect(rx, ry, rw, rh);
            
            ctx.strokeStyle = 'rgba(0, 255, 0, 0.2)'; 
            ctx.lineWidth = 1;
            for (let i = 10; i < rw; i += 10) { 
                ctx.beginPath(); ctx.moveTo(rx + i, ry); ctx.lineTo(rx + i, ry + rh); ctx.stroke(); 
            }
            for (let i = 10; i < rh; i += 10) { 
                ctx.beginPath(); ctx.moveTo(rx, ry + i); ctx.lineTo(rx + rw, ry + i); ctx.stroke(); 
            }
            
            ctx.fillStyle = 'rgba(0, 255, 0, 0.1)'; 
            ctx.fillRect(rx, ry, rw, (frameCount % 60)); 
            
            ctx.strokeStyle = '#005533'; 
            ctx.strokeRect(rx, ry, rw, rh);
            ctx.strokeStyle = '#003322'; 
            ctx.beginPath(); 
            ctx.moveTo(rx + rw / 2, ry); 
            ctx.lineTo(rx + rw / 2, ry + rh); 
            ctx.stroke(); 
            
            ctx.fillStyle = '#00ff00'; 
            ctx.fillRect(rx + rw / 2 - 2, ry + rh - 10, 4, 4); 
            
            ctx.fillStyle = 'rgba(0, 255, 0, 0.5)'; 
            ctx.font = 'bold 20px "Microsoft YaHei", sans-serif'; 
            ctx.textAlign = 'right'; 
            ctx.textBaseline = 'alphabetic';
            ctx.fillText('翔', rx + rw - 5, ry + 22);

            obstacles.forEach(ob => { 
                if (ob.z > camZ && ob.z < camZ + 800) {
                    let mapX = rx + rw / 2 + (ob.x - carX) * 0.15;
                    let mapY = ry + rh - 10 - (ob.z - (camZ + playerZOffset)) * 0.05;
                    if (mapX > rx && mapX < rx + rw && mapY > ry && mapY < ry + rh) {
                        ctx.fillStyle = (ob.type.startsWith('item')) ? '#00ffff' : '#ff0000';
                        ctx.fillRect(mapX, mapY, 3, 3);
                    }
                }
            });

            // 方向盘移到底部中央
            ctx.save(); 
            ctx.translate(cx, H + 40); 
            ctx.rotate(carVX * 0.14); 
            
            ctx.strokeStyle = '#050505'; 
            ctx.lineWidth = 30; 
            ctx.beginPath(); ctx.arc(0, 0, 100, 0, Math.PI * 2); ctx.stroke();
            
            ctx.strokeStyle = '#181818'; 
            ctx.lineWidth = 24; 
            ctx.beginPath(); ctx.arc(0, 0, 100, 0, Math.PI * 2); ctx.stroke();
            
            ctx.strokeStyle = '#333333'; 
            ctx.lineWidth = 5; 
            ctx.beginPath(); ctx.arc(0, 0, 92, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();
            
            ctx.strokeStyle = '#880000'; 
            ctx.lineWidth = 1.5; 
            ctx.setLineDash([5, 7]);
            ctx.beginPath(); ctx.arc(0, 0, 100, 0, Math.PI * 2); ctx.stroke(); 
            ctx.setLineDash([]);
            
            ctx.strokeStyle = '#00ffff'; 
            ctx.lineWidth = 24; 
            ctx.beginPath(); ctx.arc(0, 0, 100, -Math.PI / 2 - 0.12, -Math.PI / 2 + 0.12); ctx.stroke();

            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); 
            ctx.moveTo(-40, -5); ctx.lineTo(-95, -20); ctx.lineTo(-95, 20); ctx.lineTo(-40, 10); ctx.fill(); 
            ctx.beginPath(); 
            ctx.moveTo(40, -5); ctx.lineTo(95, -20); ctx.lineTo(95, 20); ctx.lineTo(40, 10); ctx.fill(); 
            ctx.beginPath(); 
            ctx.moveTo(-15, 30); ctx.lineTo(-25, 95); ctx.lineTo(25, 95); ctx.lineTo(15, 30); ctx.fill(); 
            
            ctx.fillStyle = '#2a2a2a'; 
            ctx.beginPath(); 
            ctx.moveTo(-40, -3); ctx.lineTo(-93, -15); ctx.lineTo(-93, 0); ctx.lineTo(-40, 2); ctx.fill(); 
            ctx.beginPath(); 
            ctx.moveTo(40, -3); ctx.lineTo(93, -15); ctx.lineTo(93, 0); ctx.lineTo(40, 2); ctx.fill(); 

            ctx.fillStyle = '#555555'; 
            ctx.beginPath(); ctx.arc(-65, -5, 3, 0, Math.PI * 2); ctx.fill(); 
            ctx.beginPath(); ctx.arc(65, -5, 3, 0, Math.PI * 2); ctx.fill(); 
            ctx.beginPath(); ctx.arc(0, 65, 3, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#111111'; 
            ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = '#080808'; 
            ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2); ctx.fill(); 
            
            ctx.fillStyle = '#ff0055'; 
            ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();

            ctx.restore();
        }

        // ==========================================
        // 15. 主物理更新系统 (平滑、防重叠)
        // ==========================================
        function update() {
            if (speedTimer > 0) speedTimer--; 
            
            // 平滑速度控制
            let targetSpeedMult = isSpace ? 0.3 : (isFlying ? 0.75 : 1.0);
            actualSpeedMult += (targetSpeedMult - actualSpeedMult) * 0.05;
            
            let currentSpeed = (gameSpeed + (speedTimer > 0 ? 15 : 0)) * actualSpeedMult; 
            
            updateEngineSound(currentSpeed, isSpace);

            if (isSpace) bonusScore += 4;
            else if (isFlying) bonusScore += 1;

            camZ += currentSpeed;
            score = Math.floor(camZ / 50) + bonusScore; 
            document.getElementById('scoreVal').innerText = "[ SCORE: " + score + " ]";
            
            let status = "";
            if (isSpace) status += "🌌 SPACE WARP ";
            else if (isFlying) status += "🚀 FLIGHT ";
            if (isShielded) status += "💠 SHIELD ";
            if (speedTimer > 0) status += "⚡ BOOST ";
            document.getElementById('statusVal').innerText = status;

            if (gameSpeed < speedCap) gameSpeed += 0.001; 

            if (keys.a) carVX -= 0.85;
            if (keys.d) carVX += 0.85;
            carVX *= 0.82; 
            carX += carVX;
            
            let maxCarX = ROAD_WIDTH - 20;
            if (carX < -maxCarX) { carX = -maxCarX; carVX = 0; }
            if (carX > maxCarX) { carX = maxCarX; carVX = 0; }

            if (spaceTimer > 0) {
                spaceTimer--;
                playerY += (-350 - playerY) * 0.05; 
                if (spaceTimer <= 0) { isSpace = false; bonusScore += 1500; }
            } else if (flyTimer > 0) {
                flyTimer--;
                playerY += (-160 - playerY) * 0.05; 
                if (flyTimer <= 0) { isFlying = false; bonusScore += 800; }
            } else {
                playerY += (0 - playerY) * 0.05; 
            }

            isFlying = playerY < -100; 
            isSpace = playerY < -250;
            
            if (isShielded) { 
                shieldTimer--; 
                if (shieldTimer <= 0) isShielded = false; 
            }

            if (isFirstPerson) {
                renderCamX = carX * 0.75; 
                renderCamY = playerY - 25; 
                renderCamZ = camZ + playerZOffset - 5; 
            } else {
                renderCamX = 0; 
                renderCamY = playerY - 60; 
                renderCamZ = camZ;
            }

            frameCount++;
            let spawnRate = Math.max(30, baseSpawnRate - Math.floor(score / 150));
            
            // ============================
            // 极其严密的空域生态与绝对防穿模生成
            // ============================
            if (!isSpace && !isFlying && frameCount % spawnRate === 0) {
                // 车道生成逻辑：固定 4 车道，绝不乱刷
                let xPos = LANES[Math.floor(Math.random() * LANES.length)];
                
                // 【防穿模机制】检测同一车道前方是否已经有车
                let canSpawn = true;
                for (let ob of obstacles) {
                    if (Math.abs(ob.x - xPos) < 20 && Math.abs(ob.z - (camZ + DRAW_DIST)) < 250) {
                        canSpawn = false; break;
                    }
                }

                if (canSpawn) {
                    let type = 'sedan', rnd = Math.random();
                    
                    if (rnd < 0.15) type = 'truck';
                    else if (rnd < 0.25) type = 'bus';
                    else if (rnd < 0.40) type = 'suv';
                    else if (rnd < 0.55) type = 'police';
                    else if (rnd < 0.70) type = 'motor';
                    else if (rnd < 0.85) type = 'sports';
                    
                    let itemRoll = Math.random();
                    // 地面提升了火箭概率，取消了地面的翅膀
                    if (itemRoll < 0.04) type = 'item_speed';
                    else if (itemRoll < 0.08) type = 'item_shield';
                    else if (itemRoll < 0.15) type = 'item_fly';

                    obstacles.push({ 
                        x: xPos, y: -15, z: camZ + DRAW_DIST, type: type, 
                        hue: Math.random() * 360, sat: type === 'truck' ? 30 : 80, 
                        speed: type === 'truck' ? 3.5 : 5.5, rot: 0, isTossed: false 
                    });
                }
            }
            else if (isFlying && !isSpace && frameCount % 60 === 0) {
                let xPos = (Math.random() * 400) - 200;
                let rnd = Math.random(), type;
                
                // 云端：增加翅膀概率，绝对不刷火箭
                if (rnd < 0.05) type = 'item_speed';
                else if (rnd < 0.1) type = 'item_shield';
                else if (rnd < 0.3) type = 'item_wings'; 
                else if (rnd < 0.5) { type = 'missile'; playWarning(); } 
                else type = Math.random() > 0.5 ? 'airplane' : 'heli';

                obstacles.push({ x: xPos, y: playerY - 15, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -15 : (type.startsWith('item') ? 0 : -10)), rot: 0, isTossed: false });
            }
            else if (isSpace && frameCount % 70 === 0) {
                let xPos = (Math.random() * 400) - 200;
                let rnd = Math.random(), type;
                
                if (rnd < 0.05) type = 'item_speed';
                else if (rnd < 0.1) type = 'item_shield';
                else if (rnd < 0.3) { type = 'missile'; playWarning(); } 
                else type = Math.random() > 0.5 ? 'sat' : 'met';

                obstacles.push({ x: xPos, y: playerY - 15, z: camZ + DRAW_DIST + 500, type: type, speed: (type === 'missile' ? -15 : (type.startsWith('item') ? 0 : -10)), rot: 0, isTossed: false });
            }

            if (camZ - lastPropZ > 300) {
                let pType = SCENES[currentSceneKey].prop;
                props.push({ type: pType, x: -ROAD_WIDTH - 30, y: 0, z: camZ + DRAW_DIST, side: -1 });
                props.push({ type: pType, x: ROAD_WIDTH + 30, y: 0, z: camZ + DRAW_DIST, side: 1 });
                lastPropZ = camZ;
            }

            let playerZ = camZ + playerZOffset;

            // 碰撞与位置
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let ob = obstacles[i];
                
                if (ob.isTossed) {
                    ob.x += ob.vx; ob.y += ob.vy; ob.z += ob.vz;
                    ob.vy += 0.8; ob.rot += 0.5; 
                } else {
                    ob.z += ob.speed; 
                    if (ob.type === 'sat' || ob.type === 'met') ob.rot += 0.05; 

                    let hitX = 25, hitZ = 25; 
                    if (ob.type === 'truck') { hitX = 35; hitZ = 60; }
                    if (ob.type === 'bus') { hitX = 35; hitZ = 80; }
                    if (ob.type === 'suv') { hitX = 28; hitZ = 35; }
                    if (ob.type === 'motor') { hitX = 10; hitZ = 20; }
                    if (['airplane', 'sat', 'met'].includes(ob.type)) { hitX = 40; hitZ = 40; }

                    let isGroundOb = ob.y >= -30 && !ob.type.startsWith('item');
                    if (isGroundOb && isFlying) continue; 

                    if (Math.abs(ob.z - playerZ) < hitZ && Math.abs(ob.x - carX) < hitX && Math.abs(ob.y - playerY) < 40) {
                        
                        if (ob.type === 'item_fly') { 
                            isFlying = true; flyTimer = 1200; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup();
                        }
                        else if (ob.type === 'item_wings') { 
                            isSpace = true; spaceTimer = 2000; bonusScore += 1500; obstacles.splice(i, 1); soundBoost();
                        }
                        else if (ob.type === 'item_shield') { 
                            isShielded = true; shieldTimer = 1000; bonusScore += 500; obstacles.splice(i, 1); soundItemPickup();
                        }
                        else if (ob.type === 'item_speed') { 
                            speedTimer = 400; bonusScore += 300; obstacles.splice(i, 1); soundBoost();
                        } 
                        else {
                            if (isShielded) { 
                                ob.isTossed = true;
                                ob.vx = (ob.x - carX) * 0.2; 
                                if (Math.abs(ob.vx) < 2) ob.vx = Math.random() > 0.5 ? 5 : -5;
                                ob.vy = -15; ob.vz = 5; bonusScore += 300;
                                soundShieldHit();
                            } else {
                                // ==== 真正的死亡结算与防误触拦截 ====
                                gameState = 'GAMEOVER';
                                stopEngineAndBGM();
                                soundCrash();
                                
                                if (score > bestScore) { 
                                    bestScore = score; 
                                    localStorage.setItem('neon_best_score_v4', bestScore); 
                                }
                                
                                document.getElementById('finalScore').innerText = score;
                                document.getElementById('recordScore').innerText = bestScore;
                                
                                let ev = getScoreTitle(score);
                                let evEl = document.getElementById('evalText'); 
                                evEl.innerText = ev.t; 
                                evEl.style.color = ev.c;
                                
                                document.getElementById('game-over-screen').style.display = 'block'; 
                                document.getElementById('uiLayer').style.display = 'none';
                            }
                        }
                    }
                }
                if (ob.z < renderCamZ - 100 || ob.y > 600) obstacles.splice(i, 1);
            }
            for (let i = props.length - 1; i >= 0; i--) if (props[i].z < renderCamZ) props.splice(i, 1);
        }

        // ==========================================
        // 16. 主渲染控制循环
        // ==========================================
        function loop() {
            if (gameState === 'PLAYING') {
                update();
                ctx.clearRect(0, 0, W, H);
                
                let timeCycle = (frameCount / 1000); 
                let env = getEnvColors(timeCycle);
                
                let flyProgress = Math.min(1, Math.max(0, -playerY / 120)); 
                let bAlpha = 1 - flyProgress; 
                
                drawBackground(env, bAlpha, flyProgress); 
                drawRoad(env, bAlpha); 
                drawObjects(env, bAlpha);
                
                if (isFirstPerson) drawCockpit(env); 
                
                animationId = requestAnimationFrame(loop);
            }
        }

        function drawInitialScene() {
            initEnvironment(); 
            let env = getEnvColors(0); 
            ctx.clearRect(0, 0, W, H);
            
            drawBackground(env, 1, 0); 
            drawRoad(env, 1); 
            draw3DCar(0, 0, 80, 'player', 340, 100, 0, true, env, 0);
            
            if (isFirstPerson) drawCockpit(env);
        }
        
        drawInitialScene();

    </script>
</body>
</html>
